<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>local time · 9‑dot menu</title>
  <style>
    /* ── reset & base ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: #d6d6d6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 1rem 1rem;
    }

    /* ── top bar ── */
    .top-bar {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0.5rem 1.5rem 0.5rem;
    }

    #clock {
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-align: center;
      flex: 1;
      margin: 0 1rem;
      white-space: nowrap;
    }

    /* ── Google‑style 9‑dot button ── */
    .dot-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.5rem 0.6rem;
      border-radius: 0.3rem;
      transition: background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .dot-btn:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    .dot-btn:active {
      background: rgba(255, 255, 255, 0.12);
    }
    .dot-btn .row {
      display: flex;
      gap: 3px;
    }
    .dot-btn .dot-icon {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #b0b0b0;
      transition: background 0.2s;
    }
    .dot-btn:hover .dot-icon {
      background: #e6e6e6;
    }

    /* ── menu popup ── */
    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(2px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 1.5rem;
    }
    .menu-overlay.active {
      display: flex;
    }

    .menu-panel {
      background: #141414;
      border-radius: 1rem;
      padding: 2rem 2.5rem;
      max-width: 650px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid #2a2a2a;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
      position: relative;
    }
    .menu-panel::-webkit-scrollbar {
      width: 4px;
    }
    .menu-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    .menu-panel::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 2px;
    }

    .menu-close {
      position: absolute;
      top: 0.6rem;
      right: 1rem;
      background: transparent;
      border: none;
      color: #6a6a6a;
      font-size: 1.6rem;
      cursor: pointer;
      transition: color 0.2s;
      font-family: inherit;
      line-height: 1;
    }
    .menu-close:hover {
      color: #e6e6e6;
    }

    /* ── folder sections ── */
    .folder-section {
      margin-bottom: 1.8rem;
    }
    .folder-section:last-child {
      margin-bottom: 0;
    }

    .folder-title {
      font-size: 0.75rem;
      color: #6a6a6a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid #242424;
      padding-bottom: 0.3rem;
    }

    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.2rem;
      padding-left: 0.2rem;
    }

    .file-link {
      color: #b0b0b0;
      font-size: 0.95rem;
      cursor: pointer;
      transition: color 0.15s;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding: 0.1rem 0;
    }
    .file-link:hover {
      color: #f0f0f0;
      border-bottom-color: #4a4a4a;
    }
    .file-link:active {
      color: #ffffff;
    }

    /* ── iframe overlay ── */
    .iframe-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(3px);
      display: none;
      z-index: 1000;
      padding: 1.5rem;
    }
    .iframe-overlay.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .close-btn {
      position: fixed;
      top: 1.2rem;
      right: 1.8rem;
      background: transparent;
      border: none;
      color: #ff3b3b;
      font-size: 1.4rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      border-radius: 0.3rem;
      transition: background 0.2s, color 0.2s;
      z-index: 1001;
      letter-spacing: 0.05em;
    }
    .close-btn:hover {
      background: rgba(255, 59, 59, 0.15);
      color: #ff6b6b;
    }
    .close-btn:active {
      transform: scale(0.96);
    }

    .iframe-content {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      background: #0b0b0b;
      border-radius: 0.5rem;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
      border: 1px solid #2a2a2a;
    }
    .iframe-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0b0b0b;
    }

    /* ── status ── */
    .status {
      color: #8a8a8a;
      font-size: 0.9rem;
      margin-top: 1.5rem;
      text-align: center;
    }

    /* ── responsive ── */
    @media (max-width: 640px) {
      #clock {
        font-size: 1.1rem;
      }
      .dot-btn {
        padding: 0.3rem 0.4rem;
      }
      .dot-btn .dot-icon {
        width: 3px;
        height: 3px;
      }
      .dot-btn .row {
        gap: 2px;
      }
      .menu-panel {
        padding: 1.5rem 1.2rem;
      }
      .file-link {
        font-size: 0.85rem;
      }
      .close-btn {
        top: 0.8rem;
        right: 1rem;
        font-size: 1.1rem;
        padding: 0.2rem 0.6rem;
      }
      .iframe-content {
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 10px;
        border-radius: 0.3rem;
      }
    }

    @media (max-width: 420px) {
      #clock {
        font-size: 0.85rem;
        white-space: normal;
      }
      .menu-panel {
        padding: 1rem 0.8rem;
      }
      .file-link {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <!-- ─── TOP BAR ─── -->
  <div class="top-bar">
    <div></div>
    <div id="clock">--:--:-- // --.--.----</div>
    <button class="dot-btn" id="dotBtn" aria-label="Open menu">
      <div class="row">
        <span class="dot-icon"></span>
        <span class="dot-icon"></span>
        <span class="dot-icon"></span>
      </div>
      <div class="row">
        <span class="dot-icon"></span>
        <span class="dot-icon"></span>
        <span class="dot-icon"></span>
      </div>
      <div class="row">
        <span class="dot-icon"></span>
        <span class="dot-icon"></span>
        <span class="dot-icon"></span>
      </div>
    </button>
  </div>

  <!-- ─── MENU POPUP ─── -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-panel" id="menuPanel">
      <button class="menu-close" id="menuClose">✕</button>
      <div id="menuContent"></div>
    </div>
  </div>

  <!-- ─── IFRAME OVERLAY ─── -->
  <div class="iframe-overlay" id="iframeOverlay">
    <button class="close-btn" id="closeBtn">Close</button>
    <div class="iframe-content">
      <iframe id="iframe" src="about:blank"></iframe>
    </div>
  </div>

  <div class="status" id="status"></div>

  <script>
    (function() {
      "use strict";

      // ─── DOM refs ────────────────────────────────────────────────
      const clockEl = document.getElementById('clock');
      const dotBtn = document.getElementById('dotBtn');
      const menuOverlay = document.getElementById('menuOverlay');
      const menuClose = document.getElementById('menuClose');
      const menuContent = document.getElementById('menuContent');
      const iframeOverlay = document.getElementById('iframeOverlay');
      const iframe = document.getElementById('iframe');
      const closeBtn = document.getElementById('closeBtn');
      const status = document.getElementById('status');

      // ─── Clock ──────────────────────────────────────────────────
      function pad(n) {
        return String(n).padStart(2, '0');
      }

      function updateClock() {
        const now = new Date();
        const h = pad(now.getHours());
        const m = pad(now.getMinutes());
        const s = pad(now.getSeconds());
        const day = pad(now.getDate());
        const month = pad(now.getMonth() + 1);
        const year = now.getFullYear();
        clockEl.textContent = `${h}:${m}:${s} // ${day}.${month}.${year}`;
      }
      updateClock();
      setInterval(updateClock, 1000);

      // ─── Shuffle helper ──────────────────────────────────────────
      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // ─── Format filename ─────────────────────────────────────────
      function formatDisplayName(filename) {
        let name = filename.replace(/\.html$/i, '');
        let words = name.split(/(?=[A-Z])/);
        words = words.map(w => w.charAt(0).toUpperCase() + w.slice(1));
        return words.join(' ');
      }

      // ─── Menu toggle ─────────────────────────────────────────────
      function openMenu() {
        menuOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeMenu() {
        menuOverlay.classList.remove('active');
        document.body.style.overflow = '';
      }

      dotBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openMenu();
      });
      menuClose.addEventListener('click', closeMenu);
      menuOverlay.addEventListener('click', (e) => {
        if (e.target === menuOverlay) closeMenu();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && menuOverlay.classList.contains('active')) closeMenu();
      });

      // ─── Iframe overlay ──────────────────────────────────────────
      function openIframe(url) {
        iframe.src = url;
        iframeOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        if (menuOverlay.classList.contains('active')) closeMenu();
      }

      function closeIframe() {
        iframeOverlay.classList.remove('active');
        iframe.src = 'about:blank';
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closeIframe);
      iframeOverlay.addEventListener('click', (e) => {
        if (e.target === iframeOverlay) closeIframe();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && iframeOverlay.classList.contains('active')) closeIframe();
      });

      // ─── Build menu from htmlList.json ──────────────────────────
      function buildMenu(grouped) {
        menuContent.innerHTML = '';
        const folderNames = Object.keys(grouped);

        if (folderNames.length === 0) {
          menuContent.innerHTML =
            '<div style="color:#6a6a6a;text-align:center;padding:1rem 0;">No files found.</div>';
          return;
        }

        folderNames.forEach(folder => {
          const files = shuffle(grouped[folder]);

          const section = document.createElement('div');
          section.className = 'folder-section';

          const title = document.createElement('div');
          title.className = 'folder-title';
          title.textContent = folder.toUpperCase();
          section.appendChild(title);

          const list = document.createElement('div');
          list.className = 'file-list';

          files.forEach(path => {
            const parts = path.split('/');
            const filename = parts[parts.length - 1];
            const displayName = formatDisplayName(filename);

            const link = document.createElement('span');
            link.className = 'file-link';
            link.textContent = displayName;
            link.addEventListener('click', () => openIframe(path));
            list.appendChild(link);
          });

          section.appendChild(list);
          menuContent.appendChild(section);
        });
      }

      // ─── Fetch and group by root folder ─────────────────────────
      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(data => {
          if (!Array.isArray(data)) throw new Error('Invalid JSON: expected array');

          const grouped = {};
          data.forEach(path => {
            const parts = path.split('/');
            const folder = parts.length > 1 ? parts[0] : 'general';
            if (!grouped[folder]) grouped[folder] = [];
            grouped[folder].push(path);
          });

          buildMenu(grouped);
          status.textContent = '';
        })
        .catch(err => {
          status.textContent = `⚠️ Could not load list: ${err.message}`;
          console.error(err);
        });

    })();
  </script>

</body>
</html>
