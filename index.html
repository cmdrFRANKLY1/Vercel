<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>launch · shortcuts</title>
  <style>
    /* ----- ultra-minimal dark mode, zero animations, zero icons ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: Verdana, Geneva, sans-serif;
      padding: 1.5rem;
      line-height: 1.5;
      color: #e6edf3;
      padding-top: 2.5rem;
    }

    .card {
      max-width: 780px;
      width: 100%;
      background: #161b22;
      border-radius: 20px;
      padding: 2rem 2rem;
      border: 1px solid #30363d;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border-bottom: 1px solid #21262d;
      padding-bottom: 0.8rem;
      margin-bottom: 1.5rem;
      color: #f0f6fc;
    }

    h1 small {
      font-size: 0.9rem;
      font-weight: 400;
      color: #8b949e;
      margin-left: 0.2rem;
    }

    .badge-count {
      background: #21262d;
      border-radius: 30px;
      padding: 0.1rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: #c9d1d9;
      margin-left: 0.5rem;
      border: 1px solid #30363d;
    }

    /* ----- category groups ----- */
    .category-group {
      margin-bottom: 1.4rem;
    }

    .category-group:last-child {
      margin-bottom: 0;
    }

    .category-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
      padding-bottom: 0.2rem;
      border-bottom: 1px solid #21262d;
    }

    .category-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: #f0f6fc;
      letter-spacing: 0.01em;
    }

    .category-count {
      font-size: 0.65rem;
      background: #21262d;
      padding: 0.05rem 0.6rem;
      border-radius: 20px;
      color: #8b949e;
      border: 1px solid #30363d;
    }

    .shortcut-grid {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding-left: 0.1rem;
    }

    /* ----- ultra-minimal button: no icons, no animations, just text ----- */
    .shortcut-item {
      display: block;
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      background: transparent;
      border: none;
      text-decoration: none;
      color: #e6edf3;
      font-family: Verdana, Geneva, sans-serif;
      font-size: 0.9rem;
      transition: none;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }

    .shortcut-item:hover {
      background: #1c2333;
    }

    .shortcut-item:active {
      background: #151e2b;
    }

    /* path indicator (tiny, discreet) */
    .shortcut-path {
      font-size: 0.65rem;
      color: #6e7681;
      margin-left: 0.5rem;
      font-weight: 400;
    }

    /* hide container when empty */
    #shortcutContainer:empty {
      display: none;
    }

    hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 1.5rem 0 0.6rem 0;
    }

    .footer-note {
      font-size: 0.65rem;
      color: #6e7681;
      text-align: right;
      letter-spacing: 0.01em;
      margin-top: 0.3rem;
    }

    /* tiny screens */
    @media (max-width: 480px) {
      .card {
        padding: 1.2rem 1rem;
      }
      h1 {
        font-size: 1.3rem;
      }
      .shortcut-item {
        font-size: 0.85rem;
        padding: 0.3rem 0.5rem;
      }
      .category-name {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

<div class="card" role="main">
  <h1>
    ⚡ shortcuts
    <small>· minimal</small>
    <span class="badge-count" id="countBadge">0</span>
  </h1>

  <!-- container: pure text-based shortcuts -->
  <div id="shortcutContainer"></div>

  <hr>
  <div class="footer-note">
    <span id="fileSource">htmlList.json</span> · <span id="totalItems">0</span> entries
  </div>
</div>

<script>
  (function() {
    "use strict";

    const container = document.getElementById('shortcutContainer');
    const countBadge = document.getElementById('countBadge');
    const totalItemsSpan = document.getElementById('totalItems');

    // ---------- create one text-only shortcut ----------
    function createShortcutItem(filePath) {
      const fileName = filePath.includes('/') ? filePath.split('/').pop() : filePath;
      let displayName = fileName.replace(/\.html$/i, '');
      if (displayName === '') displayName = fileName;

      // extract folder for display
      let folder = '';
      if (filePath.includes('/')) {
        const parts = filePath.split('/');
        if (parts.length >= 2) folder = parts[0];
      }

      const anchor = document.createElement('a');
      anchor.className = 'shortcut-item';
      anchor.href = filePath;
      anchor.setAttribute('aria-label', `Open ${displayName}`);

      // text content: filename + tiny folder hint
      const textNode = document.createTextNode(displayName);
      anchor.appendChild(textNode);

      if (folder) {
        const pathSpan = document.createElement('span');
        pathSpan.className = 'shortcut-path';
        pathSpan.textContent = `[${folder}]`;
        anchor.appendChild(pathSpan);
      }

      return anchor;
    }

    // ---------- get folder from path (for categorization) ----------
    function getFolderFromPath(filePath) {
      if (!filePath || typeof filePath !== 'string') return '';
      const trimmed = filePath.trim();
      if (!trimmed.includes('/')) return '';
      const parts = trimmed.split('/');
      const folder = parts.find(seg => seg.length > 0);
      return folder || '';
    }

    // ---------- render categorized groups (text only) ----------
    function renderList(fileList) {
      container.innerHTML = '';

      if (!fileList || !Array.isArray(fileList) || fileList.length === 0) {
        countBadge.textContent = '0';
        totalItemsSpan.textContent = '0';
        return;
      }

      const validPaths = fileList.filter(item => typeof item === 'string' && item.trim().length > 0);
      if (validPaths.length === 0) {
        countBadge.textContent = '0';
        totalItemsSpan.textContent = '0';
        return;
      }

      // group by folder
      const groups = new Map();
      for (const path of validPaths) {
        const folder = getFolderFromPath(path);
        if (!groups.has(folder)) {
          groups.set(folder, []);
        }
        groups.get(folder).push(path);
      }

      // sort folders: root first, then alphabetically
      const sortedFolders = Array.from(groups.keys()).sort((a, b) => {
        if (a === '') return -1;
        if (b === '') return 1;
        return a.localeCompare(b);
      });

      const fragment = document.createDocumentFragment();
      let totalCount = 0;

      for (const folder of sortedFolders) {
        const paths = groups.get(folder);
        if (!paths || paths.length === 0) continue;

        // sort by filename
        paths.sort((a, b) => {
          const nameA = a.split('/').pop() || a;
          const nameB = b.split('/').pop() || b;
          return nameA.localeCompare(nameB);
        });

        const groupDiv = document.createElement('div');
        groupDiv.className = 'category-group';

        // header
        const headerDiv = document.createElement('div');
        headerDiv.className = 'category-header';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'category-name';
        nameSpan.textContent = folder || '📄 root';

        const countSpan = document.createElement('span');
        countSpan.className = 'category-count';
        countSpan.textContent = paths.length;

        headerDiv.appendChild(nameSpan);
        headerDiv.appendChild(countSpan);
        groupDiv.appendChild(headerDiv);

        // grid (links)
        const gridDiv = document.createElement('div');
        gridDiv.className = 'shortcut-grid';

        for (const path of paths) {
          gridDiv.appendChild(createShortcutItem(path));
        }

        groupDiv.appendChild(gridDiv);
        fragment.appendChild(groupDiv);

        totalCount += paths.length;
      }

      container.appendChild(fragment);
      countBadge.textContent = totalCount;
      totalItemsSpan.textContent = totalCount;
    }

    // ---------- fetch: silent fail, no UI fallback ----------
    function fetchList() {
      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) {
            container.innerHTML = '';
            countBadge.textContent = '0';
            totalItemsSpan.textContent = '0';
            return;
          }
          return response.json();
        })
        .then(data => {
          let list = [];
          if (Array.isArray(data)) {
            list = data;
          } else if (data && typeof data === 'object') {
            const values = Object.values(data);
            if (values.some(v => typeof v === 'string')) {
              list = values.filter(v => typeof v === 'string');
            } else {
              list = [];
            }
          }
          renderList(list);
        })
        .catch(() => {
          container.innerHTML = '';
          countBadge.textContent = '0';
          totalItemsSpan.textContent = '0';
        });
    }

    fetchList();
  })();
</script>
</body>
</html>
