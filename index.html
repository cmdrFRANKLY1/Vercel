<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>local time · startpage</title>
  <style>
    /* ── reset ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      color: #d6d6d6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1rem 1rem;
    }

    /* ── clock ── */
    #clock {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    /* ── grid of links ── */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      max-width: 900px;
      width: 100%;
    }

    .tile {
      background: #1a1a1a;
      padding: 1.2rem 2rem;
      border-radius: 0.5rem;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-size: 1.2rem;
      color: #e6e6e6;
      text-align: center;
      min-width: 120px;
      user-select: none;
    }

    .tile:hover {
      background: #262626;
      border-color: #4a4a4a;
    }

    .tile:active {
      background: #333;
    }

    /* ── overlay (wrapper window) ── */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      display: none;
      /* hidden by default */
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 1.5rem;
    }

    .overlay.active {
      display: flex;
    }

    .overlay-content {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      max-height: 90vh;
      background: #0b0b0b;
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid #2a2a2a;
    }

    .overlay iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0b0b0b;
    }

    .close-btn {
      position: absolute;
      top: 0.6rem;
      right: 0.8rem;
      background: #2a2a2a;
      border: none;
      color: #d6d6d6;
      font-size: 1.8rem;
      font-weight: 400;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      z-index: 10;
      font-family: inherit;
      line-height: 1;
      padding: 0;
    }

    .close-btn:hover {
      background: #4a4a4a;
    }

    .close-btn:active {
      transform: scale(0.92);
    }

    /* ── responsive ── */
    @media (max-width: 640px) {
      #clock {
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
      }

      .tile {
        font-size: 0.95rem;
        padding: 0.8rem 1.2rem;
        min-width: 90px;
      }

      .grid {
        gap: 1rem;
      }

      .overlay-content {
        height: 95vh;
        max-height: 95vh;
        border-radius: 0.4rem;
      }

      .close-btn {
        top: 0.3rem;
        right: 0.4rem;
        font-size: 1.4rem;
        width: 1.8rem;
        height: 1.8rem;
      }
    }

    @media (max-width: 420px) {
      #clock {
        font-size: 0.85rem;
      }

      .tile {
        font-size: 0.8rem;
        padding: 0.6rem 1rem;
        min-width: 70px;
      }
    }

    /* ── loading / error ── */
    .status {
      color: #8a8a8a;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <!-- clock -->
  <div id="clock"></div>

  <!-- grid container -->
  <div class="grid" id="grid"></div>
  <div class="status" id="status"></div>

  <!-- overlay / wrapper window -->
  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <button class="close-btn" id="closeBtn">✕</button>
      <iframe id="iframe" src="about:blank"></iframe>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ── clock ──
      const clockEl = document.getElementById('clock');

      function pad(n) {
        return String(n).padStart(2, '0');
      }

      function updateClock() {
        const now = new Date();
        const h = pad(now.getHours());
        const m = pad(now.getMinutes());
        const s = pad(now.getSeconds());
        const day = pad(now.getDate());
        const month = pad(now.getMonth() + 1);
        const year = now.getFullYear();
        clockEl.textContent = `${h}:${m}:${s} // ${day}.${month}.${year}`;
      }

      updateClock();
      setInterval(updateClock, 1000);

      // ── overlay logic ──
      const overlay = document.getElementById('overlay');
      const iframe = document.getElementById('iframe');
      const closeBtn = document.getElementById('closeBtn');

      function openOverlay(url) {
        iframe.src = url;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeOverlay() {
        overlay.classList.remove('active');
        iframe.src = 'about:blank';
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closeOverlay);

      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          closeOverlay();
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          closeOverlay();
        }
      });

      // ── fetch htmlList.json and build tiles ──
      const grid = document.getElementById('grid');
      const status = document.getElementById('status');

      function buildTiles(list) {
        if (!list || list.length === 0) {
          status.textContent = 'No entries found.';
          return;
        }

        grid.innerHTML = '';
        status.textContent = '';

        list.forEach(path => {
          // extract filename without extension, works with nested folders
          const parts = path.split('/');
          let name = parts[parts.length - 1];
          name = name.replace(/\.html$/i, '');
          // make it readable: replace dashes/underscores with spaces, capitalize
          const displayName = name.replace(/[-_]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.textContent = displayName;
          tile.addEventListener('click', function() {
            openOverlay(path); // path is relative to index.html, e.g. "tools/lyricsEditor.html"
          });
          grid.appendChild(tile);
        });
      }

      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(data => {
          if (Array.isArray(data)) {
            buildTiles(data);
          } else {
            throw new Error('Invalid JSON: expected array');
          }
        })
        .catch(err => {
          status.textContent = `⚠️ Could not load list: ${err.message}`;
          console.error(err);
        });

    })();
  </script>

</body>
</html>
