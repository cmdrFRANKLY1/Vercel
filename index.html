    // Select Random Item Utility
    function getRandomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    // Generate pairing and update HTML directly
    function generateIndices() {
      const selectedTitle = getRandomItem(RND_INDEX_TITLES);
      const selectedNiche = getRandomItem(RND_INDEX_SUBTITLES["Niche Tools"]);
      const selectedAccess = getRandomItem(RND_INDEX_SUBTITLES["Accessibility Features"]);

      document.getElementById('main-title').innerText = selectedTitle;
      document.getElementById('combined-subtitle').innerText = `${selectedNiche} • ${selectedAccess}`;
    }

    // --- TIMEZONE AND CLOCK ---
    function updateClock() {
      const now = new Date();

      // Clock format: Local time with seconds
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');

      document.getElementById('live-time').innerText = `${hours}:${minutes}:${seconds}`;

      // Date format: Day of the week, Month Day, Year
      const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
      document.getElementById('live-date').innerText = now.toLocaleDateString(undefined, options);
    }

    // --- INITIALIZATION ---
    window.onload = function() {
      generateIndices();
      updateClock();
      setInterval(updateClock, 1000); // update clock every second
    }
