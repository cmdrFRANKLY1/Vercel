<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>black · tools dashboard</title>
    <style>
        /* ----- reset – no shadows, no frills ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            min-height: 100vh;
            font-family: 'Verdana', 'Geneva', 'Tahoma', sans-serif;
            color: #f0f0f0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            overflow: hidden;
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* ----- top‑left: ultra-compact tools navigation list ----- */
        .tools-nav {
            position: fixed;
            top: 1rem;
            left: 1rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.85rem;
            user-select: none;
            white-space: nowrap;
        }

        .tools-nav a {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.4; /* dimmed inactive links */
            transition: opacity 0.15s ease, color 0.15s ease;
        }

        .tools-nav a:hover {
            opacity: 0.8;
        }

        /* Active link highlight - Solid white */
        .tools-nav a.active {
            color: #ffffff !important;
            opacity: 1 !important;
            font-weight: 600;
        }

        /* Custom separator style */
        .separator {
            color: #f0f0f0;
            opacity: 0.2;
            font-weight: 300;
        }

        main {
            display: none;
        }

        /* ----- responsive scaling ----- */
        @media (max-width: 480px) {
            .tools-nav {
                top: 0.8rem;
                left: 0.8rem;
                font-size: 0.75rem;
                gap: 0.4rem;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Dynamic navigation populated based on physical availability on Vercel -->
    <nav class="tools-nav" id="toolsNav" aria-label="Tools directory navigation">
        <a href="index.html" class="nav-item" id="homeLink">home</a>
    </nav>

    <main></main>

    <script>
        (function() {
            'use strict';

            const navContainer = document.getElementById('toolsNav');
            const homeLink = document.getElementById('homeLink');
            const currentPath = window.location.pathname;

            // Mark home active if we are at the root index or empty path
            if (currentPath.endsWith('index.html') && !currentPath.includes('/tools/') || 
                currentPath.endsWith('/') || 
                currentPath === '') {
                homeLink.classList.add('active');
            }

            // Normalizes paths for safe URL checking and cleans local paths
            function cleanPath(rawPath) {
                return rawPath.replace(/\\/g, '/');
            }

            // Extracts name from path (e.g. "tools/txt2json.html" -> "txt2json")
            function getToolName(path) {
                const parts = path.split('/');
                const filename = parts[parts.length - 1];
                return filename.replace('.html', '');
            }

            // Fetch and build navigation from JSON
            async function buildNavigation() {
                let toolPaths = [];

                try {
                    // Normalize the base URL to strip any 'blob:' prefix.
                    let baseUrl = window.location.href;
                    if (baseUrl.startsWith('blob:')) {
                        baseUrl = baseUrl.replace(/^blob:/, '');
                    }

                    let jsonUrl;
                    try {
                        jsonUrl = new URL('htmlList.json', baseUrl).href;
                    } catch (e) {
                        jsonUrl = 'htmlList.json'; // Safe fallback
                    }
                    
                    const response = await fetch(jsonUrl);
                    if (!response.ok) {
                        throw new Error('Failed to load htmlList.json');
                    }
                    toolPaths = await response.json();
                } catch (error) {
                    // Fallback to default lists when fetch fails (e.g. inside sandboxed Canvas previews)
                    toolPaths = [
                        "tools/txt2json.html",
                        "tools/tarkov.html"
                    ];
                }

                // Safely render navigation from the loaded or fallback list
                toolPaths.forEach(rawPath => {
                    const targetPath = cleanPath(rawPath);
                    const toolName = getToolName(targetPath);

                    // Create separator
                    const separator = document.createElement('span');
                    separator.className = 'separator';
                    separator.textContent = '|';
                    navContainer.appendChild(separator);

                    // Create link
                    const link = document.createElement('a');
                    link.href = targetPath;
                    link.className = 'nav-item';
                    link.textContent = toolName;

                    // Apply solid white if this link matches the browser URL path
                    if (currentPath.endsWith(targetPath)) {
                        link.classList.add('active');
                        homeLink.classList.remove('active'); // Ensure home turns off
                    }

                    navContainer.appendChild(link);
                });
            }

            buildNavigation();
        })();
    </script>

</body>
</html>
