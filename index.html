<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS News Ticker</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --dim-text: #888888;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* Prevent scrollbars from the ticker */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main content area (placeholder) */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--dim-text);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        /* Ticker Container - Always on bottom */
        .ticker-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }

        /* The scrolling element */
        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100vw; /* Start completely off-screen to the right */
            will-change: transform;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .ticker:hover {
            animation-play-state: paused !important; /* Pause on hover so users can click links */
        }

        /* Ticker Items */
        .ticker-item {
            display: inline-block;
            margin-right: 3rem;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .ticker-item a {
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .ticker-item a:hover {
            color: var(--dim-text);
            text-decoration: underline;
        }

        .feed-source {
            font-weight: 700;
            margin-right: 0.5rem;
            color: var(--dim-text);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .separator {
            color: var(--border-color);
            margin: 0 1rem;
        }
    </style>
</head>
<body>

    <main>
        <div>Waiting for terminal instructions...</div>
    </main>

    <div class="ticker-wrap">
        <div class="ticker" id="ticker-content">
            <span class="ticker-item" style="color: var(--dim-text);">INITIALIZING FEED SYNC...</span>
        </div>
    </div>

    <script>
        // Fallback JSON in case the fetch fails
        const FALLBACK_JSON = {
          "categories": [
            {
              "name": "German Gaming News",
              "feeds": [
                { "title": "GamesIndustry", "url": "https://www.gamesindustry.biz/topics/german-games-industry-association/feed" },
                { "title": "SAZ News", "url": "https://www.spieleautorenzunft.de/news.rss" }
              ]
            },
            {
              "name": "German Science News",
              "feeds": [
                { "title": "IDW", "url": "https://idw-online.de/en/news.rss" },
                { "title": "DFG", "url": "https://www.dfg.de/rss/info-wissenschaft.rss" }
              ]
            },
            {
              "name": "Technology News",
              "feeds": [
                { "title": "TechCrunch", "url": "https://techcrunch.com/feed/" },
                { "title": "The Verge", "url": "https://www.theverge.com/rss/index.xml" }
              ]
            }
          ]
        };

        const tickerContent = document.getElementById('ticker-content');

        async function fetchConfig() {
            const pathsToTry = ['/resources/rssFeedsList.json'];
            for (const path of pathsToTry) {
                try {
                    const res = await fetch(path);
                    if (res.ok) {
                        const data = await res.json();
                        return data;
                    }
                } catch (e) {
                    console.warn(`Could not load config from ${path}, falling back to defaults.`);
                }
            }
            return FALLBACK_JSON;
        }

        async function fetchRSS(url) {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!data.contents) throw new Error('Empty payload');
            return data.contents;
        }

        function parseXMLData(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const items = [];

            // We no longer strictly return empty arrays on parsererror
            // because many feeds have minor namespace errors but are still readable!

            const isAtom = xmlDoc.getElementsByTagName('feed').length > 0 && xmlDoc.getElementsByTagName('entry').length > 0;

            if (isAtom) {
                const entries = Array.from(xmlDoc.querySelectorAll('entry')).slice(0, 5); // Limit to 5 per feed
                entries.forEach(entry => { 
                    const title = entry.querySelector('title')?.textContent?.trim() || 'Untitled';
                    let link = '#';
                    const linkNodes = entry.querySelectorAll('link');
                    for (let ln of linkNodes) {
                        if (ln.getAttribute('rel') === 'alternate' || !ln.hasAttribute('rel')) {
                            link = ln.getAttribute('href'); break;
                        }
                    }
                    if (title !== 'Untitled') items.push({ title, link });
                });
            } else {
                const nodes = Array.from(xmlDoc.querySelectorAll('item')).slice(0, 5);
                nodes.forEach(node => { 
                    const title = node.querySelector('title')?.textContent?.trim() || 'Untitled';
                    const link = node.querySelector('link')?.textContent?.trim() || node.querySelector('guid')?.textContent?.trim() || '#';
                    if (title !== 'Untitled') items.push({ title, link });
                });
            }
            return items;
        }

        async function bootTicker() {
            try {
                tickerContent.innerHTML = '<span class="ticker-item" style="color: var(--dim-text);">FETCHING LATEST ARTICLES...</span>';
                
                const config = await fetchConfig();
                
                // Flatten feeds to process them
                const allFeeds = config.categories ? config.categories.flatMap(cat => cat.feeds || []) : [];
                
                if (allFeeds.length === 0) {
                    tickerContent.innerHTML = '<span class="ticker-item" style="color: var(--dim-text);">NO FEEDS CONFIGURED.</span>';
                    return;
                }

                // Fetch feeds CONCURRENTLY for vastly improved loading speeds
                const feedPromises = allFeeds.map(async (feed) => {
                    try {
                        const xmlText = await fetchRSS(feed.url);
                        const items = parseXMLData(xmlText);
                        return { feed, items };
                    } catch (err) {
                        console.warn(`Failed to load feed: ${feed.title}`, err);
                        return { feed, items: [] }; // Fail gracefully for individual feeds
                    }
                });

                const results = await Promise.all(feedPromises);
                
                let allItemsHTML = '';
                let totalCharacters = 0;

                results.forEach(({ feed, items }) => {
                    items.forEach(item => {
                        const itemHTML = `
                            <span class="ticker-item">
                                <span class="feed-source">${feed.title}</span>
                                <a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a>
                            </span><span class="separator">✦</span>
                        `;
                        allItemsHTML += itemHTML;
                        totalCharacters += feed.title.length + item.title.length;
                    });
                });

                if (allItemsHTML.length > 0) {
                    tickerContent.innerHTML = allItemsHTML;
                    
                    // Force a browser reflow to reset the animation smoothly
                    tickerContent.style.animation = 'none';
                    tickerContent.offsetHeight; 
                    
                    // Dynamically calculate animation duration based on content length
                    // Roughly 12 seconds per 100 characters for a comfortable reading speed
                    const scrollDuration = Math.max(20, totalCharacters * 0.12);
                    tickerContent.style.animation = `ticker-scroll ${scrollDuration}s linear infinite`;
                } else {
                    tickerContent.innerHTML = '<span class="ticker-item" style="color: var(--dim-text);">NO ARTICLES AVAILABLE AT THIS TIME.</span>';
                    tickerContent.style.animation = `ticker-scroll 10s linear infinite`;
                }

            } catch (error) {
                console.error('Ticker boot error:', error);
                tickerContent.innerHTML = '<span class="ticker-item" style="color: var(--dim-text);">SYSTEM ERROR: UNABLE TO LOAD FEEDS.</span>';
                tickerContent.style.animation = `ticker-scroll 10s linear infinite`;
            }
        }

        // Initialize ticker on load
        window.addEventListener('DOMContentLoaded', bootTicker);
    </script>
</body>
</html>
