<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>black · tools dashboard</title>
    <style>
        /* ----- reset – no shadows, no frills ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            min-height: 100vh;
            font-family: 'Verdana', 'Geneva', 'Tahoma', sans-serif;
            color: #f0f0f0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            overflow: hidden;
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* ----- top‑left: ultra-compact tools navigation container ----- */
        .tools-container {
            position: fixed;
            top: 1rem;
            left: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            user-select: none;
            white-space: nowrap;
        }

        .main-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        /* Second-row submenu */
        .sub-nav {
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.85rem;
            opacity: 0;
        }

        .sub-nav.show {
            display: flex;
            animation: fadeIn 0.15s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .tools-container a, .tools-container button {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.4; /* dimmed inactive links */
            transition: opacity 0.15s ease, color 0.15s ease;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
        }

        .tools-container a:hover, .tools-container button:hover {
            opacity: 0.8;
        }

        /* Active link highlight - Solid white */
        .tools-container a.active, .tools-container button.active {
            color: #ffffff !important;
            opacity: 1 !important;
            font-weight: 600;
        }

        /* Custom separator style */
        .separator {
            color: #f0f0f0;
            opacity: 0.2;
            font-weight: 300;
        }

        main {
            display: none;
        }

        /* ----- responsive scaling ----- */
        @media (max-width: 480px) {
            .tools-container {
                top: 0.8rem;
                left: 0.8rem;
                gap: 0.3rem;
                max-width: 100%;
            }
            .main-nav, .sub-nav, .separator {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- Dynamic navigation populated based on physical availability on Vercel -->
    <nav class="tools-container" aria-label="Tools directory navigation">
        <div class="main-nav">
            <a href="index.html" class="nav-item active" id="homeLink">home</a>
            <span class="separator">|</span>
            <button id="toolsToggle" class="nav-item-btn">tools</button>
            <span class="separator">|</span>
            <button id="tarkovToggle" class="nav-item-btn">tarkov</button>
        </div>
        <!-- Submenus (toggled dynamically on click) -->
        <div class="sub-nav" id="toolsSubNav"></div>
        <div class="sub-nav" id="tarkovSubNav"></div>
    </nav>

    <main></main>

    <script>
        (function() {
            'use strict';

            const toolsSubNav = document.getElementById('toolsSubNav');
            const tarkovSubNav = document.getElementById('tarkovSubNav');
            
            const homeLink = document.getElementById('homeLink');
            const toolsToggle = document.getElementById('toolsToggle');
            const tarkovToggle = document.getElementById('tarkovToggle');
            const currentPath = window.location.pathname;

            // Mark home active immediately
            homeLink.classList.add('active');

            // Interactive toggles to open/close submenus on click
            toolsToggle.addEventListener('click', (e) => {
                e.preventDefault();
                const isExpanded = toolsSubNav.classList.toggle('show');
                tarkovSubNav.classList.remove('show');
                tarkovToggle.classList.remove('active');
                toolsToggle.classList.toggle('active', isExpanded);
            });

            tarkovToggle.addEventListener('click', (e) => {
                e.preventDefault();
                const isExpanded = tarkovSubNav.classList.toggle('show');
                toolsSubNav.classList.remove('show');
                toolsToggle.classList.remove('active');
                tarkovToggle.classList.toggle('active', isExpanded);
            });

            // Normalizes paths for safe URL checking and cleans local paths
            function cleanPath(rawPath) {
                return rawPath.replace(/\\/g, '/');
            }

            // Extracts name from path (e.g. "tarkov/tarkov.html" -> "tarkov")
            function getToolName(path) {
                const parts = path.split('/');
                const filename = parts[parts.length - 1];
                return filename.replace('.html', '');
            }

            // Fetch and build navigation from JSON
            async function buildNavigation() {
                let toolPaths = [];

                try {
                    // Normalize the base URL to strip any 'blob:' prefix.
                    let baseUrl = window.location.href;
                    if (baseUrl.startsWith('blob:')) {
                        baseUrl = baseUrl.replace(/^blob:/, '');
                    }

                    let jsonUrl;
                    try {
                        jsonUrl = new URL('htmlList.json', baseUrl).href;
                    } catch (e) {
                        jsonUrl = 'htmlList.json'; // Safe fallback
                    }
                    
                    const response = await fetch(jsonUrl);
                    if (!response.ok) {
                        throw new Error('Failed to load htmlList.json');
                    }
                    toolPaths = await response.json();
                } catch (error) {
                    // Fallback default list if json file is unavailable
                    toolPaths = [
                        "tools/txt2json.html",
                        "tarkov/tarkov.html"
                    ];
                }

                // Clean existing subnav containers to prevent double appending during re-renders
                toolsSubNav.innerHTML = '';
                tarkovSubNav.innerHTML = '';

                // Keep track of added paths to prevent rendering duplicates
                const seenPaths = new Set();

                // Populate and divide links into sub-menus
                toolPaths.forEach(rawPath => {
                    const targetPath = cleanPath(rawPath);
                    const toolName = getToolName(targetPath);

                    // Skip if we've already rendered this path
                    if (seenPaths.has(targetPath)) {
                        return;
                    }
                    seenPaths.add(targetPath);

                    // Determine appropriate sub-nav container
                    let container = null;
                    if (targetPath.startsWith('tarkov/')) {
                        container = tarkovSubNav;
                    } else if (targetPath.startsWith('tools/')) {
                        container = toolsSubNav;
                    }

                    if (container) {
                        // Append separator if not first item in this sub-nav
                        if (container.children.length > 0) {
                            const separator = document.createElement('span');
                            separator.className = 'separator';
                            separator.textContent = '|';
                            container.appendChild(separator);
                        }

                        // Create link item
                        const link = document.createElement('a');
                        link.href = targetPath;
                        link.className = 'nav-item';
                        link.textContent = toolName;

                        // Highlight active if URL matches targetPath (keep home highlighted too)
                        if (currentPath.endsWith(targetPath)) {
                            link.classList.add('active');
                        }

                        container.appendChild(link);
                    }
                });
            }

            buildNavigation();
        })();
    </script>

</body>
</html>
