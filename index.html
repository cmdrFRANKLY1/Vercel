<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;padding:2rem;line-height:1.6;color:#222}
        h1{font-size:1.8rem;font-weight:500;margin-bottom:1.5rem}
        .category{margin-bottom:2rem}
        .category h2{font-size:1.2rem;font-weight:500;color:#555;margin-bottom:0.5rem;border-bottom:1px solid #ddd;padding-bottom:0.25rem}
        .category ul{list-style:none;padding-left:0}
        .category li{margin:0.25rem 0}
        .category a{color:#0066cc;text-decoration:none;font-size:1rem}
        .category a:hover{text-decoration:underline}
        .loading{color:#888}
        .error{color:#c00}
        @media(max-width:600px){body{padding:1rem}}
    </style>
</head>
<body>
    <h1>📁 Index</h1>
    <div id="root"><p class="loading">Loading...</p></div>
    <script>
        (async function(){
            const root = document.getElementById('root');
            try {
                const res = await fetch('htmlList.json');
                if (!res.ok) throw new Error('Failed to load list');
                const files = await res.json();
                if (!files || !files.length) {
                    root.innerHTML = '<p class="error">No files found.</p>';
                    return;
                }

                // Group by folder (first directory)
                const groups = {};
                for (const path of files) {
                    const parts = path.split('/');
                    const folder = parts.length > 1 ? parts[0] : 'root';
                    const filename = parts.slice(1).join('/') || parts[0];
                    if (!groups[folder]) groups[folder] = [];
                    groups[folder].push({ path, filename });
                }

                // Build HTML
                let html = '';
                const sortedFolders = Object.keys(groups).sort((a,b) => a === 'root' ? -1 : b === 'root' ? 1 : a.localeCompare(b));
                for (const folder of sortedFolders) {
                    const items = groups[folder];
                    html += `<div class="category"><h2>${folder === 'root' ? '/' : folder}</h2><ul>`;
                    items.sort((a,b) => a.filename.localeCompare(b.filename));
                    for (const item of items) {
                        html += `<li><a href="${item.path}">${item.filename}</a></li>`;
                    }
                    html += '</ul></div>';
                }
                root.innerHTML = html;
            } catch (err) {
                root.innerHTML = `<p class="error">Error: ${err.message}</p>`;
            }
        })();
    </script>
</body>
</html>
