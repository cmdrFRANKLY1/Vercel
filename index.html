<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>index</title>
    <style>
      /* absolute minimum – no shadows, no backgrounds, no borders, no icons */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #0d0d0d;
        color: #e0e0e0;
        font-family: Verdana, Geneva, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; /* time stays at top */
        padding: 2rem 1.5rem 1.5rem;
        text-align: center;
      }
      .top {
        margin-bottom: 2rem;
        width: 100%;
        text-align: center;
      }
      .top span {
        color: #aaa;
        font-size: 0.95rem;
        letter-spacing: 0.3px;
      }
      .list {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
        width: 100%;
        max-width: 480px;
      }
      .list-item {
        color: #b0b0b0;
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 0.1s ease;
        word-break: break-all;
      }
      .list-item:hover {
        color: #ffffff;
      }
      .list-item:active {
        color: #888;
      }
      /* no extra UI – just plain text */
    </style>
  </head>
  <body>
    <!-- top center: time and date (local) -->
    <div class="top">
      <span id="timeDisplay">–</span>
    </div>

    <!-- list of htmls, each wrapped in square brackets -->
    <div class="list" id="fileList"></div>

    <script>
      (function () {
        // ---- time & date ----
        const timeEl = document.getElementById('timeDisplay');

        function updateTime() {
          const now = new Date();
          const year = now.getFullYear();
          const month = String(now.getMonth() + 1).padStart(2, '0');
          const day = String(now.getDate()).padStart(2, '0');
          const hours = String(now.getHours()).padStart(2, '0');
          const mins = String(now.getMinutes()).padStart(2, '0');
          const secs = String(now.getSeconds()).padStart(2, '0');
          timeEl.textContent = `${year}-${month}-${day}  ${hours}:${mins}:${secs}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // ---- list from htmlList.json ----
        const listEl = document.getElementById('fileList');

        async function fetchAndRender() {
          try {
            const res = await fetch('htmlList.json');
            if (!res.ok) {
              listEl.innerHTML = '';
              return;
            }
            const data = await res.json();
            if (!Array.isArray(data) || data.length === 0) {
              listEl.innerHTML = '';
              return;
            }

            let html = '';
            for (const path of data) {
              if (typeof path !== 'string' || path.trim() === '') continue;
              const displayName = path.split('/').pop() || path;
              // square brackets – text‑based "squared"
              html += `<a class="list-item" href="${path}">[ ${displayName} ]</a>`;
            }
            listEl.innerHTML = html || '';
          } catch (_) {
            listEl.innerHTML = '';
          }
        }

        fetchAndRender();
      })();
    </script>
  </body>
</html>
