<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>launch · shortcuts</title>
  <style>
    /* ----- Firefox home page inspired: dark, clean, minimal, no animations ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1c1b22;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: Verdana, Geneva, sans-serif;
      padding: 2rem 1.5rem;
      line-height: 1.5;
      color: #fbfbfe;
    }

    .container {
      max-width: 820px;
      width: 100%;
      padding-top: 1rem;
    }

    /* ----- Firefox-style header (no search, just title) ----- */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 0.8rem;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid #3a3940;
    }

    .header-title {
      font-size: 1.2rem;
      font-weight: 400;
      color: #fbfbfe;
      letter-spacing: 0.02em;
    }

    .header-title span {
      color: #9b9aa2;
      font-size: 0.85rem;
      margin-left: 0.4rem;
    }

    .header-badge {
      font-size: 0.7rem;
      background: #2b2a32;
      padding: 0.15rem 0.7rem;
      border-radius: 20px;
      color: #b1b0b8;
      border: 1px solid #3a3940;
    }

    /* ----- category groups (Firefox-style tiles) ----- */
    .category-group {
      margin-bottom: 1.8rem;
    }

    .category-group:last-child {
      margin-bottom: 0;
    }

    .category-header {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
      padding-bottom: 0.2rem;
      border-bottom: 1px solid #2b2a32;
    }

    .category-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: #cfced6;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .category-count {
      font-size: 0.6rem;
      background: #2b2a32;
      padding: 0.05rem 0.6rem;
      border-radius: 12px;
      color: #9b9aa2;
      border: 1px solid #3a3940;
    }

    .shortcut-grid {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      padding-left: 0.2rem;
    }

    /* ----- Firefox-style link: clean, subtle hover, no icons ----- */
    .shortcut-item {
      display: block;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      background: transparent;
      border: none;
      text-decoration: none;
      color: #fbfbfe;
      font-family: Verdana, Geneva, sans-serif;
      font-size: 0.9rem;
      transition: none;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }

    .shortcut-item:hover {
      background: #2b2a32;
    }

    .shortcut-item:active {
      background: #3a3940;
    }

    .shortcut-path {
      font-size: 0.6rem;
      color: #7a7980;
      margin-left: 0.5rem;
      font-weight: 400;
    }

    /* hide container when empty */
    #shortcutContainer:empty {
      display: none;
    }

    /* ----- footer (Firefox-style subtle) ----- */
    .footer {
      border-top: 1px solid #2b2a32;
      margin-top: 2rem;
      padding-top: 0.8rem;
      display: flex;
      justify-content: flex-end;
      font-size: 0.6rem;
      color: #7a7980;
      letter-spacing: 0.01em;
    }

    .footer span {
      margin-left: 0.8rem;
    }

    /* tiny screens */
    @media (max-width: 480px) {
      body {
        padding: 1rem 0.8rem;
      }
      .header-title {
        font-size: 1rem;
      }
      .shortcut-item {
        font-size: 0.85rem;
        padding: 0.25rem 0.4rem;
      }
      .category-name {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

<div class="container" role="main">
  <!-- Firefox-style header: simple title, no search -->
  <div class="header">
    <div class="header-title">
      shortcuts <span>· launch</span>
    </div>
    <div class="header-badge" id="countBadge">0</div>
  </div>

  <!-- container: pure text-based shortcuts -->
  <div id="shortcutContainer"></div>

  <!-- footer -->
  <div class="footer">
    <span id="fileSource">htmlList.json</span>
    <span id="totalItems">0 entries</span>
  </div>
</div>

<script>
  (function() {
    "use strict";

    const container = document.getElementById('shortcutContainer');
    const countBadge = document.getElementById('countBadge');
    const totalItemsSpan = document.getElementById('totalItems');

    // ---------- create one text-only shortcut (Firefox style) ----------
    function createShortcutItem(filePath) {
      const fileName = filePath.includes('/') ? filePath.split('/').pop() : filePath;
      let displayName = fileName.replace(/\.html$/i, '');
      if (displayName === '') displayName = fileName;

      let folder = '';
      if (filePath.includes('/')) {
        const parts = filePath.split('/');
        if (parts.length >= 2) folder = parts[0];
      }

      const anchor = document.createElement('a');
      anchor.className = 'shortcut-item';
      anchor.href = filePath;
      anchor.setAttribute('aria-label', `Open ${displayName}`);

      const textNode = document.createTextNode(displayName);
      anchor.appendChild(textNode);

      if (folder) {
        const pathSpan = document.createElement('span');
        pathSpan.className = 'shortcut-path';
        pathSpan.textContent = `[${folder}]`;
        anchor.appendChild(pathSpan);
      }

      return anchor;
    }

    // ---------- get folder from path ----------
    function getFolderFromPath(filePath) {
      if (!filePath || typeof filePath !== 'string') return '';
      const trimmed = filePath.trim();
      if (!trimmed.includes('/')) return '';
      const parts = trimmed.split('/');
      const folder = parts.find(seg => seg.length > 0);
      return folder || '';
    }

    // ---------- render categorized groups ----------
    function renderList(fileList) {
      container.innerHTML = '';

      if (!fileList || !Array.isArray(fileList) || fileList.length === 0) {
        countBadge.textContent = '0';
        totalItemsSpan.textContent = '0 entries';
        return;
      }

      const validPaths = fileList.filter(item => typeof item === 'string' && item.trim().length > 0);
      if (validPaths.length === 0) {
        countBadge.textContent = '0';
        totalItemsSpan.textContent = '0 entries';
        return;
      }

      // group by folder
      const groups = new Map();
      for (const path of validPaths) {
        const folder = getFolderFromPath(path);
        if (!groups.has(folder)) {
          groups.set(folder, []);
        }
        groups.get(folder).push(path);
      }

      // sort folders: root first, then alphabetically
      const sortedFolders = Array.from(groups.keys()).sort((a, b) => {
        if (a === '') return -1;
        if (b === '') return 1;
        return a.localeCompare(b);
      });

      const fragment = document.createDocumentFragment();
      let totalCount = 0;

      for (const folder of sortedFolders) {
        const paths = groups.get(folder);
        if (!paths || paths.length === 0) continue;

        // sort by filename
        paths.sort((a, b) => {
          const nameA = a.split('/').pop() || a;
          const nameB = b.split('/').pop() || b;
          return nameA.localeCompare(nameB);
        });

        const groupDiv = document.createElement('div');
        groupDiv.className = 'category-group';

        // header
        const headerDiv = document.createElement('div');
        headerDiv.className = 'category-header';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'category-name';
        nameSpan.textContent = folder || 'root';

        const countSpan = document.createElement('span');
        countSpan.className = 'category-count';
        countSpan.textContent = paths.length;

        headerDiv.appendChild(nameSpan);
        headerDiv.appendChild(countSpan);
        groupDiv.appendChild(headerDiv);

        // grid (links)
        const gridDiv = document.createElement('div');
        gridDiv.className = 'shortcut-grid';

        for (const path of paths) {
          gridDiv.appendChild(createShortcutItem(path));
        }

        groupDiv.appendChild(gridDiv);
        fragment.appendChild(groupDiv);

        totalCount += paths.length;
      }

      container.appendChild(fragment);
      countBadge.textContent = totalCount;
      totalItemsSpan.textContent = totalCount + ' entries';
    }

    // ---------- fetch: silent fail ----------
    function fetchList() {
      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) {
            container.innerHTML = '';
            countBadge.textContent = '0';
            totalItemsSpan.textContent = '0 entries';
            return;
          }
          return response.json();
        })
        .then(data => {
          let list = [];
          if (Array.isArray(data)) {
            list = data;
          } else if (data && typeof data === 'object') {
            const values = Object.values(data);
            if (values.some(v => typeof v === 'string')) {
              list = values.filter(v => typeof v === 'string');
            } else {
              list = [];
            }
          }
          renderList(list);
        })
        .catch(() => {
          container.innerHTML = '';
          countBadge.textContent = '0';
          totalItemsSpan.textContent = '0 entries';
        });
    }

    fetchList();
  })();
</script>
</body>
</html>
