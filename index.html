<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>~ // search</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        verdana: ['Verdana', 'Geneva', 'sans-serif'],
                    },
                },
            },
        };
    </script>
</head>
<body class="h-full font-mono bg-[#050505] text-[#a1a1aa] flex flex-col p-6 selection:bg-neutral-800 selection:text-white overflow-hidden relative">

    <!-- Top Bar: Left-aligned Search & Right-aligned Action Menus -->
    <div class="w-full flex flex-col md:flex-row md:items-center justify-between gap-4 z-40 mb-auto">
        <!-- Search Container moved to Top Left -->
        <div class="w-full max-w-md">
            <form id="search-form" class="relative group">
                <!-- Terminal-style command prompt symbol -->
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-500 select-none">
                    $
                </div>
                <input type="text"
                id="search-input"
                placeholder="Search items (e.g., graphics card, keycard)..."
                autocomplete="off"
                autofocus
                disabled
                class="w-full bg-[#09090b] text-white placeholder-neutral-700 pl-8 pr-4 py-2.5 rounded border border-neutral-800/80 focus:border-neutral-500 focus:outline-none focus:ring-1 focus:ring-neutral-500 transition-all font-mono text-sm shadow-md disabled:opacity-50"
                />
            </form>
        </div>

        <!-- Top Right Action Area: 8-Dot Menu + 9-Dot Menu + Profile Picture Dropdown -->
        <div class="flex items-center gap-3 self-end md:self-auto">
            
            <!-- 8-Dot Menu Button & Dropdown (htmlList.json) -->
            <div class="relative">
                <button id="menu-btn-8" aria-label="HTML Index Menu" class="w-10 h-10 flex items-center justify-center rounded border border-neutral-800 hover:border-neutral-500 bg-neutral-900/50 hover:bg-neutral-900 text-neutral-500 hover:text-neutral-200 transition-all duration-300 focus:outline-none">
                    <!-- SVG 9-Dot Grid Icon with Middle Dot Missing -->
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <!-- Top Row -->
                        <circle cx="6" cy="6" r="2"/>
                        <circle cx="12" cy="6" r="2"/>
                        <circle cx="18" cy="6" r="2"/>
                        <!-- Middle Row (Center dot omitted) -->
                        <circle cx="6" cy="12" r="2"/>
                        <circle cx="18" cy="12" r="2"/>
                        <!-- Bottom Row -->
                        <circle cx="6" cy="18" r="2"/>
                        <circle cx="12" cy="18" r="2"/>
                        <circle cx="18" cy="18" r="2"/>
                    </svg>
                </button>

                <!-- 8-Dot Dropdown Menu -->
                <div id="dropdown-8" class="hidden absolute right-0 mt-2 w-64 bg-[#09090b] border border-neutral-800/80 rounded shadow-2xl p-2 z-50 flex flex-col transition-all">
                    <div class="text-[10px] text-neutral-600 px-3 py-1.5 border-b border-neutral-800/60 font-mono mb-1 uppercase tracking-widest select-none">
                        HTML Index
                    </div>
                    <div id="list-8" class="flex flex-col gap-1 max-h-64 overflow-y-auto">
                        <div class="text-xs text-neutral-600 px-3 py-2 font-mono italic animate-pulse">Loading HTML list...</div>
                    </div>
                </div>
            </div>
            
            <!-- 9-Dot Menu Button & Dropdown (htmlToolsList.json) -->
            <div class="relative">
                <button id="menu-btn-9" aria-label="Tools Menu" class="w-10 h-10 flex items-center justify-center rounded border border-neutral-800 hover:border-neutral-500 bg-neutral-900/50 hover:bg-neutral-900 text-neutral-500 hover:text-neutral-200 transition-all duration-300 focus:outline-none">
                    <!-- SVG 9-Dot Grid Icon (3x3 design) -->
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="6" cy="6" r="2"/>
                        <circle cx="12" cy="6" r="2"/>
                        <circle cx="18" cy="6" r="2"/>
                        <circle cx="6" cy="12" r="2"/>
                        <circle cx="12" cy="12" r="2"/>
                        <circle cx="18" cy="12" r="2"/>
                        <circle cx="6" cy="18" r="2"/>
                        <circle cx="12" cy="18" r="2"/>
                        <circle cx="18" cy="18" r="2"/>
                    </svg>
                </button>

                <!-- 9-Dot Dropdown Menu -->
                <div id="dropdown-9" class="hidden absolute right-0 mt-2 w-64 bg-[#09090b] border border-neutral-800/80 rounded shadow-2xl p-2 z-50 flex flex-col transition-all">
                    <div class="text-[10px] text-neutral-600 px-3 py-1.5 border-b border-neutral-800/60 font-mono mb-1 uppercase tracking-widest select-none">
                        HTML Tools
                    </div>
                    <div id="list-9" class="flex flex-col gap-1 max-h-64 overflow-y-auto">
                        <div class="text-xs text-neutral-600 px-3 py-2 font-mono italic animate-pulse">Loading tools...</div>
                    </div>
                </div>
            </div>

            <!-- Profile Picture Wrapper with Floating Character Panel -->
            <div class="relative">
                <button id="generate-char-btn" title="Character Profile" class="w-10 h-10 rounded border border-neutral-800 hover:border-neutral-500 overflow-hidden bg-neutral-900 transition-all duration-300 shadow-md focus:outline-none focus:border-neutral-500 flex items-center justify-center">
                    <img id="profile-pic"
                    alt="Profile"
                    class="w-full h-full object-cover filter grayscale opacity-65 hover:grayscale-0 hover:opacity-100 transition-all duration-300"
                    />
                </button>

                <!-- Character Panel (Google Account Style Floating Card) -->
                <div id="character-card" class="hidden absolute right-0 mt-3 w-80 sm:w-[440px] bg-[#09090b] border border-neutral-800/90 rounded-lg p-5 shadow-2xl z-50 flex flex-col transition-all">
                    
                    <div class="space-y-4">
                        <!-- Name & Profession -->
                        <div>
                            <h2 id="char-name" class="text-xl font-bold text-white tracking-wide">Initializing...</h2>
                            <p id="char-title" class="text-xs text-neutral-500 font-mono mt-0.5 uppercase tracking-wider">Acquiring files...</p>
                        </div>

                        <!-- Attributes Lineup -->
                        <div id="char-attributes" class="grid grid-cols-2 sm:grid-cols-3 gap-2 py-3 border-y border-neutral-800/40">
                            <!-- Dynamic Stat Items go here -->
                        </div>

                        <!-- Biography paragraph -->
                        <div class="space-y-1.5 mt-2">
                            <h4 class="text-[9px] text-neutral-600 uppercase tracking-widest font-mono select-none">Biographical Logs</h4>
                            <p id="char-bio" class="text-xs text-neutral-400 leading-relaxed font-mono">
                                Loading bio profile...
                            </p>
                        </div>
                    </div>

                    <!-- Card footer summary -->
                    <div class="mt-4 flex flex-col gap-1.5 border-t border-neutral-800/40 pt-3 text-[10px] text-neutral-500 font-mono">
                        <div>
                            Birthplace: <span id="char-birthplace" class="text-neutral-300">N/A</span>
                        </div>
                        <div>
                            Patron/Idol: <span id="char-idol" class="text-neutral-300">N/A</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Workspace: Search Results Panel -->
    <div class="flex-1 flex flex-col items-center justify-start w-full max-w-4xl mx-auto my-8 overflow-y-auto px-2">
        <div id="tarkov-results" class="hidden w-full space-y-4">
            <div class="flex items-center justify-between border-b border-neutral-900 pb-2 text-xs text-neutral-500 font-mono">
                <div>DATABASE INDEX MATCHES: <span id="results-count" class="text-white">0</span></div>
                <button id="clear-search-btn" class="hover:text-white transition-colors">[ Reset ]</button>
            </div>
            
            <!-- Target results container formatted to use the Verdana font family stack -->
            <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 font-verdana w-full">
                <!-- Tarkov search entries loaded dynamically -->
            </div>
        </div>

        <div id="loading-spinner" class="hidden my-auto flex flex-col items-center gap-3">
            <div class="w-8 h-8 border-2 border-neutral-800 border-t-neutral-400 rounded-full animate-spin"></div>
            <span id="loading-text" class="text-xs text-neutral-600 font-mono tracking-widest uppercase">Initializing tarkov.dev offline cache...</span>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchForm = document.getElementById('search-form');
        const profilePic = document.getElementById('profile-pic');
        const generateCharBtn = document.getElementById('generate-char-btn');
        
        // 8-Dot Menu elements
        const menuBtn8 = document.getElementById('menu-btn-8');
        const dropdown8 = document.getElementById('dropdown-8');
        const list8 = document.getElementById('list-8');
        
        // 9-Dot Menu elements
        const menuBtn9 = document.getElementById('menu-btn-9');
        const dropdown9 = document.getElementById('dropdown-9');
        const list9 = document.getElementById('list-9');

        // Character Card fields
        const characterCard = document.getElementById('character-card');
        const charName = document.getElementById('char-name');
        const charTitle = document.getElementById('char-title');
        const charAttributes = document.getElementById('char-attributes');
        const charBio = document.getElementById('char-bio');
        const charBirthplace = document.getElementById('char-birthplace');
        const charIdol = document.getElementById('char-idol');

        // Results panel
        const tarkovResults = document.getElementById('tarkov-results');
        const resultsCount = document.getElementById('results-count');
        const resultsGrid = document.getElementById('results-grid');
        const clearSearchBtn = document.getElementById('clear-search-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const loadingText = document.getElementById('loading-text');

        // Fallback local constants matching requested files
        const DEFAULT_HTML_LIST = ["tools/txt2json.html", "tarkov/tarkovdb.html"];
        const DEFAULT_TOOLS_LIST = ["tools/txt2json.html"];

        // Global Tarkov items database memory cache
        let tarkovLocalCache = [];

        // Cooldown configuration (3 minutes in milliseconds)
        const COOLDOWN_DURATION = 3 * 60 * 1000;

        // ─── Dynamic Font Settings Loader ───────────────────────────────
        async function loadFontSettings() {
            try {
                // Fetch settings from settings/fonts/index.json
                const response = await fetch('settings/fonts/index.json');
                if (!response.ok) {
                    throw new Error('Could not find settings/fonts/index.json');
                }
                const settings = await response.json();

                // 1. Inject the Google Fonts stylesheet link dynamically if present
                if (settings.fonts && settings.fonts.mono && settings.fonts.mono.importUrl) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = settings.fonts.mono.importUrl;
                    document.head.appendChild(link);
                }

                // 2. Build and inject a clean style override mapping Tailwind utility classes
                const style = document.createElement('style');
                style.textContent = `
                    .font-mono {
                        font-family: '${settings.fonts.mono.name}', ${settings.fonts.mono.fallback.join(', ')};
                    }
                    .font-verdana {
                        font-family: '${settings.fonts.verdana.name}', ${settings.fonts.verdana.fallback.join(', ')};
                    }
                `;
                document.head.appendChild(style);
                console.log(`📡 QUANT-X Dynamic Fonts successfully loaded: ${settings.systemName}`);
            } catch (err) {
                console.warn('Failed to resolve settings/fonts/index.json, operating under standard web safe typography.', err);
                
                // Static local recovery stylesheet
                const style = document.createElement('style');
                style.textContent = `
                    .font-mono { font-family: 'JetBrains Mono', monospace; }
                    .font-verdana { font-family: 'Verdana', sans-serif; }
                `;
                document.head.appendChild(style);
            }
        }

        // ─── Search Form Submission & Instant Local Search Logic ──────────
        searchInput.addEventListener('input', function() {
            const query = searchInput.value.trim().toLowerCase();
            if (query.length > 1) {
                performLocalTarkovSearch(query);
            } else if (query.length === 0) {
                tarkovResults.classList.add('hidden');
            }
        });

        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const query = searchInput.value.trim().toLowerCase();
            if (query) {
                performLocalTarkovSearch(query);
            }
        });

        clearSearchBtn.addEventListener('click', function() {
            searchInput.value = '';
            tarkovResults.classList.add('hidden');
            searchInput.focus();
        });

        // Helper to format item names cleanly into valid tarkov-market URL structures
        function getTarkovMarketUrl(name) {
            if (!name) return '#';
            const cleaned = name.toLowerCase()
                                .trim()
                                .replace(/\s+/g, '_'); // Replace one or more spaces with underscores
            return `https://tarkov-market.com/item/${cleaned}`;
        }

        // ─── Pre-fetch tarkov.dev Database with Cooldown ──────────────────
        async function prefetchTarkovDatabase() {
            const now = Date.now();
            const lastFetchStr = localStorage.getItem('tarkov_last_fetch_timestamp');
            const cachedDataStr = localStorage.getItem('tarkov_offline_cache');

            // 1. If we have cached data and we are still inside the 3-minute cooldown period, load immediately from local storage.
            if (cachedDataStr && lastFetchStr) {
                const lastFetch = parseInt(lastFetchStr, 10);
                if (now - lastFetch < COOLDOWN_DURATION) {
                    try {
                        tarkovLocalCache = JSON.parse(cachedDataStr);
                        searchInput.disabled = false;
                        searchInput.placeholder = "Type to search instantly... (Cached)";
                        console.log('Tarkov database loaded from local cache (under 3-min cooldown limit).');
                        return;
                    } catch (e) {
                        console.warn('Failed to parse offline Tarkov cache, refetching...', e);
                    }
                }
            }

            // 2. Otherwise, perform the network query to tarkov.dev
            loadingSpinner.classList.remove('hidden');
            loadingText.textContent = "Caching database entries...";

            const graphqlQuery = {
                query: `query {
                    items {
                        id
                        name
                        shortName
                        basePrice
                        width
                        height
                        wikiLink
                        iconLink
                        types
                        avg24hPrice
                        lastLowPrice
                    }
                }`
            };

            try {
                const response = await fetch('https://api.tarkov.dev/graphql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(graphqlQuery)
                });

                if (!response.ok) {
                    throw new Error('Initial sync failure');
                }

                const result = await response.json();
                
                // GraphQL returns 200 OK even if there are query errors, we need to check for the errors array
                if (result.errors) {
                    console.error('GraphQL Query Errors:', result.errors);
                    throw new Error(result.errors[0].message);
                }

                tarkovLocalCache = result.data?.items || [];
                
                // Save loaded items and update timestamp in localStorage
                try {
                    localStorage.setItem('tarkov_offline_cache', JSON.stringify(tarkovLocalCache));
                    localStorage.setItem('tarkov_last_fetch_timestamp', now.toString());
                } catch (storageErr) {
                    console.warn('Could not write database items to localStorage (limit exceeded or disabled):', storageErr);
                }

                // Enable search input once data is successfully cached
                searchInput.disabled = false;
                searchInput.placeholder = "Type to search instantly...";
            } catch (err) {
                console.error('Tarkov pre-fetch initialization error:', err);
                
                // Fallback: If network is offline/throttled but we have expired cached data, use it as fallback
                if (cachedDataStr) {
                    try {
                        tarkovLocalCache = JSON.parse(cachedDataStr);
                        searchInput.disabled = false;
                        searchInput.placeholder = "Type to search instantly (Fallback offline cache)";
                        console.log('Using expired cache as offline fallback.');
                    } catch (e) {
                        searchInput.placeholder = "Connection Offline. Reload page.";
                    }
                } else {
                    searchInput.placeholder = "Connection Offline. Reload page.";
                }
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        }

        // Perform fast, local searches across preloaded memory cache
        function performLocalTarkovSearch(queryStr) {
            tarkovResults.classList.remove('hidden');
            
            // Filter pre-loaded items in local memory
            const matchedItems = tarkovLocalCache.filter(item => {
                const name = item.name ? item.name.toLowerCase() : '';
                const shortName = item.shortName ? item.shortName.toLowerCase() : '';
                return name.includes(queryStr) || shortName.includes(queryStr);
            });

            // Cap visible items to top 50 matches to keep DOM light and rendering super fast
            const limitedMatches = matchedItems.slice(0, 50);
            renderTarkovItems(limitedMatches);
        }

        function renderTarkovItems(items) {
            resultsCount.textContent = items.length;

            if (items.length === 0) {
                resultsGrid.innerHTML = `
                    <div class="col-span-full border border-dashed border-neutral-900 p-6 rounded text-center select-none font-verdana">
                        <p class="text-sm text-neutral-500">No matching items found in local cache.</p>
                    </div>
                `;
                return;
            }

            resultsGrid.innerHTML = items.map(item => {
                const types = item.types ? item.types.slice(0, 3).join(', ') : 'unknown';
                const formattedBasePrice = item.basePrice ? new Intl.NumberFormat().format(item.basePrice) + ' ₽' : 'N/A';
                
                // Approximate Flea Banned status: If both recent flea prices are missing/0, it's highly likely banned
                const isBanned = !item.lastLowPrice && !item.avg24hPrice;
                
                // Safely match PVP and PVE values with fallback checks
                const pvpRawVal = item.lastLowPrice || item.avg24hPrice;

                const pvpPrice = isBanned ? 'BANNED' : (pvpRawVal ? new Intl.NumberFormat().format(pvpRawVal) + ' ₽' : 'N/A');

                const wikiUrl = item.wikiLink || '#';
                const marketUrl = getTarkovMarketUrl(item.name);
                
                return `
                    <div class="bg-[#09090b]/60 border border-neutral-800 hover:border-neutral-700 rounded p-5 flex flex-col justify-between transition-all duration-300 font-verdana shadow-lg">
                        <div class="space-y-3">
                            <div class="flex items-start justify-between gap-4">
                                <div class="flex-1">
                                    <h3 class="text-sm font-bold text-white tracking-normal leading-snug line-clamp-2">
                                        <a href="${wikiUrl}" target="_blank" class="hover:underline hover:text-neutral-200 decoration-neutral-600 transition-colors">
                                            ${item.name}
                                        </a>
                                    </h3>
                                    <p class="text-[10px] text-neutral-500 uppercase tracking-wider mt-1 font-mono">${item.shortName || 'Item'}</p>
                                </div>
                                <div class="w-12 h-10 shrink-0 bg-neutral-950/40 border border-neutral-900 rounded p-1 flex items-center justify-center">
                                    <a href="${wikiUrl}" target="_blank" class="w-full h-full flex items-center justify-center">
                                        <img src="${item.iconLink || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23333%22 stroke-width=%222%22%3E%3Crect x=%223%22 y=%223%22 width=%2218%22 height=%2218%22 rx=%222%22/%3E%3C/svg%3E'}" 
                                             alt="${item.shortName}" 
                                             class="max-w-full max-h-full object-contain filter brightness-90 hover:brightness-110 transition-all"
                                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23333%22 stroke-width=%222%22%3E%3Crect x=%223%22 y=%223%22 width=%2218%22 height=%2218%22 rx=%222%22/%3E%3C/svg%3E'"/>
                                    </a>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3 text-[11px] leading-relaxed pt-3 border-t border-neutral-900/40">
                                <div>
                                    <span class="text-neutral-500 block uppercase text-[9px] font-bold tracking-wide select-none mb-0.5">Base Value</span>
                                    <span class="text-neutral-200 font-medium">${formattedBasePrice}</span>
                                </div>
                                <div>
                                    <span class="text-neutral-500 block uppercase text-[9px] font-bold tracking-wide select-none mb-0.5">Grid Size</span>
                                    <span class="text-neutral-200 font-medium">${item.width} × ${item.height}</span>
                                </div>
                                <div>
                                    <span class="text-neutral-500 block uppercase text-[9px] font-bold tracking-wide select-none mb-0.5">PvP Price</span>
                                    <span class="${isBanned ? 'text-red-500 font-bold' : 'text-neutral-200 font-medium'}">
                                        <a href="${marketUrl}" target="_blank" class="hover:underline transition-colors">${pvpPrice}</a>
                                    </span>
                                </div>
                                <div>
                                    <span class="text-neutral-500 block uppercase text-[9px] font-bold tracking-wide select-none mb-0.5">PvE Price</span>
                                    <span class="${isBanned ? 'text-red-500 font-bold' : 'text-neutral-200 font-medium'}">
                                        <a href="${marketUrl}" target="_blank" class="hover:underline transition-colors">${pvpPrice}</a>
                                    </span>
                                </div>
                                <div class="col-span-2">
                                    <span class="text-neutral-500 block uppercase text-[9px] font-bold tracking-wide select-none mb-0.5">Categories</span>
                                    <span class="text-neutral-300 truncate block text-[10px]" title="${types}">${types}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ─── Dropdown Toggling ────────────────────────────────────
        menuBtn8.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown9.classList.add('hidden'); 
            characterCard.classList.add('hidden');
            dropdown8.classList.toggle('hidden');
        });

        menuBtn9.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown8.classList.add('hidden'); 
            characterCard.classList.add('hidden');
            dropdown9.classList.toggle('hidden');
        });

        generateCharBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown8.classList.add('hidden');
            dropdown9.classList.add('hidden');
            
            const isOpening = characterCard.classList.contains('hidden');
            if (isOpening) {
                generateRandomCharacter();
            }
            characterCard.classList.toggle('hidden');
        });

        document.addEventListener('click', function(e) {
            // Close dropdowns if clicked outside
            if (!dropdown8.contains(e.target) && !menuBtn8.contains(e.target)) {
                dropdown8.classList.add('hidden');
            }
            if (!dropdown9.contains(e.target) && !menuBtn9.contains(e.target)) {
                dropdown9.classList.add('hidden');
            }
            if (!characterCard.contains(e.target) && !generateCharBtn.contains(e.target)) {
                characterCard.classList.add('hidden');
            }
        });

        // Helper to resolve URLs correctly in sandboxed/blob environments
        function getAbsoluteUrl(path) {
            try {
                const base = window.location.protocol === 'blob:' ? window.location.origin : window.location.href;
                return new URL(path, base).href;
            } catch (e) {
                console.error('Failed to resolve absolute URL:', e);
                return path;
            }
        }

        // ─── Fetch and Render Menus ───────────────────────────────
        
        // Fetch 8-Dot HTML List
        async function fetchHtmlList() {
            try {
                const url = getAbsoluteUrl('htmlList.json');
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('Could not load htmlList.json');
                }
                const items = await response.json();
                renderMenu(items, list8);
            } catch (error) {
                console.warn('Could not fetch htmlList.json, using local fallback:', error);
                renderMenu(DEFAULT_HTML_LIST, list8);
            }
        }

        // Fetch 9-Dot Tools List
        async function fetchToolsList() {
            try {
                const url = getAbsoluteUrl('htmlToolsList.json');
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('Could not load htmlToolsList.json');
                }
                const tools = await response.json();
                renderMenu(tools, list9);
            } catch (error) {
                console.warn('Could not fetch htmlToolsList.json, using local fallback:', error);
                renderMenu(DEFAULT_TOOLS_LIST, list9);
            }
        }

        function formatToolName(path) {
            const filename = path.substring(path.lastIndexOf('/') + 1);
            return filename.replace('.html', '');
        }

        function renderMenu(items, targetElement) {
            if (!items || items.length === 0) {
                targetElement.innerHTML = `
                    <div class="text-xs text-neutral-600 px-3 py-2 font-mono italic">
                        No entries found
                    </div>
                `;
                return;
            }

            targetElement.innerHTML = items.map(path => {
                const name = formatToolName(path);
                const absolutePath = getAbsoluteUrl(path);
                return `
                    <a href="${absolutePath}" class="flex items-center gap-2 px-3 py-2 rounded text-sm text-neutral-400 hover:text-white hover:bg-neutral-800/50 transition-colors duration-200 font-mono">
                        <span class="text-neutral-700 select-none">&gt;_</span>
                        <span class="truncate">${name}</span>
                    </a>
                `;
            }).join('');
        }

        // ─── Character Generator (DnD files loading) ───────────────
        let loadedCharacterData = {
            names: [],
            birthplaces: [],
            idols: [],
            professions: [],
            attributes: {},
            biographies: {}
        };

        async function preloadCharacterResources() {
            const fetchResource = async (filename, defaultValue) => {
                try {
                    const response = await fetch(getAbsoluteUrl(filename));
                    if (response.ok) return await response.json();
                } catch (e) {
                    console.warn(`Could not load ${filename}:`, e);
                }
                return defaultValue;
            };

            // Parallel loading of files
            const [names, birthplaces, idols, professions, attributes, biographies] = await Promise.all([
                fetchResource('listOfNames.json', ["Aria", "Valen", "Dax"]),
                fetchResource('listOfBirthPlaces.json', ["Neverwinter", "Waterdeep"]),
                fetchResource('listOfIdols.json', ["The Harpers", "Elminster"]),
                fetchResource('listOfProfessions.json', ["Fighter", "Wizard", "Rogue"]),
                fetchResource('listOfAttributes.json', { 
                    "Strength": ["Mighty"], 
                    "Dexterity": ["Agile"], 
                    "Constitution": ["Resilient"], 
                    "Intelligence": ["Wise"], 
                    "Wisdom": ["Insightful"], 
                    "Charisma": ["Charming"] 
                }),
                fetchResource('rndBiography.json', { reputation: ["Known,"], background: ["trained,"], rumor: ["searching,"], secret: ["has a key."] })
            ]);

            loadedCharacterData = { names, birthplaces, idols, professions, attributes, biographies };
            
            // Generate the first character once resources are loaded
            generateRandomCharacter();
        }

        function getRandomElement(arr) {
            if (!arr || arr.length === 0) return '';
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateRandomCharacter() {
            const data = loadedCharacterData;

            // Random Name (Consists of exactly two elements from listOfNames.json)
            const firstName = getRandomElement(data.names) || "Adventurer";
            const lastName = getRandomElement(data.names) || "";
            charName.textContent = `${firstName} ${lastName}`.trim();

            // Random Profession
            const profession = getRandomElement(data.professions) || "Hero";
            charTitle.textContent = `${profession}`;

            // Random Birthplace
            const birthplaceObj = getRandomElement(data.birthplaces);
            const birthplace = birthplaceObj ? (birthplaceObj.name || birthplaceObj) : "Unknown Realm";
            charBirthplace.textContent = birthplace;

            // Random Idol
            const idolObj = getRandomElement(data.idols);
            const idol = idolObj ? (idolObj.name || idolObj) : "The Unknown God";
            charIdol.textContent = idol;

            // Generate attributes for all 6 categories
            charAttributes.innerHTML = '';
            const allCoreStats = ["Strength", "Dexterity", "Constitution", "Intelligence", "Wisdom", "Charisma"];
            
            allCoreStats.forEach(stat => {
                // Fetch random trait matching this attribute from user files
                const traitList = data.attributes[stat] || ["Standard"];
                const trait = getRandomElement(traitList);
                
                // Generate simulated stat value (8-18 typical of DnD stats)
                const val = Math.floor(Math.random() * 11) + 8;
                
                const statDiv = document.createElement('div');
                statDiv.className = 'bg-neutral-900/40 border border-neutral-800/40 p-2 rounded text-left';
                statDiv.innerHTML = `
                    <div class="text-[9px] text-neutral-600 uppercase font-mono tracking-wider select-none">${stat}</div>
                    <div class="text-xs text-white font-bold font-mono">${val} <span class="text-neutral-500 font-normal text-[10px]">(${trait})</span></div>
                `;
                charAttributes.appendChild(statDiv);
            });

            // Build dynamic Biography (Combining fields)
            const rep = getRandomElement(data.biographies.reputation) || "An adventurer,";
            const bg = getRandomElement(data.biographies.background) || "trained under mysterious circumstances,";
            const rumor = getRandomElement(data.biographies.rumor) || "said to seek ancient treasures.";
            const secret = getRandomElement(data.biographies.secret) || "They carry a hidden keepsake.";

            charBio.textContent = `${rep} ${bg} ${rumor} ${secret}`;
        }

        // ─── Random profile picture ──────────────────────────────
        function setRandomProfilePic() {
            const randomId = Math.floor(Math.random() * 70) + 1;
            const url = `https://i.pravatar.cc/150?img=${randomId}`;

            // Preload the image to avoid a flash of the fallback.
            const img = new Image();
            img.onload = function() {
                profilePic.src = url;
            };
            img.onerror = function() {
                // Ultimate fallback: a clean gradient silhouette.
                profilePic.src =
                'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22 viewBox=%220 0 40 40%22%3E%3Crect width=%2240%22 height=%2240%22 fill=%22%23222222%22/%3E%3Ccircle cx=%2220%22 cy=%2216%22 r=%228%22 fill=%22%23555555%22/%3E%3Cpath d=%22M8 36c0-6.627 5.373-12 12-12s12 5.373 12 12%22 fill=%22%23555555%22/%3E%3C/svg%3E';
            };
            img.src = url;
        }

        // ─── Init ──────────────────────────────────────────────────
        window.onload = async function() {
            // First load the fonts settings dynamically
            await loadFontSettings();

            // Focus on search input
            searchInput.focus();

            // Setup profile pic exactly once on load
            setRandomProfilePic();

            // Run async calls
            preloadCharacterResources();
            fetchHtmlList();
            fetchToolsList();
            
            // Prefetch and cache the entire Tarkov database locally
            await prefetchTarkovDatabase();
        };
    </script>
</body>
