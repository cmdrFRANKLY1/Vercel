<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>black · tools dashboard</title>
    <style>
        /* ----- reset – no shadows, no frills ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            min-height: 100vh;
            font-family: 'Verdana', 'Geneva', 'Tahoma', sans-serif;
            color: #f0f0f0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            overflow: hidden;
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* ----- top‑left: ultra-compact tools navigation container ----- */
        .tools-container {
            position: fixed;
            top: 1rem;
            left: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            user-select: none;
            white-space: nowrap;
        }

        .main-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        /* Second-row submenu */
        .sub-nav {
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.85rem;
            opacity: 0;
        }

        .sub-nav.show {
            display: flex;
            animation: fadeIn 0.15s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .tools-container a, .tools-container button {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.4; /* dimmed inactive links */
            transition: opacity 0.15s ease, color 0.15s ease;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
        }

        .tools-container a:hover, .tools-container button:hover {
            opacity: 0.8;
        }

        /* Active link highlight - Solid white */
        .tools-container a.active, .tools-container button.active {
            color: #ffffff !important;
            opacity: 1 !important;
            font-weight: 600;
        }

        /* Custom separator style */
        .separator {
            color: #f0f0f0;
            opacity: 0.2;
            font-weight: 300;
        }

        main {
            display: none;
        }

        /* ----- responsive scaling ----- */
        @media (max-width: 480px) {
            .tools-container {
                top: 0.8rem;
                left: 0.8rem;
                gap: 0.3rem;
                max-width: 100%;
            }
            .main-nav, .sub-nav, .separator {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation container containing only static Home on load -->
    <nav class="tools-container" id="navContainer" aria-label="Tools directory navigation">
        <div class="main-nav" id="mainNav">
            <a href="index.html" class="nav-item active" id="homeLink">home</a>
        </div>
        <!-- Submenus will be dynamically appended here from htmlList.json -->
    </nav>

    <main></main>

    <script {nonce}>
        (function() {
            'use strict';

            const navContainer = document.getElementById('navContainer');
            const mainNav = document.getElementById('mainNav');
            const homeLink = document.getElementById('homeLink');
            const currentPath = window.location.pathname;

            // Mark home active immediately
            homeLink.classList.add('active');

            // Normalizes paths to use standard web URL slashes
            function cleanPath(rawPath) {
                return rawPath.replace(/\\/g, '/');
            }

            // Extracts filename from path without extension (e.g. "tarkov/tarkov.html" -> "tarkov")
            function getToolName(path) {
                const parts = path.split('/');
                const filename = parts[parts.length - 1];
                return filename.replace('.html', '');
            }

            // Fetch list and build category structure
            async function buildNavigation() {
                let toolPaths = [];

                try {
                    let baseUrl = window.location.href;
                    if (baseUrl.startsWith('blob:')) {
                        baseUrl = baseUrl.replace(/^blob:/, '');
                    }

                    let jsonUrl;
                    try {
                        jsonUrl = new URL('htmlList.json', baseUrl).href;
                    } catch (e) {
                        jsonUrl = 'htmlList.json';
                    }
                    
                    const response = await fetch(jsonUrl);
                    if (!response.ok) {
                        throw new Error('Failed to load htmlList.json');
                    }
                    toolPaths = await response.json();
                } catch (error) {
                    // Fail gracefully to an empty array (only displays home)
                    toolPaths = [];
                }

                // Clear any dynamic sub-nav elements if they somehow exist
                const oldSubNavs = navContainer.querySelectorAll('.sub-nav');
                oldSubNavs.forEach(el => el.remove());

                // Categories storage mapped as { categoryName: [ { name, path } ] }
                const categories = {};

                // Group entries into categories based on their top-level folder prefix
                toolPaths.forEach(rawPath => {
                    const targetPath = cleanPath(rawPath);
                    const parts = targetPath.split('/');

                    if (parts.length > 1) {
                        const categoryName = parts[0];
                        const toolName = getToolName(targetPath);

                        if (!categories[categoryName]) {
                            categories[categoryName] = [];
                        }

                        // Guard against duplicate paths
                        if (!categories[categoryName].some(item => item.path === targetPath)) {
                            categories[categoryName].push({ name: toolName, path: targetPath });
                        }
                    }
                });

                // Build main categories menu and associated subnav menus dynamically
                Object.keys(categories).forEach(catName => {
                    // Create and append the main menu separator
                    const separator = document.createElement('span');
                    separator.className = 'separator';
                    separator.textContent = '|';
                    mainNav.appendChild(separator);

                    // Create and append the main category toggle button
                    const btn = document.createElement('button');
                    btn.className = 'nav-item-btn';
                    btn.textContent = catName;
                    mainNav.appendChild(btn);

                    // Create and append the submenu row container
                    const subNav = document.createElement('div');
                    subNav.className = 'sub-nav';
                    subNav.id = `${catName}SubNav`;
                    navContainer.appendChild(subNav);

                    // Handle dynamic interactive toggle click events
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();

                        // Close all other open submenus and clear active statuses
                        const allSubNavs = navContainer.querySelectorAll('.sub-nav');
                        allSubNavs.forEach(sn => {
                            if (sn !== subNav) sn.classList.remove('show');
                        });

                        const allButtons = mainNav.querySelectorAll('.nav-item-btn');
                        allButtons.forEach(b => {
                            if (b !== btn) b.classList.remove('active');
                        });

                        // Toggle current submenu visibility and highlight state
                        const isExpanded = subNav.classList.toggle('show');
                        btn.classList.toggle('active', isExpanded);
                    });

                    // Populate submenu items for this specific category
                    categories[catName].forEach((tool, index) => {
                        if (index > 0) {
                            const subSep = document.createElement('span');
                            subSep.className = 'separator';
                            subSep.textContent = '|';
                            subNav.appendChild(subSep);
                        }

                        // Create hyperlink to tool path
                        const link = document.createElement('a');
                        link.href = tool.path;
                        link.className = 'nav-item';
                        link.textContent = tool.name;

                        // Highlight active link if URL matches targetPath
                        if (currentPath.endsWith(tool.path)) {
                            link.classList.add('active');
                        }

                        subNav.appendChild(link);
                    });
                });
            }

            buildNavigation();
        })();
    </script>

</body>
</html>
