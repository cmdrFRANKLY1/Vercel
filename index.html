<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>launch · shortcuts</title>
  <style>
    /* ----- Pure Text-Based Verdana Theme ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #09090b;          /* Zinc 950 */
      --fg: #f4f4f5;          /* Zinc 100 */
      --accent: #10b981;      /* Emerald 500 (Fallback) */
      --border: #27272a;      /* Zinc 800 */
      --muted: #71717a;       /* Zinc 500 */
      --hover-color: #34d399; /* Emerald 400 (Fallback) */
      --font-sans: Verdana, Geneva, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1.5rem;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 680px;
      width: 100%;
    }

    /* ----- Category Layout ----- */
    .category-group {
      margin-bottom: 2rem;
    }

    .category-title {
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
    }

    .category-title::after {
      content: '';
      flex-grow: 1;
      border-bottom: 1px dashed var(--border);
    }

    .category-count {
      color: var(--accent);
      font-size: 0.7rem;
    }

    /* ----- Bracketed Text Links ----- */
    .shortcut-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .shortcut-item {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--fg);
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
      align-self: flex-start;
      outline: none;
      
      /* Dynamic properties overridden via JS */
      --item-color: var(--accent);
      --item-hover: var(--hover-color);
    }

    /* Standard state bracket style: [ | name | ] */
    .shortcut-item::before {
      content: "[ | ";
      color: var(--muted);
      white-space: pre;
      transition: color 0.1s ease;
    }

    .shortcut-item::after {
      content: " | ]";
      color: var(--muted);
      white-space: pre;
      transition: color 0.1s ease;
    }

    /* Focus and Hover states transition to active hyphens: [- name -] */
    .shortcut-item:hover, .shortcut-item:focus {
      color: var(--item-hover);
    }

    .shortcut-item:hover::before, .shortcut-item:focus::before {
      content: "[-  ";
      color: var(--item-color);
    }

    .shortcut-item:hover::after, .shortcut-item:focus::after {
      content: "  -]";
      color: var(--item-color);
    }

    .shortcut-name {
      padding: 0 0.2rem;
      color: var(--item-color);
      transition: filter 0.1s ease;
    }

    .shortcut-item:hover .shortcut-name, .shortcut-item:focus .shortcut-name {
      filter: brightness(1.2);
    }

    /* ----- Footer Status Bar ----- */
    .footer {
      border-top: 1px solid var(--border);
      margin-top: 3rem;
      padding-top: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--muted);
      user-select: none;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer-source {
      display: flex;
      gap: 0.3rem;
    }
  </style>
</head>
<body>

<div class="container" role="main">
  <!-- Shortcuts Container -->
  <section id="shortcutContainer" aria-label="Shortcuts registry"></section>

  <!-- Terminal Footer Status Bar -->
  <footer class="footer">
    <div class="footer-source">
      <span>SOURCE:</span>
      <span id="fileSource" style="color: var(--muted);">htmlList.json</span>
    </div>
    <div id="totalItems">0 entries total</div>
  </footer>
</div>

<script>
  (function() {
    "use strict";

    const container = document.getElementById('shortcutContainer');
    const totalItemsSpan = document.getElementById('totalItems');

    // Terminal-friendly color palette (high contrast, readable on dark background)
    const COLOR_PALETTE = [
      { main: '#10b981', hover: '#34d399' }, // Emerald
      { main: '#3b82f6', hover: '#60a5fa' }, // Blue
      { main: '#f59e0b', hover: '#fbbf24' }, // Amber
      { main: '#ec4899', hover: '#f472b6' }, // Pink
      { main: '#8b5cf6', hover: '#a78bfa' }, // Purple
      { main: '#06b6d4', hover: '#22d3ee' }, // Cyan
      { main: '#ef4444', hover: '#f87171' }, // Red
      { main: '#a855f7', hover: '#c084fc' }, // Violet
      { main: '#f97316', hover: '#fb923c' }, // Orange
      { main: '#84cc16', hover: '#a3e635' }  // Lime
    ];

    // ---------- Extract folder segment ----------
    function getFolderFromPath(filePath) {
      if (!filePath || typeof filePath !== 'string') return '';
      const trimmed = filePath.trim();
      if (!trimmed.includes('/')) return '';
      const parts = trimmed.split('/');
      const folder = parts.find(seg => seg.length > 0);
      return folder || '';
    }

    // ---------- Parse Shortcut Object ----------
    function parseShortcut(filePath) {
      const fileName = filePath.includes('/') ? filePath.split('/').pop() : filePath;
      let displayName = fileName.replace(/\.html$/i, '');
      if (displayName === '') displayName = fileName;

      const folder = getFolderFromPath(filePath);

      return {
        path: filePath,
        displayName: displayName,
        folder: folder
      };
    }

    // ---------- Render static listing structure ----------
    function renderList(fileList) {
      container.innerHTML = '';

      if (!fileList || !Array.isArray(fileList) || fileList.length === 0) {
        totalItemsSpan.textContent = '0 entries total';
        return;
      }

      // Sanitize paths
      const validPaths = fileList.filter(item => typeof item === 'string' && item.trim().length > 0);
      const shortcuts = validPaths.map(path => parseShortcut(path));

      if (shortcuts.length === 0) {
        totalItemsSpan.textContent = '0 entries total';
        return;
      }

      // Group shortcuts by folder category
      const groups = new Map();
      for (const item of shortcuts) {
        const folder = item.folder;
        if (!groups.has(folder)) {
          groups.set(folder, []);
        }
        groups.get(folder).push(item);
      }

      // Sort folders (root first, then alphabetical)
      const sortedFolders = Array.from(groups.keys()).sort((a, b) => {
        if (a === '') return -1;
        if (b === '') return 1;
        return a.localeCompare(b);
      });

      const fragment = document.createDocumentFragment();

      for (const folder of sortedFolders) {
        const items = groups.get(folder);
        if (!items || items.length === 0) continue;

        // Sort items inside folder alphabetically
        items.sort((a, b) => a.displayName.localeCompare(b.displayName));

        const groupDiv = document.createElement('div');
        groupDiv.className = 'category-group';

        // Textual Category Header
        const headerDiv = document.createElement('div');
        headerDiv.className = 'category-title';
        headerDiv.textContent = folder ? folder.toUpperCase() : 'ROOT';
        
        const countSpan = document.createElement('span');
        countSpan.className = 'category-count';
        countSpan.textContent = ` (x${items.length})`;
        headerDiv.appendChild(countSpan);
        groupDiv.appendChild(headerDiv);

        // Grid of items
        const listDiv = document.createElement('div');
        listDiv.className = 'shortcut-list';

        for (const item of items) {
          const anchor = document.createElement('a');
          anchor.className = 'shortcut-item';
          anchor.href = item.path;
          anchor.setAttribute('aria-label', `Launch ${item.displayName}`);

          // Assign a random color configuration from the palette
          const randomColor = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
          anchor.style.setProperty('--item-color', randomColor.main);
          anchor.style.setProperty('--item-hover', randomColor.hover);

          const nameSpan = document.createElement('span');
          nameSpan.className = 'shortcut-name';
          nameSpan.textContent = item.displayName;

          anchor.appendChild(nameSpan);
          listDiv.appendChild(anchor);
        }

        groupDiv.appendChild(listDiv);
        fragment.appendChild(groupDiv);
      }

      container.appendChild(fragment);

      // Simple footer updates
      totalItemsSpan.textContent = `${shortcuts.length} entries total`;
    }

    // ---------- Fetch registry (No static fallbacks) ----------
    function fetchList() {
      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) throw new Error();
          return response.json();
        })
        .then(data => {
          let list = [];
          if (Array.isArray(data)) {
            list = data;
          } else if (data && typeof data === 'object') {
            const values = Object.values(data);
            list = values.filter(v => typeof v === 'string');
          }
          renderList(list);
        })
        .catch(() => {
          // Keep list fully empty if no file found, adhering to no fallbacks rule
          renderList([]);
        });
    }

    fetchList();
  })();
</script>
</body>
</html>
