<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>local time · 9‑dot menu</title>
  <style>
    /* ── reset & base ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: #d6d6d6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1rem 1rem;
    }

    /* ── clock ── */
    #clock {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      margin-bottom: 2rem;
      text-align: center;
    }

    /* ── folders container ── */
    .folders {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2.5rem 4rem;
      max-width: 1200px;
      width: 100%;
      margin-top: 0.5rem;
    }

    /* ── each folder block ── */
    .folder-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .folder-label {
      font-size: 0.8rem;
      color: #6a6a6a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 0.3rem;
    }

    /* ── 3×3 grid ── */
    .dot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.9rem;
      width: 7rem;
      height: 7rem;
      justify-items: center;
      align-items: center;
    }

    /* ── individual dot ── */
    .dot {
      width: 1.6rem;
      height: 1.6rem;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      cursor: default;
      position: relative;
    }

    /* active dot (has a file) */
    .dot.active {
      background: #b0b0b0;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(176, 176, 176, 0.2);
    }

    .dot.active:hover {
      background: #e6e6e6;
      transform: scale(1.25);
      box-shadow: 0 0 16px rgba(230, 230, 230, 0.3);
    }

    .dot.active:active {
      transform: scale(0.9);
    }

    /* tooltip (shows filename on hover) */
    .dot .tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 0.25rem 0.6rem;
      border-radius: 0.3rem;
      font-size: 0.7rem;
      white-space: nowrap;
      border: 1px solid #333;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .dot.active:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }

    /* ── status / error ── */
    .status {
      color: #8a8a8a;
      font-size: 0.9rem;
      margin-top: 1.5rem;
      text-align: center;
    }

    /* ── overlay (same as before) ── */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(3px);
      display: none;
      z-index: 1000;
      padding: 1.5rem;
    }

    .overlay.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .close-btn {
      position: fixed;
      top: 1.2rem;
      right: 1.8rem;
      background: transparent;
      border: none;
      color: #ff3b3b;
      font-size: 1.4rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      border-radius: 0.3rem;
      transition: background 0.2s, color 0.2s;
      z-index: 1001;
      letter-spacing: 0.05em;
    }

    .close-btn:hover {
      background: rgba(255, 59, 59, 0.15);
      color: #ff6b6b;
    }

    .close-btn:active {
      transform: scale(0.96);
    }

    .overlay-content {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      background: #0b0b0b;
      border-radius: 0.5rem;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
      border: 1px solid #2a2a2a;
    }

    .overlay-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0b0b0b;
    }

    /* ── responsive ── */
    @media (max-width: 640px) {
      #clock {
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
      }

      .folders {
        gap: 1.5rem 2rem;
      }

      .dot-grid {
        width: 5.5rem;
        height: 5.5rem;
        gap: 0.6rem;
      }

      .dot {
        width: 1.2rem;
        height: 1.2rem;
      }

      .close-btn {
        top: 0.8rem;
        right: 1rem;
        font-size: 1.1rem;
        padding: 0.2rem 0.6rem;
      }

      .overlay-content {
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 10px;
        border-radius: 0.3rem;
      }
    }

    @media (max-width: 420px) {
      #clock {
        font-size: 0.85rem;
      }

      .dot-grid {
        width: 4.5rem;
        height: 4.5rem;
        gap: 0.4rem;
      }

      .dot {
        width: 1rem;
        height: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- clock -->
  <div id="clock"></div>

  <!-- folders will be injected here -->
  <div class="folders" id="foldersContainer"></div>
  <div class="status" id="status"></div>

  <!-- overlay -->
  <div class="overlay" id="overlay">
    <button class="close-btn" id="closeBtn">Close</button>
    <div class="overlay-content">
      <iframe id="iframe" src="about:blank"></iframe>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ── clock ──
      const clockEl = document.getElementById('clock');

      function pad(n) {
        return String(n).padStart(2, '0');
      }

      function updateClock() {
        const now = new Date();
        const h = pad(now.getHours());
        const m = pad(now.getMinutes());
        const s = pad(now.getSeconds());
        const day = pad(now.getDate());
        const month = pad(now.getMonth() + 1);
        const year = now.getFullYear();
        clockEl.textContent = `${h}:${m}:${s} // ${day}.${month}.${year}`;
      }

      updateClock();
      setInterval(updateClock, 1000);

      // ── filename formatter ──
      function formatDisplayName(filename) {
        let name = filename.replace(/\.html$/i, '');
        let words = name.split(/(?=[A-Z])/);
        words = words.map(word => word.charAt(0).toUpperCase() + word.slice(1));
        return words.join(' ');
      }

      // ── overlay logic ──
      const overlay = document.getElementById('overlay');
      const iframe = document.getElementById('iframe');
      const closeBtn = document.getElementById('closeBtn');

      function openOverlay(url) {
        iframe.src = url;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeOverlay() {
        overlay.classList.remove('active');
        iframe.src = 'about:blank';
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closeOverlay);
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeOverlay();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) closeOverlay();
      });

      // ── build 9‑dot menu per folder ──
      const container = document.getElementById('foldersContainer');
      const status = document.getElementById('status');

      function buildFolders(grouped) {
        container.innerHTML = '';
        status.textContent = '';

        const folderNames = Object.keys(grouped);
        if (folderNames.length === 0) {
          status.textContent = 'No folders found.';
          return;
        }

        folderNames.forEach(folder => {
          const files = grouped[folder];
          // limit to 9 files per folder (shuffle and take first 9)
          const shuffled = [...files].sort(() => Math.random() - 0.5);
          const selected = shuffled.slice(0, 9);

          // create folder group
          const groupDiv = document.createElement('div');
          groupDiv.className = 'folder-group';

          const label = document.createElement('div');
          label.className = 'folder-label';
          label.textContent = folder.toUpperCase();
          groupDiv.appendChild(label);

          const grid = document.createElement('div');
          grid.className = 'dot-grid';

          // generate 9 dot positions, assign files randomly
          const positions = Array.from({ length: 9 }, (_, i) => i);
          // shuffle positions
          const shuffledPos = positions.sort(() => Math.random() - 0.5);
          // map each file to a random position (first 'selected.length' positions)
          const positionMap = {};
          for (let i = 0; i < selected.length; i++) {
            positionMap[shuffledPos[i]] = selected[i];
          }

          // create dots
          for (let i = 0; i < 9; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (positionMap.hasOwnProperty(i)) {
              const filePath = positionMap[i];
              dot.classList.add('active');
              // tooltip with formatted name
              const tooltip = document.createElement('span');
              tooltip.className = 'tooltip';
              const parts = filePath.split('/');
              const filename = parts[parts.length - 1];
              tooltip.textContent = formatDisplayName(filename);
              dot.appendChild(tooltip);

              // click to open
              dot.addEventListener('click', function(e) {
                e.stopPropagation();
                openOverlay(filePath);
              });
            } else {
              // inactive dot – no click, no tooltip
              dot.style.background = '#1a1a1a';
            }
            grid.appendChild(dot);
          }

          groupDiv.appendChild(grid);
          container.appendChild(groupDiv);
        });
      }

      // ── fetch and group by folder ──
      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(data => {
          if (!Array.isArray(data)) throw new Error('Invalid JSON: expected array');

          // group by folder
          const grouped = {};
          data.forEach(path => {
            // get folder name (directory)
            const parts = path.split('/');
            const folder = parts.length > 1 ? parts[0] : 'root';
            if (!grouped[folder]) grouped[folder] = [];
            grouped[folder].push(path);
          });

          buildFolders(grouped);
        })
        .catch(err => {
          status.textContent = `⚠️ Could not load list: ${err.message}`;
          console.error(err);
        });

    })();
  </script>

</body>
</html>
