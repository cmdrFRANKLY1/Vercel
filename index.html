<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>index · dark text</title>
  <!-- minimal dark theme, text-based, two links -->
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0b0d0e;
      color: #d6d9dc;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.6;
    }

    /* main card – text‑based, no distractions */
    .terminal {
      max-width: 640px;
      width: 100%;
      background: #131618;
      border: 1px solid #2e3236;
      border-radius: 18px;
      padding: 2.5rem 2rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.7);
      transition: border-color 0.2s;
    }

    /* subtle hover effect (still text‑based) */
    .terminal:hover {
      border-color: #4a5056;
    }

    /* heading: minimal, monospace */
    .title {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #eaedf0;
      border-bottom: 1px solid #2a2e32;
      padding-bottom: 0.75rem;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .title span {
      color: #5d6b7a;
      font-weight: 300;
    }

    /* link list – clean, text‑only */
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .link-item {
      display: flex;
      align-items: baseline;
      padding: 0.6rem 0.8rem;
      border-radius: 10px;
      transition: background 0.15s ease, padding-left 0.1s;
      border-left: 2px solid transparent;
    }

    .link-item:hover {
      background: #1e2328;
      border-left-color: #6c8ba0;
      padding-left: 1.2rem;
    }

    /* link styling – pure text, no underline by default */
    .link-item a {
      color: #b6c8d9;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 380;
      letter-spacing: -0.01em;
      border-bottom: 1px dotted transparent;
      transition: color 0.2s, border-color 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .link-item a:hover {
      color: #eef4fa;
      border-bottom-color: #6a7f92;
    }

    /* small arrow / indicator – keeps text vibe */
    .link-item a::before {
      content: "→";
      color: #5b6f7e;
      font-weight: 300;
      transition: transform 0.15s, color 0.15s;
      display: inline-block;
      width: 1.6rem;
    }

    .link-item a:hover::before {
      color: #a0bbc8;
      transform: translateX(3px);
    }

    /* path hint – subtle grey, monospace */
    .path-hint {
      font-size: 0.8rem;
      color: #4d5b66;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.02em;
      background: #1b1f23;
      padding: 0.2rem 0.6rem;
      border-radius: 24px;
      display: inline-block;
      margin-left: 0.2rem;
      font-weight: 350;
      border: 1px solid #262c31;
    }

    /* separator / footer */
    .footer-note {
      margin-top: 2.4rem;
      font-size: 0.8rem;
      color: #3e4852;
      text-align: center;
      border-top: 1px solid #1f2429;
      padding-top: 1.5rem;
      letter-spacing: 0.02em;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .footer-note span {
      opacity: 0.6;
    }

    /* responsive adjustments */
    @media (max-width: 480px) {
      .terminal {
        padding: 1.8rem 1.2rem;
      }
      .title {
        font-size: 1.5rem;
        flex-wrap: wrap;
      }
      .link-item a {
        font-size: 1rem;
        flex-wrap: wrap;
      }
      .path-hint {
        font-size: 0.7rem;
        padding: 0.1rem 0.5rem;
      }
    }

    /* extra: focus-visible for keyboard */
    a:focus-visible {
      outline: 2px solid #7f9bb0;
      outline-offset: 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <!-- header: text-based, dark mode -->
    <div class="title">
      <span>~/</span> index
      <span style="font-size: 0.9rem; margin-left: auto; font-weight: 300; color: #4b5b68;"># dark</span>
    </div>

    <!-- link list – two links as requested -->
    <div class="link-list">
      <!-- 1. txt2json.html -->
      <div class="link-item">
        <a href="tools/txt2json.html">
          txt2json
          <span class="path-hint">~/tools/txt2json.html</span>
        </a>
      </div>

      <!-- 2. tarkovdb.html -->
      <div class="link-item">
        <a href="tarkov/tarkovdb.html">
          tarkovdb
          <span class="path-hint">~/tarkov/tarkovdb.html</span>
        </a>
      </div>
    </div>

    <!-- optional text footer – stays minimal -->
    <div class="footer-note">
      <span>⎯⎯⎯</span>
      <span>text · base</span>
      <span>⎯⎯⎯</span>
    </div>
  </div>
</body>
</html>
