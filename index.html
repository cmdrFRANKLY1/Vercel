<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>local time · startpage</title>
  <style>
    /* ── reset, minimal text ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: #d6d6d6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1rem 1rem;
    }

    /* ── clock ── */
    #clock {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    /* ── text‑based grid ── */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem 1.5rem;
      max-width: 900px;
      width: 100%;
      margin-top: 1rem;
    }

    .tile {
      color: #b0b0b0;
      font-size: 1.2rem;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
      padding: 0.2rem 0;
      border-bottom: 1px solid transparent;
      display: inline-block;
    }

    .tile:hover {
      color: #f0f0f0;
      border-bottom-color: #4a4a4a;
    }

    .tile:active {
      color: #ffffff;
    }

    /* ── separator between tiles ── */
    .tile:not(:last-child)::after {
      content: " · ";
      color: #3a3a3a;
      font-weight: 300;
    }

    /* ── status / error ── */
    .status {
      color: #8a8a8a;
      font-size: 0.9rem;
      margin-top: 1.5rem;
    }

    /* ── overlay ── */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(3px);
      display: none;
      z-index: 1000;
      padding: 1.5rem;
    }

    .overlay.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ── close button (outside iframe wrapper) ── */
    .close-btn {
      position: fixed;
      top: 1.2rem;
      right: 1.8rem;
      background: transparent;
      border: none;
      color: #ff3b3b;
      font-size: 1.4rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      border-radius: 0.3rem;
      transition: background 0.2s, color 0.2s;
      z-index: 1001;
      letter-spacing: 0.05em;
    }

    .close-btn:hover {
      background: rgba(255, 59, 59, 0.15);
      color: #ff6b6b;
    }

    .close-btn:active {
      transform: scale(0.96);
    }

    /* ── iframe container ── */
    .overlay-content {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      max-height: 90vh;
      background: #0b0b0b;
      border-radius: 0.5rem;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
      border: 1px solid #2a2a2a;
    }

    .overlay iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0b0b0b;
    }

    /* ── responsive ── */
    @media (max-width: 640px) {
      #clock {
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
      }

      .tile {
        font-size: 1rem;
      }

      .close-btn {
        top: 0.8rem;
        right: 1rem;
        font-size: 1.1rem;
        padding: 0.2rem 0.6rem;
      }

      .overlay-content {
        height: 95vh;
        max-height: 95vh;
        border-radius: 0.3rem;
      }
    }

    @media (max-width: 420px) {
      #clock {
        font-size: 0.85rem;
      }

      .tile {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <!-- clock -->
  <div id="clock"></div>

  <!-- text‑based grid -->
  <div class="grid" id="grid"></div>
  <div class="status" id="status"></div>

  <!-- overlay -->
  <div class="overlay" id="overlay">
    <!-- close button – outside the iframe wrapper -->
    <button class="close-btn" id="closeBtn">Close</button>
    <div class="overlay-content">
      <iframe id="iframe" src="about:blank"></iframe>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ── clock ──
      const clockEl = document.getElementById('clock');

      function pad(n) {
        return String(n).padStart(2, '0');
      }

      function updateClock() {
        const now = new Date();
        const h = pad(now.getHours());
        const m = pad(now.getMinutes());
        const s = pad(now.getSeconds());
        const day = pad(now.getDate());
        const month = pad(now.getMonth() + 1);
        const year = now.getFullYear();
        clockEl.textContent = `${h}:${m}:${s} // ${day}.${month}.${year}`;
      }

      updateClock();
      setInterval(updateClock, 1000);

      // ── overlay logic ──
      const overlay = document.getElementById('overlay');
      const iframe = document.getElementById('iframe');
      const closeBtn = document.getElementById('closeBtn');

      function openOverlay(url) {
        iframe.src = url;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeOverlay() {
        overlay.classList.remove('active');
        iframe.src = 'about:blank';
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closeOverlay);

      // Click outside the content (on the backdrop) also closes
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          closeOverlay();
        }
      });

      // Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          closeOverlay();
        }
      });

      // ── fetch htmlList.json and build tiles ──
      const grid = document.getElementById('grid');
      const status = document.getElementById('status');

      function buildTiles(list) {
        if (!list || list.length === 0) {
          status.textContent = 'No entries found.';
          return;
        }

        grid.innerHTML = '';
        status.textContent = '';

        list.forEach(path => {
          // extract filename without extension (supports nested folders)
          const parts = path.split('/');
          let name = parts[parts.length - 1];
          name = name.replace(/\.html$/i, '');
          // make it readable: replace dashes/underscores with spaces, capitalize
          const displayName = name.replace(/[-_]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

          const tile = document.createElement('span');
          tile.className = 'tile';
          tile.textContent = displayName;
          tile.addEventListener('click', function() {
            openOverlay(path);
          });
          grid.appendChild(tile);
        });
      }

      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(data => {
          if (Array.isArray(data)) {
            buildTiles(data);
          } else {
            throw new Error('Invalid JSON: expected array');
          }
        })
        .catch(err => {
          status.textContent = `⚠️ Could not load list: ${err.message}`;
          console.error(err);
        });

    })();
  </script>

</body>
</html>
