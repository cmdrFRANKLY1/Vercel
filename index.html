<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>launch · shortcuts</title>
  <style>
    /* ----- dark mode first, no fallback styling ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: Verdana, Geneva, sans-serif;
      padding: 1.5rem;
      line-height: 1.6;
      color: #e6edf3;
      padding-top: 2.5rem;
    }

    .card {
      max-width: 820px;
      width: 100%;
      background: #161b22;
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.8), 0 8px 24px -6px rgba(0,0,0,0.6);
      padding: 2.5rem 2.2rem;
      border: 1px solid #30363d;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border-bottom: 2px solid #21262d;
      padding-bottom: 1.2rem;
      margin-bottom: 1.8rem;
      color: #f0f6fc;
    }

    h1 small {
      font-size: 1rem;
      font-weight: 400;
      color: #8b949e;
      margin-left: 0.4rem;
    }

    .badge-count {
      background: #21262d;
      border-radius: 40px;
      padding: 0.15rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #c9d1d9;
      margin-left: 0.6rem;
      border: 1px solid #30363d;
    }

    /* ----- category groups ----- */
    .category-group {
      margin-bottom: 2rem;
    }

    .category-group:last-child {
      margin-bottom: 0;
    }

    .category-header {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid #21262d;
    }

    .category-name {
      font-size: 1.1rem;
      font-weight: 500;
      color: #f0f6fc;
      letter-spacing: 0.02em;
    }

    .category-count {
      font-size: 0.7rem;
      background: #21262d;
      padding: 0.1rem 0.7rem;
      border-radius: 30px;
      color: #8b949e;
      border: 1px solid #30363d;
    }

    .shortcut-grid {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      padding-left: 0.2rem;
    }

    .shortcut-item {
      display: flex;
      align-items: center;
      padding: 0.6rem 1rem;
      border-radius: 14px;
      background: #0d1117;
      transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s;
      border: 1px solid #30363d;
      text-decoration: none;
      color: #e6edf3;
    }

    .shortcut-item:hover {
      background: #1c2333;
      border-color: #58a6ff;
      transform: scale(1.01);
    }

    .shortcut-item:active {
      background: #151e2b;
      transform: scale(0.98);
    }

    .shortcut-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.1rem;
      height: 2.1rem;
      background: #21262d;
      border-radius: 10px;
      margin-right: 0.9rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #c9d1d9;
      flex-shrink: 0;
      text-transform: uppercase;
      border: 1px solid #30363d;
    }

    .shortcut-info {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.3rem 0.7rem;
      flex: 1;
      min-width: 0;
    }

    .shortcut-filename {
      font-size: 1rem;
      font-weight: 450;
      word-break: break-word;
      color: #f0f6fc;
    }

    .shortcut-arrow {
      margin-left: auto;
      color: #58a6ff;
      font-size: 1.1rem;
      font-weight: 300;
      padding-left: 0.5rem;
      opacity: 0.5;
      transition: opacity 0.15s, transform 0.1s;
    }

    .shortcut-item:hover .shortcut-arrow {
      opacity: 1;
      transform: translateX(2px);
    }

    hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 1.8rem 0 0.8rem 0;
    }

    .footer-note {
      font-size: 0.7rem;
      color: #6e7681;
      text-align: right;
      letter-spacing: 0.02em;
      margin-top: 0.5rem;
    }

    /* empty container – completely invisible when no data */
    #shortcutContainer:empty {
      display: none;
    }

    /* tiny screens */
    @media (max-width: 480px) {
      .card {
        padding: 1.6rem 1.2rem;
      }
      h1 {
        font-size: 1.5rem;
        flex-wrap: wrap;
      }
      .shortcut-item {
        padding: 0.5rem 0.7rem;
      }
      .shortcut-filename {
        font-size: 0.9rem;
      }
      .category-name {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="card" role="main">
  <h1>
    ⚡ shortcuts
    <small>· categorized</small>
    <span class="badge-count" id="countBadge">0</span>
  </h1>

  <!-- container: dynamically populated with category groups -->
  <div id="shortcutContainer"></div>

  <hr>
  <div class="footer-note">
    <span id="fileSource">htmlList.json</span> · <span id="totalItems">0</span> entries
  </div>
</div>

<script>
  (function() {
    "use strict";

    const container = document.getElementById('shortcutContainer');
    const countBadge = document.getElementById('countBadge');
    const totalItemsSpan = document.getElementById('totalItems');

    // ---------- helper: create one shortcut element ----------
    function createShortcutItem(filePath) {
      const fileName = filePath.includes('/') ? filePath.split('/').pop() : filePath;
      let displayName = fileName.replace(/\.html$/i, '');
      if (displayName === '') displayName = fileName;

      // icon: first two letters
      let iconText = displayName.charAt(0).toUpperCase();
      if (displayName.length > 1 && /[a-zA-Z]/.test(displayName.charAt(1))) {
        iconText += displayName.charAt(1).toLowerCase();
      }

      const anchor = document.createElement('a');
      anchor.className = 'shortcut-item';
      anchor.href = filePath;
      anchor.setAttribute('aria-label', `Open ${displayName}`);

      const iconSpan = document.createElement('span');
      iconSpan.className = 'shortcut-icon';
      iconSpan.textContent = iconText;

      const infoDiv = document.createElement('div');
      infoDiv.className = 'shortcut-info';

      const filenameSpan = document.createElement('span');
      filenameSpan.className = 'shortcut-filename';
      filenameSpan.textContent = displayName;

      infoDiv.appendChild(filenameSpan);

      const arrowSpan = document.createElement('span');
      arrowSpan.className = 'shortcut-arrow';
      arrowSpan.textContent = '→';

      anchor.appendChild(iconSpan);
      anchor.appendChild(infoDiv);
      anchor.appendChild(arrowSpan);

      return anchor;
    }

    // ---------- extract folder from path ----------
    function getFolderFromPath(filePath) {
      if (!filePath || typeof filePath !== 'string') return '';
      const trimmed = filePath.trim();
      if (!trimmed.includes('/')) return ''; // root
      const parts = trimmed.split('/');
      // if first segment is empty (starts with /) skip
      const folder = parts.find(seg => seg.length > 0);
      return folder || '';
    }

    // ---------- render categorized groups ----------
    function renderList(fileList) {
      container.innerHTML = '';   // clear

      if (!fileList || !Array.isArray(fileList) || fileList.length === 0) {
        countBadge.textContent = '0';
        totalItemsSpan.textContent = '0';
        return;   // empty container, no messages
      }

      // filter valid strings
      const validPaths = fileList.filter(item => typeof item === 'string' && item.trim().length > 0);
      if (validPaths.length === 0) {
        countBadge.textContent = '0';
        totalItemsSpan.textContent = '0';
        return;
      }

      // ----- group by folder (extracted from path) -----
      const groups = new Map(); // folderName -> [path1, path2, ...]

      for (const path of validPaths) {
        const folder = getFolderFromPath(path);
        if (!groups.has(folder)) {
          groups.set(folder, []);
        }
        groups.get(folder).push(path);
      }

      // sort folder names: put root ('') first, then alphabetically
      const sortedFolders = Array.from(groups.keys()).sort((a, b) => {
        if (a === '') return -1;
        if (b === '') return 1;
        return a.localeCompare(b);
      });

      // build category groups
      const fragment = document.createDocumentFragment();
      let totalCount = 0;

      for (const folder of sortedFolders) {
        const paths = groups.get(folder);
        if (!paths || paths.length === 0) continue;

        // sort paths alphabetically by filename
        paths.sort((a, b) => {
          const nameA = a.split('/').pop() || a;
          const nameB = b.split('/').pop() || b;
          return nameA.localeCompare(nameB);
        });

        const groupDiv = document.createElement('div');
        groupDiv.className = 'category-group';

        // header
        const headerDiv = document.createElement('div');
        headerDiv.className = 'category-header';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'category-name';
        nameSpan.textContent = folder || '📄 root';

        const countSpan = document.createElement('span');
        countSpan.className = 'category-count';
        countSpan.textContent = paths.length;

        headerDiv.appendChild(nameSpan);
        headerDiv.appendChild(countSpan);
        groupDiv.appendChild(headerDiv);

        // grid
        const gridDiv = document.createElement('div');
        gridDiv.className = 'shortcut-grid';

        for (const path of paths) {
          gridDiv.appendChild(createShortcutItem(path));
        }

        groupDiv.appendChild(gridDiv);
        fragment.appendChild(groupDiv);

        totalCount += paths.length;
      }

      container.appendChild(fragment);

      // update counters
      countBadge.textContent = totalCount;
      totalItemsSpan.textContent = totalCount;
    }

    // ---------- fetch: no fallback UI, silent fail ----------
    function fetchList() {
      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) {
            // silent fail: keep empty
            container.innerHTML = '';
            countBadge.textContent = '0';
            totalItemsSpan.textContent = '0';
            return;
          }
          return response.json();
        })
        .then(data => {
          let list = [];
          if (Array.isArray(data)) {
            list = data;
          } else if (data && typeof data === 'object') {
            const values = Object.values(data);
            if (values.some(v => typeof v === 'string')) {
              list = values.filter(v => typeof v === 'string');
            } else {
              list = [];
            }
          }
          renderList(list);
        })
        .catch(() => {
          // on any error → clear, set 0
          container.innerHTML = '';
          countBadge.textContent = '0';
          totalItemsSpan.textContent = '0';
        });
    }

    // start
    fetchList();
  })();
</script>
</body>
</html>
