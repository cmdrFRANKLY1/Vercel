<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>launch · shortcuts</title>
  <!-- Performance & readability: Verdana, minimal layout, no external fonts -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Verdana, Geneva, sans-serif;
      padding: 1.5rem;
      line-height: 1.6;
      color: #1e293b;
    }

    .card {
      max-width: 780px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.12), 0 8px 24px -6px rgba(0,0,0,0.05);
      padding: 2.5rem 2.2rem;
      transition: box-shadow 0.2s ease;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border-bottom: 2px solid #e9edf2;
      padding-bottom: 1.2rem;
      margin-bottom: 1.8rem;
      color: #0b1a2b;
    }

    h1 small {
      font-size: 1rem;
      font-weight: 400;
      color: #5b6f87;
      margin-left: 0.4rem;
      letter-spacing: 0;
    }

    .shortcut-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .shortcut-item {
      display: flex;
      align-items: center;
      padding: 0.7rem 1rem;
      border-radius: 16px;
      background: #f8faff;
      transition: background 0.15s ease, transform 0.1s ease;
      border: 1px solid #eef2f8;
      text-decoration: none;
      color: #1e293b;
    }

    .shortcut-item:hover {
      background: #eef4ff;
      border-color: #cbd9ed;
      transform: scale(1.01);
    }

    .shortcut-item:active {
      background: #dfe8f7;
      transform: scale(0.98);
    }

    .shortcut-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.2rem;
      height: 2.2rem;
      background: #dce5f2;
      border-radius: 12px;
      margin-right: 1rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1a304a;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .shortcut-info {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.4rem 0.8rem;
      flex: 1;
      min-width: 0;
    }

    .shortcut-filename {
      font-size: 1.05rem;
      font-weight: 450;
      word-break: break-word;
    }

    .shortcut-path {
      font-size: 0.75rem;
      background: #eef2f8;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      color: #2f405a;
      letter-spacing: 0.02em;
      white-space: nowrap;
      font-weight: 400;
    }

    .shortcut-arrow {
      margin-left: auto;
      color: #8196b3;
      font-size: 1.2rem;
      font-weight: 300;
      padding-left: 0.5rem;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .shortcut-item:hover .shortcut-arrow {
      opacity: 1;
      color: #1a3a6b;
    }

    /* loading / empty / error states */
    .status-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.4rem 1rem;
      gap: 0.8rem;
      text-align: center;
      color: #425570;
      background: #f8faff;
      border-radius: 28px;
      border: 1px dashed #cddae9;
    }

    .status-box .emoji-big {
      font-size: 2.4rem;
      line-height: 1;
    }

    .status-box p {
      font-size: 0.95rem;
      max-width: 80%;
      margin: 0 auto;
    }

    .badge-count {
      background: #e9eff8;
      border-radius: 40px;
      padding: 0.15rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1d3a5c;
      margin-left: 0.6rem;
    }

    hr {
      border: none;
      border-top: 1px solid #e2e9f2;
      margin: 1.8rem 0 0.8rem 0;
    }

    .footer-note {
      font-size: 0.7rem;
      color: #6e85a2;
      text-align: right;
      letter-spacing: 0.02em;
      margin-top: 0.5rem;
    }

    /* tiny screens */
    @media (max-width: 480px) {
      .card {
        padding: 1.6rem 1.2rem;
      }
      h1 {
        font-size: 1.5rem;
        flex-wrap: wrap;
      }
      .shortcut-item {
        padding: 0.6rem 0.8rem;
      }
      .shortcut-path {
        white-space: normal;
        word-break: break-word;
      }
      .shortcut-filename {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

<div class="card" role="main">
  <h1>
    ⚡ shortcuts
    <small>· vercel</small>
    <span class="badge-count" id="countBadge">0</span>
  </h1>

  <!-- container where items will be injected -->
  <div id="shortcutContainer" class="shortcut-grid">
    <!-- loading state (will be replaced) -->
    <div class="status-box" id="loadingPlaceholder">
      <span class="emoji-big">⏳</span>
      <p>loading list …</p>
    </div>
  </div>

  <hr>
  <div class="footer-note">
    <span id="fileSource">htmlList.json</span> · <span id="totalItems">0</span> entries
  </div>
</div>

<script>
  (function() {
    "use strict";

    // DOM refs
    const container = document.getElementById('shortcutContainer');
    const countBadge = document.getElementById('countBadge');
    const totalItemsSpan = document.getElementById('totalItems');

    // Helper: create a shortcut element from a file path
    function createShortcutItem(filePath) {
      // extract filename from path (e.g. "tools/txt2json.html" -> "txt2json.html")
      const fileName = filePath.includes('/') ? filePath.split('/').pop() : filePath;
      // extract folder (e.g. "tools" or "tarkov") – if none, use "root"
      let folder = '';
      if (filePath.includes('/')) {
        const parts = filePath.split('/');
        if (parts.length >= 2) {
          folder = parts[0]; // first segment
        }
      }

      // build display name: remove .html and beautify
      let displayName = fileName.replace(/\.html$/i, '');
      // if displayName is too cryptic, keep as is; but we can also clean up
      if (displayName === '') displayName = fileName;

      // icon: first letter (or two) of display name
      let iconText = displayName.charAt(0).toUpperCase();
      if (displayName.length > 1 && /[a-zA-Z]/.test(displayName.charAt(1))) {
        iconText += displayName.charAt(1).toLowerCase();
      }

      const anchor = document.createElement('a');
      anchor.className = 'shortcut-item';
      anchor.href = filePath; // relative path, works with vercel
      anchor.setAttribute('aria-label', `Open ${displayName}`);

      // icon span
      const iconSpan = document.createElement('span');
      iconSpan.className = 'shortcut-icon';
      iconSpan.textContent = iconText;

      // info wrapper
      const infoDiv = document.createElement('div');
      infoDiv.className = 'shortcut-info';

      const filenameSpan = document.createElement('span');
      filenameSpan.className = 'shortcut-filename';
      filenameSpan.textContent = displayName;

      const pathSpan = document.createElement('span');
      pathSpan.className = 'shortcut-path';
      pathSpan.textContent = folder ? `📁 ${folder}` : '📄 root';

      infoDiv.appendChild(filenameSpan);
      infoDiv.appendChild(pathSpan);

      // arrow
      const arrowSpan = document.createElement('span');
      arrowSpan.className = 'shortcut-arrow';
      arrowSpan.textContent = '→';

      anchor.appendChild(iconSpan);
      anchor.appendChild(infoDiv);
      anchor.appendChild(arrowSpan);

      return anchor;
    }

    // Render the list from JSON data
    function renderList(fileList) {
      // clear container
      container.innerHTML = '';

      if (!fileList || !Array.isArray(fileList) || fileList.length === 0) {
        // show empty state
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'status-box';
        emptyDiv.innerHTML = `
          <span class="emoji-big">📭</span>
          <p>no shortcuts found · <span style="background:#eef2f8;padding:0.1rem 0.6rem;border-radius:30px;">htmlList.json</span> is empty</p>
        `;
        container.appendChild(emptyDiv);
        countBadge.textContent = '0';
        totalItemsSpan.textContent = '0';
        return;
      }

      // filter out any non-string or empty paths (just in case)
      const validPaths = fileList.filter(item => typeof item === 'string' && item.trim().length > 0);

      if (validPaths.length === 0) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'status-box';
        emptyDiv.innerHTML = `
          <span class="emoji-big">🧹</span>
          <p>no valid entries · check <code>htmlList.json</code></p>
        `;
        container.appendChild(emptyDiv);
        countBadge.textContent = '0';
        totalItemsSpan.textContent = '0';
        return;
      }

      // sort alphabetically by filename (optional)
      validPaths.sort((a, b) => {
        const nameA = a.split('/').pop() || a;
        const nameB = b.split('/').pop() || b;
        return nameA.localeCompare(nameB);
      });

      // build items
      const fragment = document.createDocumentFragment();
      for (const path of validPaths) {
        const item = createShortcutItem(path);
        fragment.appendChild(item);
      }

      container.appendChild(fragment);

      // update counters
      const count = validPaths.length;
      countBadge.textContent = count;
      totalItemsSpan.textContent = count;
    }

    // fetch and parse htmlList.json
    function fetchList() {
      const placeholder = document.getElementById('loadingPlaceholder');
      if (!placeholder) {
        // if placeholder not present (should not happen) we create a status
        container.innerHTML = `<div class="status-box"><span class="emoji-big">⏳</span><p>loading …</p></div>`;
      }

      fetch('htmlList.json')
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status} — failed to fetch htmlList.json`);
          }
          return response.json();
        })
        .then(data => {
          // data can be array or object; we handle array as expected
          let list = [];
          if (Array.isArray(data)) {
            list = data;
          } else if (data && typeof data === 'object') {
            // if someone used an object with keys, try to extract values
            // but we expect an array. however we can be tolerant:
            const values = Object.values(data);
            if (values.some(v => typeof v === 'string')) {
              list = values.filter(v => typeof v === 'string');
            } else {
              list = [];
            }
          }
          renderList(list);
        })
        .catch(err => {
          console.warn('Error loading htmlList.json:', err);
          // show error state in container
          container.innerHTML = '';
          const errorDiv = document.createElement('div');
          errorDiv.className = 'status-box';
          errorDiv.innerHTML = `
            <span class="emoji-big">⚠️</span>
            <p><strong>could not load list</strong><br>
            <span style="font-size:0.85rem;color:#6b4f4f;">${err.message || 'unknown error'}</span></p>
            <p style="font-size:0.75rem;background:#f0f2f5;padding:0.3rem 1rem;border-radius:40px;margin-top:0.3rem;">
              ensure <code>htmlList.json</code> exists
            </p>
          `;
          container.appendChild(errorDiv);
          countBadge.textContent = '✗';
          totalItemsSpan.textContent = '0';
        });
    }

    // start fetching
    fetchList();

    // optional: if user wants to re-fetch (not needed, but we keep it clean)
    // we also set a small fallback: if the json is not found, the error state shows.
  })();
</script>

<!-- 
  Performance notes:
  - No external dependencies, no fonts besides system Verdana.
  - Minimal DOM manipulations, uses document fragments.
  - CSS is lean, no animations that cause layout thrashing.
  - Fetch is async with proper error handling.
  - Readability: clear class names, semantic HTML, accessible.
-->
</body>
</html>
