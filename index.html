<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>black · tools dashboard</title>
    <style>
        /* ----- reset – no shadows, no frills ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            min-height: 100vh;
            font-family: 'Verdana', 'Geneva', 'Tahoma', sans-serif;
            color: #f0f0f0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            overflow: hidden;
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* ----- top‑left: ultra-compact tools navigation list ----- */
        .tools-nav {
            position: fixed;
            top: 1rem;
            left: 1rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.85rem;
            user-select: none;
            white-space: nowrap;
        }

        .tools-nav a {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.4; /* dimmed inactive links */
            transition: opacity 0.15s ease, color 0.15s ease;
        }

        .tools-nav a:hover {
            opacity: 0.8;
        }

        /* Active link highlight - Solid white */
        .tools-nav a.active {
            color: #ffffff !important;
            opacity: 1 !important;
            font-weight: 600;
        }

        /* Custom separator style */
        .separator {
            color: #f0f0f0;
            opacity: 0.2;
            font-weight: 300;
        }

        main {
            display: none;
        }

        /* ----- responsive scaling ----- */
        @media (max-width: 480px) {
            .tools-nav {
                top: 0.8rem;
                left: 0.8rem;
                font-size: 0.75rem;
                gap: 0.4rem;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Dynamic navigation populated based on physical availability on Vercel -->
    <nav class="tools-nav" id="toolsNav" aria-label="Tools directory navigation">
        <a href="index.html" class="nav-item" id="homeLink">home</a>
    </nav>

    <main></main>

    <script>
        (function() {
            'use strict';

            const navContainer = document.getElementById('toolsNav');
            const homeLink = document.getElementById('homeLink');
            const currentPath = window.location.pathname;

            // Mark home active if we are at the root index or empty path
            if (currentPath.endsWith('index.html') && !currentPath.includes('/tools/') || 
                currentPath.endsWith('/') || 
                currentPath === '') {
                homeLink.classList.add('active');
            }

            // List of candidate tools to scan for
            const candidates = [
                { name: 'tarkov', path: 'tools/tarkov/index.html' },
                { name: 'txt2json', path: 'tools/txt2json/index.html' },
                { name: 'calc', path: 'tools/calc/index.html' },
                { name: 'notes', path: 'tools/notes/index.html' },
                { name: 'diff', path: 'tools/diff/index.html' },
                { name: 'regex', path: 'tools/regex/index.html' }
            ];

            // Clean active check that functions regardless of relative subfolders
            function checkActive(targetPath) {
                // Normalizes paths to compare endpoints safely
                return currentPath.endsWith(targetPath);
            }

            // Scan the Vercel deployment asynchronously for present files
            async function buildNavigation() {
                const checks = candidates.map(async (tool) => {
                    try {
                        // Use HEAD requests for ultra-fast, lightweight checks
                        const response = await fetch(tool.path, { method: 'HEAD' });
                        if (response.ok) {
                            return tool;
                        }
                    } catch (e) {
                        // File not present or failed to load; skip silently
                    }
                    return null;
                });

                const results = await Promise.all(checks);

                // Append only the present files to the navigation bar
                results.forEach(tool => {
                    if (tool) {
                        // Create separator
                        const separator = document.createElement('span');
                        separator.className = 'separator';
                        separator.textContent = '|';
                        navContainer.appendChild(separator);

                        // Create link
                        const link = document.createElement('a');
                        link.href = tool.path;
                        link.className = 'nav-item';
                        link.textContent = tool.name;

                        // Apply solid white if this link matches the browser URL path
                        if (checkActive(tool.path)) {
                            link.classList.add('active');
                            homeLink.classList.remove('active'); // Ensure home turns off
                        }

                        navContainer.appendChild(link);
                    }
                });
            }

            buildNavigation();
        })();
    </script>

</body>
</html>
