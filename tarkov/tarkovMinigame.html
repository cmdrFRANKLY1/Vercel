<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght=500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at center, #1f1f22 0%, #0a0a0b 100%);
        }
        /* Hide scrollbar for the reels just in case */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .text-shadow-glow {
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.7);
        }
        .slot-item {
            /* Hardware acceleration for smoother spins */
            transform: translateZ(0); 
            will-change: transform;
        }
        
        /* QTE Styles */
        .wire-node {
            transition: all 0.2s ease;
        }
        .wire-node.selected {
            box-shadow: 0 0 15px currentColor;
            transform: scale(1.1);
        }
        .wire-node.connected {
            opacity: 0.5;
            pointer-events: none;
        }
        .line-draw {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 0.3s forwards ease-out;
        }
        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }
        .caution-tape {
            background: repeating-linear-gradient(
                45deg,
                #000,
                #000 10px,
                #eab308 10px,
                #eab308 20px
            );
        }
        /* Keycard QTE Grab styling */
        .grab-pointer {
            cursor: grab;
        }
        .grab-pointer:active {
            cursor: grabbing;
        }

        /* --- VISUAL CELEBRATION SHAKES & FLASHES --- */
        @keyframes shake-gentle {
            0%, 100% { transform: translate(0, 0); }
            20%, 60% { transform: translate(-3px, 2px); }
            40%, 80% { transform: translate(3px, -2px); }
        }
        @keyframes shake-medium {
            0%, 100% { transform: translate(0, 0); }
            10%, 50%, 90% { transform: translate(-8px, 6px); }
            30%, 70% { transform: translate(8px, -6px); }
        }
        @keyframes shake-hard {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-14px, 10px) rotate(-1.5deg); }
            20%, 40%, 60%, 80% { transform: translate(14px, -10px) rotate(1.5deg); }
        }
        .shake-gentle { animation: shake-gentle 0.4s ease-in-out; }
        .shake-medium { animation: shake-medium 0.6s ease-in-out; }
        .shake-hard { animation: shake-hard 1s ease-in-out; }

        @keyframes flash-gold {
            0%, 100% { border-color: rgba(234, 179, 8, 0.4); box-shadow: 0 0 15px rgba(0,0,0,0.9); }
            50% { border-color: rgba(234, 179, 8, 1); box-shadow: 0 0 35px rgba(234, 179, 8, 0.6); }
        }
        @keyframes flash-emerald {
            0%, 100% { border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 0 15px rgba(0,0,0,0.9); }
            50% { border-color: rgba(16, 185, 129, 1); box-shadow: 0 0 45px rgba(16, 185, 129, 0.7); }
        }
        @keyframes flash-rainbow {
            0% { border-color: #ef4444; box-shadow: 0 0 50px rgba(239, 68, 68, 0.85); }
            20% { border-color: #eab308; box-shadow: 0 0 50px rgba(234, 179, 8, 0.85); }
            40% { border-color: #10b981; box-shadow: 0 0 50px rgba(16, 185, 129, 0.85); }
            60% { border-color: #3b82f6; box-shadow: 0 0 50px rgba(59, 130, 246, 0.85); }
            80% { border-color: #a855f7; box-shadow: 0 0 50px rgba(168, 85, 247, 0.85); }
            100% { border-color: #ef4444; box-shadow: 0 0 50px rgba(239, 68, 68, 0.85); }
        }
        .flash-win-3 { animation: flash-gold 1s infinite; }
        .flash-win-4 { animation: flash-emerald 0.7s infinite; }
        .flash-win-5 { animation: flash-rainbow 1.5s infinite linear; }
    </style>
</head>
<body class="text-zinc-200 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Celebration Confetti Canvas overlay -->
    <canvas id="confettiCanvas" class="pointer-events-none fixed inset-0 z-[100]"></canvas>

    <div class="max-w-4xl w-full flex flex-col items-center">
        
        <!-- Header -->
        <h1 class="text-5xl font-bold tracking-wider text-yellow-600 mb-2 uppercase drop-shadow-md">Title</h1>
        <p class="text-zinc-400 mb-8 text-center max-w-lg text-lg">Subtitle</p>

        <!-- Slot Machine Wrapper -->
        <div id="machineWrapper" class="relative bg-[#18181a] p-4 sm:p-8 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.9)] border-2 border-zinc-700/50 w-full max-w-3xl transition-all duration-300">
            
            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="absolute inset-0 bg-black/80 z-50 flex items-center justify-center rounded-2xl backdrop-blur-sm transition-opacity duration-500">
                <div class="text-center flex flex-col items-center">
                    <div class="w-12 h-12 border-4 border-yellow-600 border-t-transparent rounded-full animate-spin mb-4 shadow-[0_0_15px_rgba(202,138,4,0.5)]"></div>
                    <p id="loadingText" class="text-yellow-600 text-xl font-semibold tracking-widest uppercase">Connecting to Flea Market...</p>
                </div>
            </div>

            <!-- Machine Display -->
            <div class="relative bg-zinc-950 p-3 sm:p-4 rounded-lg shadow-inner border border-black overflow-hidden w-full" id="machineDisplay">
                
                <!-- Target Line (The Win Line) -->
                <div class="absolute top-[116px] left-0 w-full h-[100px] border-y-2 border-yellow-500/80 bg-yellow-500/10 pointer-events-none z-10 box-border shadow-[0_0_20px_rgba(234,179,8,0.2)]"></div>
                
                <!-- Reels Container (Scales to support 5 reels inline) -->
                <div class="flex gap-1.5 sm:gap-3 relative z-0 justify-center">
                    
                    <!-- Reel 1 -->
                    <div class="h-[300px] w-[80px] sm:w-[110px] overflow-hidden bg-[#0d0d0f] rounded border border-zinc-800/80 relative shadow-inner">
                        <div id="reel-0" class="flex flex-col w-full slot-item"></div>
                    </div>
                    
                    <!-- Reel 2 -->
                    <div class="h-[300px] w-[80px] sm:w-[110px] overflow-hidden bg-[#0d0d0f] rounded border border-zinc-800/80 relative shadow-inner">
                        <div id="reel-1" class="flex flex-col w-full slot-item"></div>
                    </div>
                    
                    <!-- Reel 3 -->
                    <div class="h-[300px] w-[80px] sm:w-[110px] overflow-hidden bg-[#0d0d0f] rounded border border-zinc-800/80 relative shadow-inner">
                        <div id="reel-2" class="flex flex-col w-full slot-item"></div>
                    </div>

                    <!-- Reel 4 -->
                    <div class="h-[300px] w-[80px] sm:w-[110px] overflow-hidden bg-[#0d0d0f] rounded border border-zinc-800/80 relative shadow-inner">
                        <div id="reel-3" class="flex flex-col w-full slot-item"></div>
                    </div>

                    <!-- Reel 5 -->
                    <div class="h-[300px] w-[80px] sm:w-[110px] overflow-hidden bg-[#0d0d0f] rounded border border-zinc-800/80 relative shadow-inner">
                        <div id="reel-4" class="flex flex-col w-full slot-item"></div>
                    </div>

                </div>
                
                <!-- Overlay Gradient for depth -->
                <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/60 pointer-events-none z-20"></div>
            </div>

            <!-- Controls -->
            <div class="mt-8 flex flex-col items-center">
                <button id="spinBtn" disabled class="bg-gradient-to-b from-yellow-600 to-yellow-800 text-black font-bold text-3xl py-3 px-16 rounded shadow-lg hover:from-yellow-500 hover:to-yellow-700 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100 border border-yellow-400/50 uppercase tracking-widest z-30">
                    SPIN
                </button>
                <div id="status" class="mt-6 h-10 text-2xl font-semibold text-zinc-300 text-center tracking-wide">
                    Ready to roll
                </div>
            </div>
        </div>

        <!-- Activity Log Console Section -->
        <div class="mt-8 bg-[#131315]/80 p-4 rounded-xl border border-zinc-800 w-full max-w-3xl shadow-lg">
            <div class="flex justify-between items-center mb-3 pb-2 border-b border-zinc-800/85">
                <h3 class="text-xs text-zinc-400 uppercase tracking-widest font-semibold flex items-center gap-2 font-mono">
                    <span class="inline-block w-2 h-2 bg-yellow-600 rounded-full animate-pulse"></span>
                    Security Decryption & Raid Activity Log
                </h3>
                <button id="clearLogBtn" class="text-[9px] text-zinc-500 hover:text-zinc-300 uppercase tracking-wider font-bold transition-colors">Clear Logs</button>
            </div>
            <div id="activityLogContainer" class="flex flex-col gap-1.5 max-h-[140px] overflow-y-auto no-scrollbar text-[11px] font-mono select-text scroll-smooth">
                <div class="text-zinc-500 text-center py-4">Security logs initialized. Ready to record telemetry...</div>
            </div>
        </div>

        <!-- Loot Pool Display -->
        <div class="mt-8 text-center w-full max-w-lg">
            <h3 class="text-sm text-zinc-500 uppercase tracking-widest mb-3 font-semibold">Current Session Loot Pool</h3>
            <div id="lootPool" class="flex gap-4 justify-center bg-zinc-900/5
