<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarkov Database</title>
    <style>
        /* Reset & Base - Performance optimized */
        *{margin:0;padding:0;box-sizing:border-box}
        html{background:#0a0a0c}
        body{background:#0a0a0c;color:#e8e8ea;font-family:Verdana,Geneva,sans-serif;font-size:14px;line-height:1.5;padding:16px;max-width:1400px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
        
        /* Scrollbar hidden for performance */
        ::-webkit-scrollbar{display:none}
        *{scrollbar-width:none;-ms-overflow-style:none}

        /* Typography - Pure text */
        .muted{color:#666;font-size:11px;text-transform:uppercase;letter-spacing:0.08em}
        .border-bottom{border-bottom:1px solid #1a1a1e;padding-bottom:8px;margin-bottom:12px}
        .border-top{border-top:1px solid #1a1a1e;padding-top:12px;margin-top:12px}
        
        /* Layout */
        .flex{display:flex}
        .flex-col{flex-direction:column}
        .flex-1{flex:1}
        .gap-2{gap:8px}
        .gap-4{gap:16px}
        .gap-6{gap:24px}
        .items-center{align-items:center}
        .justify-between{justify-content:space-between}
        .shrink-0{flex-shrink:0}
        .overflow-hidden{overflow:hidden}
        .overflow-y-auto{overflow-y:auto}
        .w-full{width:100%}
        .h-full{height:100%}
        .min-h-0{min-height:0}
        .relative{position:relative}
        .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        /* Header */
        header{padding-bottom:12px;border-bottom:1px solid #1a1a1e;margin-bottom:16px;flex-shrink:0}
        header .root-link{color:#666;text-decoration:none;font-size:13px;font-weight:400;letter-spacing:0.15em;text-transform:uppercase;transition:color 0.1s}
        header .root-link:hover{color:#e8e8ea}
        header .root-link .arrow{color:#444;margin-right:6px}

        /* Main layout */
        main{flex:1;display:flex;flex-direction:column;gap:16px;min-height:0}
        @media(min-width:1024px){main{flex-direction:row}}
        
        /* Left panel */
        .left-panel{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
        
        /* Search */
        .search-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-shrink:0}
        .search-row span{color:#666;font-size:13px;user-select:none}
        .search-row input{background:transparent;border:none;outline:none;color:#e8e8ea;font-family:Verdana,Geneva,sans-serif;font-size:13px;width:100%;padding:4px 0}
        .search-row input::placeholder{color:#444}
        .search-row .refresh{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;background:none;border:none;cursor:pointer;padding:4px 8px}
        .search-row .refresh:hover{color:#e8e8ea}

        /* Categories */
        .categories{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;flex-shrink:0}
        .categories .cat-btn{color:#666;background:none;border:none;font-family:Verdana,Geneva,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;padding:2px 6px;transition:color 0.1s}
        .categories .cat-btn:hover,.categories .cat-btn.active{color:#e8e8ea}

        /* Sort row */
        .sort-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1e;padding-bottom:6px;margin-bottom:10px;flex-shrink:0}
        .sort-row span{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:0.08em}
        .sort-row select{background:transparent;border:none;outline:none;color:#666;font-family:Verdana,Geneva,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;appearance:none;padding:2px 0}
        .sort-row select:hover{color:#e8e8ea}
        .sort-row select option{background:#0a0a0c;color:#e8e8ea}

        /* Item list */
        #list{flex:1;overflow-y:auto;padding-right:4px}
        .item-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;cursor:pointer;text-decoration:none;border:none;background:none;width:100%;font-family:Verdana,Geneva,sans-serif;font-size:13px;transition:color 0.08s}
        .item-row .name{color:#e8e8ea;transition:color 0.08s}
        .item-row .price{color:#666;font-size:12px;font-family:Verdana,Geneva,sans-serif;transition:color 0.08s;flex-shrink:0;margin-left:12px}
        .item-row:hover .name,.item-row.active .name{color:#10b981}
        .item-row:hover .price,.item-row.active .price{color:#10b981;opacity:0.7}
        .item-row.active .name::before{content:"> ";color:#10b981}
        .empty-state{padding:40px 0;text-align:center;color:#444;font-size:11px;text-transform:uppercase;letter-spacing:0.1em}

        /* Right panel - Telemetry */
        .right-panel{width:100%;flex-shrink:0;border-top:1px solid #1a1a1e;padding-top:16px;display:flex;flex-direction:column;max-height:50vh}
        @media(min-width:1024px){.right-panel{width:340px;border-top:none;border-left:1px solid #1a1a1e;padding-top:0;padding-left:20px;max-height:none}}

        .right-panel .header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1e;padding-bottom:8px;margin-bottom:14px;flex-shrink:0}
        .right-panel .header .muted{font-size:10px}
        .right-panel .header .reset{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;background:none;border:none;cursor:pointer;display:none}
        .right-panel .header .reset:hover{color:#e8e8ea}

        .telemetry-content{flex:1;overflow-y:auto;padding-right:4px}
        
        /* Idle state */
        .idle-state{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;color:#444;text-align:center;padding-bottom:40px}
        .idle-state .muted{font-size:11px;letter-spacing:0.15em;opacity:0.5}

        /* Active state */
        .active-state{display:none;flex-direction:column;gap:14px}
        .active-state .type{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:0.08em}
        .active-state .item-name{font-size:18px;color:#e8e8ea;text-decoration:none;transition:color 0.15s;display:block}
        .active-state .item-name:hover{text-decoration:underline;text-underline-offset:4px;text-decoration-style:dashed}
        .active-state .item-short{color:#666;font-size:11px;text-transform:uppercase;letter-spacing:0.05em}
        
        .active-state .image-wrap{display:flex;justify-content:center;align-items:center;border-top:1px solid #1a1a1e;border-bottom:1px solid #1a1a1e;padding:16px 0;min-height:100px}
        .active-state .image-wrap img{max-height:80px;object-fit:contain;filter:grayscale(1) opacity(0.6) contrast(1.2);transition:all 0.2s}
        .active-state .image-wrap img:hover{filter:grayscale(0) opacity(1)}
        
        .active-state .metric{display:flex;justify-content:space-between;align-items:center}
        .active-state .metric .label{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:0.08em}
        .active-state .metric .value{font-family:Verdana,Geneva,sans-serif;font-size:13px;transition:color 0.15s}
        
        .active-state .source-section{margin-top:4px}
        .active-state .source-section .label{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;display:block;border-bottom:1px solid #1a1a1e;padding-bottom:4px;margin-bottom:6px}
        .active-state .source-row{display:flex;justify-content:space-between;font-size:12px;padding:1px 0}
        .active-state .source-row .src{color:#e8e8ea;text-transform:capitalize}
        .active-state .source-row .val{font-family:Verdana,Geneva,sans-serif}
        
        .active-state .meta{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.05em;border-top:1px solid #1a1a1e;padding-top:10px;margin-top:6px}
        .active-state .meta div{display:flex;justify-content:space-between;padding:1px 0}

        /* Footer */
        footer{flex-shrink:0;border-top:1px solid #1a1a1e;padding-top:10px;margin-top:14px;display:flex;justify-content:space-between;font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.08em}
        footer .status{display:flex;gap:16px}

        /* Utilities */
        .hidden{display:none!important}
        .block{display:block}
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="../index.html" class="root-link"><span class="arrow">←</span>home</a>
    </header>

    <!-- Main -->
    <main>
        <!-- Left Panel -->
        <div class="left-panel">
            <!-- Search -->
            <div class="search-row">
                <span>&gt;</span>
                <input type="text" id="search" placeholder="filter items..." autocomplete="off" spellcheck="false">
                <button class="refresh" id="refresh">↻</button>
            </div>

            <!-- Categories -->
            <div class="categories" id="categories">
                <button class="cat-btn active" data-cat="all">All</button>
                <button class="cat-btn" data-cat="weapon">Wep</button>
                <button class="cat-btn" data-cat="ammo">Ammo</button>
                <button class="cat-btn" data-cat="armor">Armor</button>
                <button class="cat-btn" data-cat="key">Keys</button>
                <button class="cat-btn" data-cat="barter">Item</button>
                <button class="cat-btn" data-cat="provisions">Med</button>
            </div>

            <!-- Sort -->
            <div class="sort-row">
                <span>Descriptor</span>
                <select id="sort">
                    <option value="name">Sort: Alpha</option>
                    <option value="price-desc">Sort: Price ↓</option>
                    <option value="price-asc">Sort: Price ↑</option>
                </select>
            </div>

            <!-- List -->
            <div id="list">
                <div class="empty-state">Loading...</div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="header">
                <span class="muted">Telemetry / Wiki</span>
                <button class="reset" id="reset">Reset</button>
            </div>
            <div class="telemetry-content">
                <!-- Idle -->
                <div class="idle-state" id="idle">
                    <span class="muted">[Awaiting Selection]</span>
                </div>
                <!-- Active -->
                <div class="active-state" id="active">
                    <div>
                        <div class="type" id="t-type">Type</div>
                        <a href="#" target="_blank" rel="noopener" class="item-name" id="t-name">Item Name</a>
                        <div class="item-short" id="t-short">Short Name</div>
                    </div>
                    
                    <div class="image-wrap">
                        <img id="t-img" src="" alt="" onerror="this.style.display='none'">
                    </div>
                    
                    <div>
                        <div class="metric">
                            <span class="label">Flea Market</span>
                            <span class="value" id="t-flea">---</span>
                        </div>
                        <div class="metric">
                            <span class="label">Trader Base</span>
                            <span class="value" id="t-base">---</span>
                        </div>
                    </div>
                    
                    <div class="source-section">
                        <span class="label">Sell To</span>
                        <div id="t-sell"></div>
                    </div>
                    
                    <div class="source-section">
                        <span class="label">Buy From</span>
                        <div id="t-buy"></div>
                    </div>
                    
                    <div class="meta">
                        <div><span>ID:</span><span id="t-id">---</span></div>
                        <div><span>Updated:</span><span id="t-updated">---</span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="status">
            <span id="status">Status: Init</span>
            <span id="ping">Ping: --</span>
        </div>
        <span id="count">0 Items</span>
    </footer>

    <script>
    "use strict";

    // --- State ---
    let items = [];
    let filtered = [];
    let selected = null;
    let category = 'all';
    let sortMode = 'name';

    // --- DOM refs ---
    const $ = id => document.getElementById(id);
    const listEl = $('list');
    const searchEl = $('search');
    const sortEl = $('sort');
    const statusEl = $('status');
    const pingEl = $('ping');
    const countEl = $('count');
    const resetBtn = $('reset');

    // Telemetry refs
    const idleEl = $('idle');
    const activeEl = $('active');
    const tName = $('t-name');
    const tShort = $('t-short');
    const tType = $('t-type');
    const tFlea = $('t-flea');
    const tBase = $('t-base');
    const tSell = $('t-sell');
    const tBuy = $('t-buy');
    const tId = $('t-id');
    const tUpdated = $('t-updated');
    const tImg = $('t-img');

    // --- Helpers ---
    function fmt(v, c = 'RUB') {
        if (v == null) return '---';
        const n = Math.round(v);
        if (c === 'USD') return '$' + n.toLocaleString();
        if (c === 'EUR') return '€' + n.toLocaleString();
        return n.toLocaleString() + ' ₽';
    }

    function getFlea(item) {
        const f = item.sellFor?.find(s => s.source === 'fleaMarket');
        return f ? f.price : 0;
    }

    // --- API fetch ---
    async function fetchData() {
        const start = performance.now();
        statusEl.textContent = 'Status: Syncing';
        const refreshBtn = $('refresh');
        refreshBtn.style.opacity = '0.5';

        const query = `{ items { id name shortName wikiLink basePrice types updated buyFor { price source currency } sellFor { price source currency } } }`;
        let data = null;
        let ok = false;

        for (let attempt = 0; attempt < 3; attempt++) {
            try {
                const res = await fetch('https://api.tarkov.dev/v1/graphql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                if (res.ok) {
                    const json = await res.json();
                    if (json?.data?.items) {
                        data = json.data.items;
                        ok = true;
                        break;
                    }
                }
            } catch (_) {}
            if (!ok) await new Promise(r => setTimeout(r, 800));
        }

        const latency = Math.round(performance.now() - start);
        pingEl.textContent = 'Ping: ' + latency + 'ms';

        if (ok && data) {
            items = data;
            statusEl.textContent = 'Status: Online';
        } else {
            // Minimal fallback
            items = [
                { id: '1', name: 'Labs Keycard', shortName: 'Labs Key', wikiLink: 'https://escapefromtarkov.fandom.com/wiki/TerraGroup_Labs_access_keycard', basePrice: 165000, types: ['key'], updated: new Date().toISOString(), buyFor: [{ price: 165000, source: 'therapist', currency: 'RUB' }], sellFor: [{ price: 215000, source: 'fleaMarket', currency: 'RUB' }] },
                { id: '2', name: 'M855A1', shortName: 'M855A1', wikiLink: 'https://escapefromtarkov.fandom.com/wiki/5.56x45mm_M855A1', basePrice: 420, types: ['ammo'], updated: new Date().toISOString(), buyFor: [{ price: 3400, source: 'fleaMarket', currency: 'RUB' }], sellFor: [{ price: 320, source: 'peacekeeper', currency: 'USD' }] },
                { id: '3', name: 'Slick Plate Carrier', shortName: 'Slick', wikiLink: 'https://escapefromtarkov.fandom.com/wiki/LBT-6094A_Slick_Plate_Carrier', basePrice: 280000, types: ['armor'], updated: new Date().toISOString(), buyFor: [{ price: 480000, source: 'fleaMarket', currency: 'RUB' }], sellFor: [{ price: 140000, source: 'ragman', currency: 'RUB' }] },
                { id: '4', name: 'AK-74N', shortName: 'AK-74N', wikiLink: 'https://escapefromtarkov.fandom.com/wiki/AK-74N_5.45x39_assault_rifle', basePrice: 43000, types: ['weapon'], updated: new Date().toISOString(), buyFor: [{ price: 39000, source: 'fleaMarket', currency: 'RUB' }], sellFor: [{ price: 28000, source: 'prapor', currency: 'RUB' }] }
            ];
            statusEl.textContent = 'Status: Cache';
        }

        refreshBtn.style.opacity = '1';
        countEl.textContent = items.length + ' Items';
        filterAndRender();
    }

    // --- Filter & Sort ---
    function filterAndRender() {
        const q = searchEl.value.toLowerCase().trim();
        filtered = items.filter(item => {
            if (category !== 'all' && (!item.types || !item.types.includes(category))) return false;
            if (q) {
                const name = (item.name || '').toLowerCase();
                const short = (item.shortName || '').toLowerCase();
                return name.includes(q) || short.includes(q);
            }
            return true;
        });

        sortEl.value = sortMode;
        const mode = sortEl.value;
        filtered.sort((a, b) => {
            if (mode === 'name') return (a.name || '').localeCompare(b.name || '');
            const fa = getFlea(a);
            const fb = getFlea(b);
            if (mode === 'price-desc') return fb - fa;
            return (fa || Infinity) - (fb || Infinity);
        });

        renderList();
    }

    // --- Render ---
    function renderList() {
        if (!filtered.length) {
            listEl.innerHTML = '<div class="empty-state">No Matches</div>';
            return;
        }

        const frag = document.createDocumentFragment();
        for (const item of filtered) {
            const div = document.createElement('div');
            div.className = 'item-row' + (selected?.id === item.id ? ' active' : '');
            div.setAttribute('data-id', item.id);
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'name';
            nameSpan.textContent = item.name || 'Unknown';
            
            const priceSpan = document.createElement('span');
            priceSpan.className = 'price';
            const flea = getFlea(item);
            priceSpan.textContent = flea ? fmt(flea) : '---';
            
            div.appendChild(nameSpan);
            div.appendChild(priceSpan);
            
            div.addEventListener('click', () => selectItem(item.id));
            frag.appendChild(div);
        }
        listEl.innerHTML = '';
        listEl.appendChild(frag);
    }

    // --- Select ---
    function selectItem(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        selected = item;

        // Update list highlights
        document.querySelectorAll('.item-row').forEach(el => {
            el.classList.toggle('active', el.dataset.id === id);
        });

        // Show active panel
        idleEl.classList.add('hidden');
        activeEl.classList.remove('hidden');
        resetBtn.style.display = 'block';

        // Populate telemetry
        tType.textContent = (item.types?.[0] || 'General').toUpperCase();
        tName.textContent = item.name || 'Unknown';
        tName.href = item.wikiLink || `https://escapefromtarkov.fandom.com/wiki/${encodeURIComponent(item.name.replace(/ /g, '_'))}`;
        tShort.textContent = item.shortName || 'N/A';

        const flea = item.sellFor?.find(s => s.source === 'fleaMarket');
        tFlea.textContent = flea ? fmt(flea.price, flea.currency) : '---';
        tBase.textContent = fmt(item.basePrice);

        // Accent color
        const accent = '#10b981';
        tName.style.color = accent;
        tFlea.style.color = accent;

        // Image
        tImg.src = `https://assets.tarkov.dev/${item.id}-base-image.png`;
        tImg.style.display = 'block';
        tImg.onerror = () => { tImg.style.display = 'none'; };

        // Sell sources
        tSell.innerHTML = '';
        if (item.sellFor?.length) {
            const sorted = [...item.sellFor].sort((a, b) => b.price - a.price);
            for (const s of sorted) {
                const row = document.createElement('div');
                row.className = 'source-row';
                row.innerHTML = `<span class="src">${s.source}</span><span class="val">${fmt(s.price, s.currency)}</span>`;
                tSell.appendChild(row);
            }
        } else {
            tSell.innerHTML = '<div class="source-row"><span class="src" style="color:#444">---</span></div>';
        }

        // Buy sources
        tBuy.innerHTML = '';
        if (item.buyFor?.length) {
            for (const b of item.buyFor) {
                const row = document.createElement('div');
                row.className = 'source-row';
                row.innerHTML = `<span class="src">${b.source}</span><span class="val">${fmt(b.price, b.currency)}</span>`;
                tBuy.appendChild(row);
            }
        } else {
            tBuy.innerHTML = '<div class="source-row"><span class="src" style="color:#444">---</span></div>';
        }

        tId.textContent = item.id || '---';
        tUpdated.textContent = item.updated ? new Date(item.updated).toLocaleString() : '---';
    }

    // --- Reset ---
    function resetSelection() {
        selected = null;
        activeEl.classList.add('hidden');
        idleEl.classList.remove('hidden');
        resetBtn.style.display = 'none';
        document.querySelectorAll('.item-row').forEach(el => el.classList.remove('active'));
    }

    // --- Events ---
    // Category buttons
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            category = btn.dataset.cat;
            filterAndRender();
        });
    });

    // Search
    searchEl.addEventListener('input', filterAndRender);

    // Sort
    sortEl.addEventListener('change', () => {
        sortMode = sortEl.value;
        filterAndRender();
    });

    // Refresh
    $('refresh').addEventListener('click', fetchData);

    // Reset
    resetBtn.addEventListener('click', resetSelection);

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            if (document.activeElement === searchEl) {
                searchEl.blur();
            } else {
                searchEl.value = '';
                resetSelection();
                filterAndRender();
            }
        }
        // Auto-focus search on typing
        if (!e.ctrlKey && !e.metaKey && document.activeElement !== searchEl && e.key.length === 1 && /[a-zA-Z0-9]/.test(e.key)) {
            searchEl.focus();
        }
    });

    // --- Init ---
    fetchData();
    </script>
</body>
</html>
