<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarkov Flea Market Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #0d0d0d;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            color: #d1d5db;
            user-select: none;
        }

        /* Slot Machine Styles */
        .machine-container {
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0,0,0,0.9);
            border: 2px solid #2d2d2d;
            background: #111;
        }

        .reel-container {
            height: 360px; /* 3 items visible, each 120px tall */
            width: 140px;
            position: relative;
            overflow: hidden;
            background: #000;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        /* Gradient overlays for depth */
        .reel-container::before, .reel-container::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 10;
            pointer-events: none;
        }
        .reel-container::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        }
        .reel-container::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        }

        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* The transition is assigned dynamically via JS for the CS:GO suspense */
        }

        .slot-item {
            height: 120px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border-bottom: 1px solid #1a1a1a;
            position: relative;
        }

        .slot-item img {
            max-width: 80px;
            max-height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* The CSGO Win Line */
        .win-line {
            position: absolute;
            top: 180px; /* Exactly halfway */
            left: -10px;
            right: -10px;
            height: 2px;
            background: #ff3b3b;
            z-index: 20;
            box-shadow: 0 0 10px #ff3b3b, 0 0 5px #ff3b3b;
            pointer-events: none;
        }

        .win-triangle-left, .win-triangle-right {
            position: absolute;
            top: 175px;
            width: 0; 
            height: 0; 
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            z-index: 21;
        }
        .win-triangle-left {
            left: 0;
            border-left: 10px solid #ff3b3b;
        }
        .win-triangle-right {
            right: 0;
            border-right: 10px solid #ff3b3b;
        }

        /* Rarity Backgrounds mapped from Tarkov API */
        .bg-tarkov-default { background: linear-gradient(135deg, #2a2a2a, #1a1a1a); }
        .bg-tarkov-blue { background: linear-gradient(135deg, #1e3a5f, #0f1d30); }
        .bg-tarkov-yellow { background: linear-gradient(135deg, #5f541e, #302a0f); }
        .bg-tarkov-green { background: linear-gradient(135deg, #1e5f29, #0f3014); }
        .bg-tarkov-red { background: linear-gradient(135deg, #5f1e1e, #300f0f); }
        .bg-tarkov-violet { background: linear-gradient(135deg, #4a1e5f, #250f30); }
        .bg-tarkov-grey { background: linear-gradient(135deg, #3a3a3a, #1a1a1a); }
        .bg-tarkov-black { background: linear-gradient(135deg, #111, #000); }
        .bg-tarkov-orange { background: linear-gradient(135deg, #5f3a1e, #301d0f); }

        .spin-btn {
            background: linear-gradient(to bottom, #4a5c2f, #2e3a1d);
            border: 2px solid #5d733b;
            transition: all 0.2s;
        }
        .spin-btn:hover:not(:disabled) {
            background: linear-gradient(to bottom, #5d733b, #3f4f28);
            box-shadow: 0 0 15px rgba(93, 115, 59, 0.5);
            transform: translateY(-2px);
        }
        .spin-btn:active:not(:disabled) {
            transform: translateY(1px);
        }
        .spin-btn:disabled {
            filter: grayscale(100%);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-item {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-10 relative">

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-[#0d0d0d] z-50 flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-t-[#9a9c23] border-gray-700 rounded-full animate-spin mb-4"></div>
        <h2 class="text-2xl text-[#9a9c23] font-bold tracking-widest">CONNECTING TO FLEA MARKET...</h2>
        <p id="loading-text" class="text-gray-500 mt-2">Fetching item data from tarkov.dev</p>
    </div>

    <div class="max-w-5xl w-full px-4 flex flex-col items-center">
        <div class="mb-8 text-center">
            <h1 class="text-5xl font-bold text-[#9a9c23] tracking-wider mb-2 drop-shadow-lg">TARKOV SCANNER</h1>
            <p class="text-gray-500">Secure the loot. Extract if you can.</p>
        </div>

        <!-- Slot Machine -->
        <div class="relative machine-container p-2 rounded-lg flex gap-1 mb-8">
            <!-- Global Win Line -->
            <div class="win-line"></div>
            <div class="win-triangle-left"></div>
            <div class="win-triangle-right"></div>

            <!-- Reels generated by JS -->
            <div class="reel-container" id="reel-0"><div class="reel-strip" id="strip-0"></div></div>
            <div class="reel-container" id="reel-1"><div class="reel-strip" id="strip-1"></div></div>
            <div class="reel-container" id="reel-2"><div class="reel-strip" id="strip-2"></div></div>
            <div class="reel-container" id="reel-3"><div class="reel-strip" id="strip-3"></div></div>
            <div class="reel-container" id="reel-4"><div class="reel-strip" id="strip-4"></div></div>
        </div>

        <button id="spin-btn" class="spin-btn text-white text-3xl font-bold py-4 px-16 rounded shadow-lg uppercase tracking-widest">
            START SCAN 
        </button>

        <button onclick="openRandomMinigame()" class="mt-4 text-[#9a9c23] hover:text-white border border-[#9a9c23] hover:bg-[#5d733b] px-6 py-2 rounded transition-all font-bold tracking-wider uppercase text-sm">
            Launch Random Minigame
        </button>

        <!-- Results Area -->
        <div id="results" class="mt-8 min-h-[120px] w-full max-w-4xl grid grid-cols-5 gap-4">
            <!-- Filled dynamically -->
        </div>
    </div>

    <!-- Minigame Popup Overlay -->
    <div id="minigame-popup" class="hidden fixed inset-0 bg-black/90 z-[100] flex-col items-center justify-center p-4 backdrop-blur-sm">
        <div class="relative w-full max-w-5xl h-[80vh] bg-[#111] border-2 border-[#5d733b] rounded-lg shadow-2xl flex flex-col">
            <div class="flex justify-between items-center p-3 bg-[#1a1a1a] border-b border-[#2d2d2d]">
                <h3 class="text-[#9a9c23] font-bold tracking-widest uppercase">Minigame Terminal</h3>
                <button onclick="closeMinigame()" class="text-gray-400 hover:text-red-500 transition-colors font-bold text-2xl px-2 leading-none">&times;</button>
            </div>
            <div class="flex-1 w-full relative">
                <iframe id="minigame-iframe" class="absolute inset-0 w-full h-full border-0" sandbox="allow-scripts allow-same-origin"></iframe>
                <div class="absolute inset-0 flex items-center justify-center -z-10 text-gray-600 font-bold tracking-widest">
                    <p>LOADING MINIGAME...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const REEL_COUNT = 5;
        const ITEMS_PER_SPIN = 60; // How many items to generate per reel for a spin
        const ITEM_HEIGHT = 120;
        const WIN_INDEX = ITEMS_PER_SPIN - 5; // The item it lands on (leaves a few below it)
        
        // Easing for CS:GO suspense - starts fast, long slow tail
        const SPIN_EASING = 'cubic-bezier(0.15, 0.9, 0.1, 1)';
        
        // Staggered times for reels to stop (in seconds)
        const REEL_DURATIONS = [4.0, 5.5, 7.0, 8.5, 10.0];

        let availableItems = [];
        let isSpinning = false;
        
        // Audio Context for Ticks
        let audioCtx;
        let lastTickIndices = [-1, -1, -1, -1, -1];
        let animationFrameId;

        // Minigame names to randomly select from
        const minigameFiles = ['aim_trainer', 'stash_tetris', 'scav_runner', 'hideout_clicker'];

        // Map API rarity colors to our CSS classes
        const rarityMap = {
            "default": "bg-tarkov-default",
            "blue": "bg-tarkov-blue",
            "yellow": "bg-tarkov-yellow",
            "green": "bg-tarkov-green",
            "red": "bg-tarkov-red",
            "violet": "bg-tarkov-violet",
            "grey": "bg-tarkov-grey",
            "black": "bg-tarkov-black",
            "orange": "bg-tarkov-orange"
        };

        // Initialize Application
        async function init() {
            try {
                document.getElementById('loading-text').innerText = "Querying tarkov.dev GraphQL...";
                const query = `
                {
                    items(limit: 200) {
                        id
                        name
                        shortName
                        iconLink
                        backgroundColor
                    }
                }
                `;

                const response = await fetch('https://api.tarkov.dev/graphql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const json = await response.json();
                
                // Filter items that actually have valid image links
                const rawItems = json.data.items.filter(item => 
                    item.iconLink && 
                    item.iconLink.startsWith('http') && 
                    !item.iconLink.includes('unknown')
                );

                document.getElementById('loading-text').innerText = "Caching icons...";
                
                // Preload images to prevent blank items during high-speed spinning
                await preloadImages(rawItems);
                
                availableItems = rawItems;
                
                // Setup initial state
                setupInitialReels();

                document.getElementById('loading').style.display = 'none';
                
                // Bind events
                document.getElementById('spin-btn').addEventListener('click', spin);

            } catch (error) {
                console.error("Error fetching from Tarkov API:", error);
                document.getElementById('loading-text').innerText = "Error loading data. Check console.";
                document.getElementById('loading-text').classList.add('text-red-500');
            }
        }

        async function preloadImages(items) {
            const promises = items.map(item => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = resolve;
                    img.onerror = resolve; // Resolve anyway to not block
                    img.src = item.iconLink;
                });
            });
            // Just wait for the first 50 to ensure we have a good starting pool quickly
            await Promise.all(promises.slice(0, 50));
        }

        function getRandomItem() {
            const index = Math.floor(Math.random() * availableItems.length);
            return availableItems[index];
        }

        function createItemElement(item) {
            const colorClass = rarityMap[item.backgroundColor] || rarityMap["default"];
            return `
                <div class="slot-item ${colorClass}" data-name="${item.shortName}">
                    <img src="${item.iconLink}" alt="${item.shortName}" loading="lazy">
                </div>
            `;
        }

        function setupInitialReels() {
            for (let i = 0; i < REEL_COUNT; i++) {
                const strip = document.getElementById(`strip-${i}`);
                let html = '';
                // We only need 3 items initially to fill the viewport
                for (let j = 0; j < 3; j++) {
                    html += createItemElement(getRandomItem());
                }
                strip.innerHTML = html;
                strip.style.transform = `translateY(0px)`;
            }
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTickSound(vol = 0.05, pitchMod = 1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            // Short, sharp tick
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800 * pitchMod, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.03);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        function playWinSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        async function spin() {
            if (isSpinning) return;
            isSpinning = true;
            initAudio();
            
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.innerText = "ROLLING...";
            
            document.getElementById('results').innerHTML = ''; // Clear old results

            const winItems = [];

            for (let i = 0; i < REEL_COUNT; i++) {
                const strip = document.getElementById(`strip-${i}`);
                
                // 1. Get the currently visible top 3 items to append them first (seamless reset)
                // Actually, an easier way is to just grab the children and take the ones currently visible
                // Since our transform puts the 'winning' item at a specific Y, we can just read the DOM.
                // But let's build a fresh strip entirely where the first 3 match the current state.
                const currentItems = Array.from(strip.children);
                // The item currently centered on the winline is based on current transform.
                // For simplicity, we'll just extract the visible HTML, clear, and paste it back at the top.
                // Then append the new items.
                
                // Find currently visible indices based on transform
                const style = window.getComputedStyle(strip);
                const matrix = new DOMMatrixReadOnly(style.transform);
                const currentY = matrix.m42;
                
                // The center of container is 180px. 
                // Item crossing center = Math.floor((180 - currentY) / ITEM_HEIGHT)
                const centerIndex = Math.floor((180 - currentY) / ITEM_HEIGHT);
                
                // We want the new strip to start with [center-1, center, center+1]
                let startHtml = '';
                for(let j = centerIndex - 1; j <= centerIndex + 1; j++) {
                    if (currentItems[j]) {
                        startHtml += currentItems[j].outerHTML;
                    } else {
                        startHtml += createItemElement(getRandomItem());
                    }
                }

                // 2. Generate the rest of the spin items
                let newHtml = startHtml;
                let targetItem;
                
                for (let j = 3; j < ITEMS_PER_SPIN; j++) {
                    const itemData = getRandomItem();
                    newHtml += createItemElement(itemData);
                    if (j === WIN_INDEX) {
                        targetItem = itemData;
                    }
                }
                winItems.push(targetItem);

                // 3. Reset strip
                strip.style.transition = 'none';
                strip.innerHTML = newHtml;
                // Since the first 3 items in the new DOM are the ones that were just visible,
                // we set translateY so the middle one (index 1) is at the center line (180px).
                // Formula: ty = -(1 * 120) + 120 = 0.
                strip.style.transform = `translateY(0px)`;
                
                // Force reflow
                void strip.offsetHeight; 

                // 4. Calculate final destination with CSGO suspense offset
                // We want WIN_INDEX to land on the center line.
                // ty = -(WIN_INDEX * ITEM_HEIGHT) + (ITEM_HEIGHT) 
                const baseTargetY = -(WIN_INDEX * ITEM_HEIGHT) + ITEM_HEIGHT;
                
                // Add a random pixel offset between -45 and +45 so it barely crosses the line sometimes
                const offset = (Math.random() * 90) - 45;
                const finalTargetY = baseTargetY + offset;

                // 5. Apply transition
                setTimeout(() => {
                    strip.style.transition = `transform ${REEL_DURATIONS[i]}s ${SPIN_EASING}`;
                    strip.style.transform = `translateY(${finalTargetY}px)`;
                }, 50); // slight delay to ensure reflow caught
            }

            // Start Audio Tracking loop
            lastTickIndices = [-1, -1, -1, -1, -1];
            trackSpins();

            // Wait for the last reel to finish
            setTimeout(() => {
                cancelAnimationFrame(animationFrameId);
                finishSpin(winItems);
            }, REEL_DURATIONS[REEL_COUNT - 1] * 1000 + 100);
        }

        // Monitors CSS transitions every frame to play perfect "ticks"
        function trackSpins() {
            let stillSpinning = false;
            
            for (let i = 0; i < REEL_COUNT; i++) {
                const strip = document.getElementById(`strip-${i}`);
                const style = window.getComputedStyle(strip);
                
                if (style.transitionDuration !== '0s') {
                    stillSpinning = true;
                    const matrix = new DOMMatrixReadOnly(style.transform);
                    const ty = matrix.m42;
                    
                    // Center line is 180px in the container.
                    const currentItemIndex = Math.floor((180 - ty) / ITEM_HEIGHT);
                    
                    if (currentItemIndex !== lastTickIndices[i] && currentItemIndex > 1) {
                        lastTickIndices[i] = currentItemIndex;
                        // Pitch down slightly as it slows down (higher index = slower)
                        const progress = currentItemIndex / WIN_INDEX;
                        const pitch = Math.max(0.3, 1 - (progress * 0.5));
                        // Volume fades up slightly towards the end for tension
                        const vol = 0.02 + (progress * 0.05); 
                        playTickSound(vol, pitch);
                    }
                }
            }

            if (stillSpinning) {
                animationFrameId = requestAnimationFrame(trackSpins);
            }
        }

        function finishSpin(winItems) {
            isSpinning = false;
            const btn = document.getElementById('spin-btn');
            btn.disabled = false;
            btn.innerText = "SCAN AGAIN";
            
            playWinSound();

            const resultsContainer = document.getElementById('results');
            
            // Stagger the result popups
            winItems.forEach((item, index) => {
                setTimeout(() => {
                    const colorClass = rarityMap[item.backgroundColor] || rarityMap["default"];
                    const card = document.createElement('div');
                    card.className = `result-item ${colorClass} rounded border border-neutral-700 p-2 flex flex-col items-center justify-center text-center shadow-lg`;
                    card.innerHTML = `
                        <img src="${item.iconLink}" alt="${item.shortName}" class="w-16 h-16 object-contain drop-shadow-md mb-2">
                        <span class="text-xs font-bold text-white truncate w-full px-1" title="${item.name}">${item.shortName}</span>
                    `;
                    resultsContainer.appendChild(card);
                }, index * 150); // 150ms stagger
            });
        }

        // Minigame Popup Logic
        function openRandomMinigame() {
            const randomGame = minigameFiles[Math.floor(Math.random() * minigameFiles.length)];
            // Updated to be relative to the 'tarkov' folder
            const gamePath = `minigames/${randomGame}.html`;
            
            const popup = document.getElementById('minigame-popup');
            const iframe = document.getElementById('minigame-iframe');
            
            iframe.src = gamePath;
            popup.classList.remove('hidden');
            popup.classList.add('flex');
        }

        function closeMinigame() {
            const popup = document.getElementById('minigame-popup');
            const iframe = document.getElementById('minigame-iframe');
            
            popup.classList.add('hidden');
            popup.classList.remove('flex');
            iframe.src = ''; // Clear iframe source to stop the game
        }

        // Boot
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
