<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~ // audio/visual latency test</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Consolas', 'monospace'],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            background: #050505;
            color: #a1a1aa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom scrollbar matching character sheets */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #171717;
            border-radius: 2px;
        }
        /* Visual latency flash indicator transition timing */
        .sync-indicator {
            transition: background-color 0.05s ease-out, box-shadow 0.05s ease-out, border-color 0.05s ease-out;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col p-6 selection:bg-neutral-800 selection:text-white relative">

    <!-- Top Navigation & Title Bar -->
    <header class="w-full flex flex-col sm:flex-row sm:items-center justify-between gap-4 z-40 mb-6 shrink-0 font-mono">
        <div class="flex items-center gap-3">
            <!-- Back Button pointing to index.html -->
            <a id="back-btn" href="index.html" class="flex items-center gap-1.5 text-[11px] text-neutral-500 hover:text-white border border-[#171717] bg-[#09090b]/50 hover:bg-[#09090b] px-3 py-2 rounded transition focus:outline-none shadow-sm">
                <span class="text-neutral-600 font-bold">&lt;</span> BACK
            </a>
            <span class="text-white font-bold text-sm tracking-wider uppercase flex items-center gap-2 select-none">
                <span class="inline-block w-2 h-2 rounded-sm bg-yellow-500 animate-pulse"></span>
                Audio/Visual Latency Test
            </span>
            <!-- Live Audio Stream Channel Status -->
            <span id="audio-status" class="text-[10px] px-2.5 py-1 rounded border border-[#964247]/60 bg-[#964247]/10 text-red-400 font-mono animate-pulse select-none uppercase tracking-wider ml-2">
                [ AUDIO MUTED: CLICK ANYWHERE TO UNMUTE ]
            </span>
        </div>
    </header>

    <!-- Controls (Speed, Volume, & Toggles - Top Left Alignment) -->
    <div class="absolute top-24 left-6 flex flex-col gap-4 z-20 max-w-[calc(100vw-6rem)] font-mono">
        <!-- Sliders Row -->
        <div class="flex flex-row flex-wrap gap-6 items-center">
            <!-- Speed Slider -->
            <div class="flex items-center gap-3">
                <label for="speed-slider" class="text-xs font-bold text-neutral-500 uppercase tracking-wider">
                    Speed: <span id="speed-val" class="text-yellow-500 w-10 inline-block">0.5x</span>
                </label>
                <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="0.5" class="w-24 md:w-36 h-1 bg-neutral-800 rounded-lg appearance-none cursor-pointer accent-yellow-500">
            </div>
            
            <!-- Minimal Grid Divider -->
            <div class="hidden sm:block h-4 w-px bg-neutral-800"></div>
            
            <!-- Volume Slider -->
            <div class="flex items-center gap-3">
                <label for="volume-slider" class="text-xs font-bold text-neutral-500 uppercase tracking-wider">
                    Volume: <span id="volume-val" class="text-yellow-500 w-10 inline-block">30%</span>
                </label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3" class="w-24 md:w-36 h-1 bg-neutral-800 rounded-lg appearance-none cursor-pointer accent-yellow-500">
            </div>
        </div>

        <!-- Toggles Row -->
        <div class="flex flex-row flex-wrap gap-5 items-center text-xs">
            <!-- Center Blip Toggle -->
            <label class="flex items-center gap-2 cursor-pointer text-neutral-400 font-bold uppercase tracking-wider select-none">
                <input type="checkbox" id="toggle-center" checked class="sr-only peer">
                <div class="relative w-8 h-4 bg-neutral-800 border border-neutral-700/60 rounded-sm peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[1px] after:start-[1px] after:bg-neutral-400 after:rounded-sm after:h-[12px] after:w-[13px] after:transition-all peer-checked:bg-yellow-600 peer-checked:after:bg-white"></div>
                <span>Center Blip</span>
            </label>

            <!-- Left/Right Blip Toggle -->
            <label class="flex items-center gap-2 cursor-pointer text-neutral-400 font-bold uppercase tracking-wider select-none">
                <input type="checkbox" id="toggle-lr" class="sr-only peer">
                <div class="relative w-8 h-4 bg-neutral-800 border border-neutral-700/60 rounded-sm peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[1px] after:start-[1px] after:bg-neutral-400 after:rounded-sm after:h-[12px] after:w-[13px] after:transition-all peer-checked:bg-yellow-600 peer-checked:after:bg-white"></div>
                <span>Left/Right Blip</span>
            </label>

            <!-- Top/Bottom Blip Toggle -->
            <label class="flex items-center gap-2 cursor-pointer text-neutral-400 font-bold uppercase tracking-wider select-none">
                <input type="checkbox" id="toggle-tb" class="sr-only peer">
                <div class="relative w-8 h-4 bg-neutral-800 border border-neutral-700/60 rounded-sm peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[1px] after:start-[1px] after:bg-neutral-400 after:rounded-sm after:h-[12px] after:w-[13px] after:transition-all peer-checked:bg-yellow-600 peer-checked:after:bg-white"></div>
                <span>Top/Bottom Blip</span>
            </label>

            <!-- Positional Blip Toggle (Now off by default) -->
            <label class="flex items-center gap-2 cursor-pointer text-neutral-400 font-bold uppercase tracking-wider select-none">
                <input type="checkbox" id="toggle-positional" class="sr-only peer">
                <div class="relative w-8 h-4 bg-neutral-800 border border-neutral-700/60 rounded-sm peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[1px] after:start-[1px] after:bg-neutral-400 after:rounded-sm after:h-[12px] after:w-[13px] after:transition-all peer-checked:bg-yellow-600 peer-checked:after:bg-white"></div>
                <span>Positional Blip</span>
            </label>
        </div>
    </div>

    <!-- Flashing Indicators Workspace (Now with Symmetrical Centered Padding) -->
    <div class="flex-1 w-full flex items-center justify-center gap-12 md:gap-32 mt-12 px-8 z-0">
        <!-- Left tactical status block -->
        <div class="flex flex-col items-center gap-4">
            <div id="circle-left" class="sync-indicator w-28 h-28 md:w-56 md:h-56 rounded-full border border-neutral-800 bg-[#09090b] shadow-[inner_0_0_20px_rgba(0,0,0,0.8)]"></div>
            <span class="text-[10px] font-mono tracking-widest uppercase text-neutral-600">Left Channel</span>
        </div>
        <!-- Right tactical status block -->
        <div class="flex flex-col items-center gap-4">
            <div id="circle-right" class="sync-indicator w-28 h-28 md:w-56 md:h-56 rounded-full border border-neutral-800 bg-[#09090b] shadow-[inner_0_0_20px_rgba(0,0,0,0.8)]"></div>
            <span class="text-[10px] font-mono tracking-widest uppercase text-neutral-600">Right Channel</span>
        </div>
    </div>

    <!-- Vertical Timeline Scale Area (Right Side) -->
    <div class="absolute right-12 top-36 bottom-48 w-24 flex justify-start items-center z-10">
        <!-- Track Wrapper -->
        <div class="relative h-full w-12 border-l-2 border-neutral-800">
            <!-- Vertical Ball inside wrapper -->
            <div id="ball-vertical" class="sync-indicator absolute w-10 h-10 bg-white border border-neutral-900 rounded-full -left-5 -mt-5 shadow-[0_0_15px_rgba(255,255,255,0.6)] will-change-transform"></div>
            <!-- Vertical Ticks inside wrapper -->
            <div id="vertical-ticks-container" class="absolute inset-0 pointer-events-none"></div>
        </div>
    </div>

    <!-- Horizontal Timeline Scale Area (Bottom - Symmetrical Centered Width) -->
    <div class="w-full max-w-5xl mx-auto h-64 relative flex flex-col items-center justify-end pb-20 px-8 z-10">
        <!-- Track Wrapper -->
        <div class="relative w-full h-12 border-b-2 border-neutral-800">
            <!-- The Moving Ball inside wrapper -->
            <div id="ball" class="sync-indicator absolute w-10 h-10 bg-white border border-neutral-900 rounded-full -bottom-5 -ml-5 shadow-[0_0_15px_rgba(255,255,255,0.6)] will-change-transform"></div>
            <!-- Ticks Container inside wrapper -->
            <div id="ticks-container" class="absolute inset-0 pointer-events-none"></div>
        </div>
        
        <!-- Legend labels -->
        <div class="w-full flex justify-between px-8 absolute bottom-6 text-neutral-600 font-mono font-bold tracking-widest text-xs uppercase select-none">
            <span>Left Range [-1]</span>
            <span>Right Range [1]</span>
        </div>
    </div>

    <script>
        // DOM Elements
        const ball = document.getElementById('ball');
        const ballVertical = document.getElementById('ball-vertical');
        const circleLeft = document.getElementById('circle-left');
        const circleRight = document.getElementById('circle-right');
        const audioStatus = document.getElementById('audio-status');
        
        const ticksContainer = document.getElementById('ticks-container');
        const verticalTicksContainer = document.getElementById('vertical-ticks-container');
        
        const speedSlider = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeVal = document.getElementById('volume-val');

        // Toggle Buttons
        const toggleCenter = document.getElementById('toggle-center');
        const toggleLR = document.getElementById('toggle-lr');
        const toggleTB = document.getElementById('toggle-tb');
        const togglePositional = document.getElementById('toggle-positional');

        // State & Audio Context
        let isRunning = true; // Auto-run on page load
        let audioCtx = null;
        let lastTimestamp = 0;
        let timeInCycle = 0;
        let lastTimeInCycle = 0;
        let speed = 0.5; // Default Speed
        const cycleDuration = 2000; // Base cycle is 2000ms

        // Dynamic Environment Navigation Binds
        const backBtn = document.getElementById('back-btn');
        if (backBtn) {
            const isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (isLocal) {
                if (window.location.pathname.includes('/tools/') || window.location.pathname.includes('/public/')) {
                    backBtn.href = '../index.html';
                } else {
                    backBtn.href = 'index.html';
                }
            } else {
                backBtn.href = '/';
            }
        }

        // Listeners for Sliders
        speedSlider.addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            speedVal.textContent = speed.toFixed(1) + 'x';
        });

        volumeSlider.addEventListener('input', (e) => {
            const vol = parseFloat(e.target.value);
            volumeVal.textContent = Math.round(vol * 100) + '%';
        });

        // Generate Timeline Ticks (-1 to 1) for both axes
        function createTicks() {
            ticksContainer.innerHTML = '';
            verticalTicksContainer.innerHTML = '';
            for (let i = 0; i <= 20; i++) {
                // Horizontal Ticks
                const tick = document.createElement('div');
                tick.className = 'absolute bottom-0 w-0.5 bg-neutral-800 rounded-t';
                
                // Vertical Ticks
                const vTick = document.createElement('div');
                vTick.className = 'absolute left-0 h-0.5 bg-neutral-800 rounded-r';
                
                if (i === 10) { 
                    // Center '0' marks
                    tick.className = 'absolute bottom-0 w-0.5 bg-neutral-500 rounded-t';
                    tick.style.height = '40px';
                    tick.innerHTML = `<span class="absolute top-12 -ml-1 text-neutral-500 font-mono text-[11px] font-bold">0</span>`;
                    
                    vTick.className = 'absolute left-0 h-0.5 bg-neutral-500 rounded-r';
                    vTick.style.width = '40px';
                    vTick.innerHTML = `<span class="absolute left-12 -mt-2 text-neutral-500 font-mono text-[11px] font-bold">0</span>`;
                } else if (i === 0) { 
                    // Left '-1' (Horizontal) / Top '1' (Vertical) marks
                    tick.style.height = '30px';
                    tick.innerHTML = `<span class="absolute top-10 -ml-2 text-neutral-600 font-mono text-[9px] font-bold">-1</span>`;
                    
                    vTick.style.width = '30px';
                    vTick.innerHTML = `<span class="absolute left-10 -mt-1.5 text-neutral-600 font-mono text-[9px] font-bold">1</span>`;
                } else if (i === 20) { 
                    // Right '1' (Horizontal) / Bottom '-1' (Vertical) marks
                    tick.style.height = '30px';
                    tick.innerHTML = `<span class="absolute top-10 -ml-1 text-neutral-600 font-mono text-[9px] font-bold">1</span>`;
                    
                    vTick.style.width = '30px';
                    vTick.innerHTML = `<span class="absolute left-10 -mt-1.5 text-neutral-600 font-mono text-[9px] font-bold">-1</span>`;
                } else {
                    // Regular 10th of a second marks
                    tick.style.height = '16px';
                    vTick.style.width = '16px';
                }

                // Apply positioning
                tick.style.left = `${(i / 20) * 100}%`;
                tick.style.transform = 'translateX(-50%)';
                ticksContainer.appendChild(tick);

                vTick.style.top = `${(i / 20) * 100}%`;
                vTick.style.transform = 'translateY(-50%)';
                verticalTicksContainer.appendChild(vTick);
            }
        }

        // Initialize AudioContext seamlessly on user interaction to comply with browser safety blocks
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // Update live UI badge to show secure state
            audioStatus.textContent = "[ AUDIO ONLINE ]";
            audioStatus.classList.remove('border-[#964247]/60', 'bg-[#964247]/10', 'text-red-400', 'animate-pulse');
            audioStatus.classList.add('border-[#346b52]/60', 'bg-[#346b52]/10', 'text-emerald-400');
        }

        // Setup interaction listeners to unlock Web Audio API seamlessly
        window.addEventListener('click', initAudio);
        window.addEventListener('keydown', initAudio);
        window.addEventListener('touchstart', initAudio);

        // Generate precise tones with optional Stereo Panning (-1 = Left, 0 = Center, 1 = Right)
        function playBeep(frequency, panValue = 0) {
            if (!audioCtx) return;
            const vol = parseFloat(volumeSlider.value);
            if (vol === 0) return; // Muted

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Setup audio pipeline
            osc.connect(gainNode);

            if (togglePositional.checked && audioCtx.createStereoPanner) {
                const panner = audioCtx.createStereoPanner();
                panner.pan.setValueAtTime(panValue, audioCtx.currentTime);
                gainNode.connect(panner);
                panner.connect(audioCtx.destination);
            } else {
                gainNode.connect(audioCtx.destination);
            }

            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // Sharp attack, quick decay
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
            
            const decayTarget = Math.max(vol * 0.001, 0.0001); 
            gainNode.gain.exponentialRampToValueAtTime(decayTarget, audioCtx.currentTime + 0.1);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Tactical Indicator Glow Helpers (Matching index status grid designs)
        function flashLeftCircle() {
            circleLeft.style.backgroundColor = '#346b52'; // EFT Dark Green
            circleLeft.style.borderColor = '#4ade80'; 
            circleLeft.style.boxShadow = '0 0 20px 2px rgba(52, 107, 82, 0.6)';
            setTimeout(() => {
                circleLeft.style.backgroundColor = '#09090b'; 
                circleLeft.style.borderColor = '#262626';
                circleLeft.style.boxShadow = 'none';
            }, 80);
        }

        // Flash Right Circle
        function flashRightCircle() {
            circleRight.style.backgroundColor = '#964247'; // EFT Dark Red
            circleRight.style.borderColor = '#f87171'; 
            circleRight.style.boxShadow = '0 0 20px 2px rgba(150, 66, 71, 0.6)';
            setTimeout(() => {
                circleRight.style.backgroundColor = '#09090b'; 
                circleRight.style.borderColor = '#262626';
                circleRight.style.boxShadow = 'none';
            }, 80);
        }

        // Flash horizontal ball
        function flashHorizontalBall() {
            ball.style.backgroundColor = '#eab308'; // Amber Accent Glow
            ball.style.borderColor = '#ffffff';
            ball.style.boxShadow = '0 0 30px 8px rgba(234, 179, 8, 0.8)';
            setTimeout(() => {
                ball.style.backgroundColor = '#ffffff';
                ball.style.borderColor = '#171717';
                ball.style.boxShadow = '0 0 15px rgba(255,255,255,0.6)';
            }, 80);
        }

        // Flash vertical ball
        function flashVerticalBall() {
            ballVertical.style.backgroundColor = '#eab308'; // Amber Accent Glow
            ballVertical.style.borderColor = '#ffffff';
            ballVertical.style.boxShadow = '0 0 30px 8px rgba(234, 179, 8, 0.8)';
            setTimeout(() => {
                ballVertical.style.backgroundColor = '#ffffff';
                ballVertical.style.borderColor = '#171717';
                ballVertical.style.boxShadow = '0 0 15px rgba(255,255,255,0.6)';
            }, 80);
        }

        // Trigger visual events based on trigger types
        function triggerSyncEvent(type) {
            if (type === 'center') {
                playBeep(1000, 0); // Center: 1000Hz, Centered panning (0)
                flashLeftCircle();
                flashRightCircle();
                flashHorizontalBall();
                flashVerticalBall();
            } else if (type === 'left') {
                playBeep(800, -1.0); // Left extreme: 800Hz, Left panned (-1.0)
                flashLeftCircle();
                flashHorizontalBall();
            } else if (type === 'right') {
                playBeep(800, 1.0); // Right extreme: 800Hz, Right panned (1.0)
                flashRightCircle();
                flashHorizontalBall();
            } else if (type === 'top') {
                playBeep(1200, 0); // Top extreme: 1200Hz, Centered panning (0)
                flashVerticalBall();
            } else if (type === 'bottom') {
                playBeep(1200, 0); // Bottom extreme: 1200Hz, Centered panning (0)
                flashVerticalBall();
            }
        }

        // Main Animation Loop
        function animate(timestamp) {
            if (!isRunning) return;
            if (!lastTimestamp) lastTimestamp = timestamp;

            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            // Move through current cycle
            timeInCycle += deltaTime * speed;
            timeInCycle = timeInCycle % cycleDuration; // Wraps every 2000ms

            // Calculate position (-1 to 1)
            let position;
            if (timeInCycle < 1000) {
                // Moving left-to-right / top-to-bottom
                position = -1 + (timeInCycle / 500); 
            } else {
                // Moving right-to-left / bottom-to-top
                position = 1 - ((timeInCycle - 1000) / 500); 
            }

            // Move the balls visually relative to their precise track width/height
            const percentagePos = ((position + 1) / 2) * 100;
            ball.style.left = `${percentagePos}%`;
            ballVertical.style.top = `${percentagePos}%`;

            // Detect Triggers
            let triggerCenter = false;
            let triggerLeft = false;
            let triggerRight = false;
            let triggerTop = false;
            let triggerBottom = false;

            // 1. Center Crossings (at 500ms and 1500ms)
            if (lastTimeInCycle <= 500 && timeInCycle > 500) triggerCenter = true;
            if (lastTimeInCycle <= 1500 && timeInCycle > 1500) triggerCenter = true;

            // 2. Right/Bottom Extremes (at 1000ms)
            if (lastTimeInCycle <= 1000 && timeInCycle > 1000) {
                triggerRight = true;
                triggerBottom = true;
            }

            // 3. Left/Top Extremes (wrap-around at 0ms)
            if (lastTimeInCycle > timeInCycle) {
                triggerLeft = true;
                triggerTop = true;
            }

            // Handle Active Toggles and Play Sounds
            if (triggerCenter && toggleCenter.checked) {
                triggerSyncEvent('center');
            }
            if (triggerLeft && toggleLR.checked) {
                triggerSyncEvent('left');
            }
            if (triggerRight && toggleLR.checked) {
                triggerSyncEvent('right');
            }
            if (triggerTop && toggleTB.checked) {
                triggerSyncEvent('top');
            }
            if (triggerBottom && toggleTB.checked) {
                triggerSyncEvent('bottom');
            }

            lastTimeInCycle = timeInCycle;
            requestAnimationFrame(animate);
        }

        // Initialization
        createTicks();
        
        // Start animation frame loop immediately on page load
        requestAnimationFrame(animate);

        // Handle visibility change to prevent animation glitches when tabbing away
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isRunning = false;
                lastTimestamp = 0; // Reset timing so delta calculation is clean upon return
            } else {
                isRunning = true;
                requestAnimationFrame(animate);
            }
        });

    </script>
</body>
</html>
