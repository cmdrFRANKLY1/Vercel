<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>background generator · random shapes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Hardcoded high-legibility Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Consolas', 'monospace'],
                    },
                },
            },
        };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            overflow: hidden;
            
            /* Prevent global selection to stop browser iframe selection crashes */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* Hardcoded typography styling classes */
        .font-mono {
            font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace !important;
        }
        .font-sans {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif !important;
        }

        #canvas-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #bg-canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Frosted top horizontal panel styled exactly like index.html */
        .control-panel {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #171717;
            border-radius: 8px;
            padding: 0.6rem 1.25rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .control-panel.hidden {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }

        .control-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .input-field {
            background: #050505;
            border: 1px solid #171717;
            border-radius: 4px;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
            
            /* Enable selection specifically in input fields for editing quantity */
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }

        .input-field:focus {
            border-color: #52525b;
        }

        .btn-action {
            background: #09090b;
            border: 1px solid #171717;
            border-radius: 4px;
            color: #a1a1aa;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.4rem 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-action:hover {
            border-color: #52525b;
            color: #ffffff;
            background: #171717;
        }

        .btn-action:disabled {
            background: #18181b;
            border-color: #171717;
            color: #52525b;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .control-panel {
                top: 1rem;
                left: 1rem;
                right: 1rem;
                padding: 0.6rem 1rem;
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body class="font-sans">

    <!-- Canvas Wrapper -->
    <div id="canvas-wrapper">
        <canvas id="bg-canvas"></canvas>
    </div>

    <!-- Batch Controls Overlay (Horizontal Navigation Design) -->
    <div class="control-panel" id="control-panel">
        
        <!-- Group 1: Navigation and Title -->
        <div class="flex items-center gap-3">
            <a id="back-btn" href="index.html" class="flex items-center gap-1.5 text-[11px] text-neutral-500 hover:text-white border border-[#171717] bg-[#050505] px-2.5 py-1.5 rounded transition font-mono focus:outline-none">
                <span class="text-neutral-600 font-bold">&lt;</span> BACK
            </a>
            <div class="control-title select-none font-mono">
                WALLPAPER GEN
                <span class="text-[9px] text-neutral-500 font-normal hidden lg:inline">[H] to Hide</span>
            </div>
        </div>

        <!-- Group 2: Shape Bounds, Color Picker and BG Lock -->
        <div class="flex flex-wrap items-center gap-3 text-xs font-mono">
            <!-- Min/Max Shapes Group -->
            <div class="flex items-center gap-2 bg-[#050505] px-2.5 py-1.5 border border-[#171717] rounded">
                <span class="text-[10px] text-neutral-500 font-bold uppercase">Shapes</span>
                <input class="w-10 bg-transparent text-white text-[11px] text-center outline-none input-field !p-0 !border-0" type="number" id="min-shapes" value="2" min="1" max="50" title="Minimum Shapes">
                <span class="text-neutral-700">-</span>
                <input class="w-10 bg-transparent text-white text-[11px] text-center outline-none input-field !p-0 !border-0" type="number" id="max-shapes" value="5" min="1" max="50" title="Maximum Shapes">
            </div>

            <!-- Background Color Picker & Locking -->
            <div class="flex items-center gap-3 bg-[#050505] px-2.5 py-1 border border-[#171717] rounded">
                <div class="flex items-center gap-1.5">
                    <span class="text-[10px] text-neutral-500 font-bold uppercase">BG</span>
                    <input type="color" id="bg-color-picker" value="#000000" class="w-6 h-6 rounded bg-transparent border-0 cursor-pointer p-0">
                </div>
                <div class="flex items-center gap-1.5 border-l border-neutral-800 pl-2.5">
                    <input type="checkbox" id="bg-color-lock" checked class="w-3.5 h-3.5 bg-[#050505] border border-[#171717] rounded-sm cursor-pointer accent-[#4b70af]">
                    <label class="text-[10px] text-neutral-400 cursor-pointer uppercase font-bold" for="bg-color-lock">Lock</label>
                </div>
            </div>
        </div>

        <!-- Group 3: Core Action Triggers (Generate Single & Go Batch) -->
        <div class="flex flex-wrap items-center gap-2.5">
            <!-- Generate single background without downloading -->
            <button class="btn-action font-mono" id="btn-generate-single">
                <span>🔄</span> Generate
            </button>

            <!-- Batch download settings (Default set to 3) -->
            <div class="flex items-center gap-2 bg-[#050505] px-2.5 py-1.5 border border-[#171717] rounded">
                <span class="text-[10px] text-neutral-500 font-mono font-bold uppercase">Batch</span>
                <input class="w-10 bg-transparent text-white text-[11px] text-center outline-none input-field !p-0 !border-0 font-mono" type="number" id="batch-count" value="3" min="1" max="500">
            </div>
            
            <button class="btn-action" id="btn-batch-go">
                <span>⚡</span> Go Batch (1080p)
            </button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 0. Selection Safety Patch & Route Resolver
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            if (window.getSelection) {
                const originalGetSelection = window.getSelection;
                window.getSelection = function() {
                    const sel = originalGetSelection.apply(this, arguments);
                    if (sel && !sel.patched) {
                        sel.patched = true;
                        const originalGetRangeAt = sel.getRangeAt;
                        sel.getRangeAt = function(index) {
                            if (index === 0 && this.rangeCount === 0) {
                                const range = document.createRange();
                                if (document.body) {
                                    range.selectNodeContents(document.body);
                                    range.collapse(true);
                                }
                                return range;
                            }
                            return originalGetRangeAt.apply(this, arguments);
                        };
                    }
                    return sel;
                };
            }

            // Resolve dynamic back button path based on deployment route environment
            const backBtn = document.getElementById('back-btn');
            if (backBtn) {
                const isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                if (isLocal) {
                    // Check if current file lies within a nested directory subclass
                    if (window.location.pathname.includes('/tools/') || window.location.pathname.includes('/public/')) {
                        backBtn.href = '../index.html';
                    } else {
                        backBtn.href = 'index.html';
                    }
                } else {
                    // Safe production Vercel/Cloud routing pointing straight to root domain landing index
                    backBtn.href = '/';
                }
            }

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 1. Canvas Setup
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');

            let W = 0;
            let H = 0;

            function resizeCanvas() {
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W;
                canvas.height = H;
                renderScreenBackground(canvas, ctx, W, H);
            }

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 2. Random Helpers with standard math parameters
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            function rand(min, max) {
                return Math.random() * (max - min) + min;
            }

            function randInt(min, max) {
                return Math.floor(rand(min, max + 1));
            }

            function pick(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 3. Shape Definitions
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            const SHAPE_TYPES = [
                'circle',
                'square',
                'triangle',
                'pentagon',
                'hexagon',
                'star',
                'diamond',
                'blob',
                'cross',
                'ring',
                'semicircle'
            ];

            function drawCircle(targetCtx, x, y, size, rot, color, opacity) {
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.beginPath();
                targetCtx.arc(0, 0, size, 0, Math.PI * 2);
                targetCtx.fillStyle = color;
                targetCtx.fill();
                targetCtx.restore();
            }

            function drawSquare(targetCtx, x, y, size, rot, color, opacity) {
                const half = size * 0.7;
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.fillStyle = color;
                targetCtx.fillRect(-half, -half, half * 2, half * 2);
                targetCtx.restore();
            }

            function drawTriangle(targetCtx, x, y, size, rot, color, opacity) {
                const r = size * 1.0;
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.beginPath();
                for (let i = 0; i < 3; i++) {
                    const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    i === 0 ? targetCtx.moveTo(px, py) : targetCtx.lineTo(px, py);
                }
                targetCtx.closePath();
                targetCtx.fillStyle = color;
                targetCtx.fill();
                targetCtx.restore();
            }

            function drawPolygon(targetCtx, x, y, size, rot, color, opacity, sides) {
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
                    const px = Math.cos(angle) * size;
                    const py = Math.sin(angle) * size;
                    i === 0 ? targetCtx.moveTo(px, py) : targetCtx.lineTo(px, py);
                }
                targetCtx.closePath();
                targetCtx.fillStyle = color;
                targetCtx.fill();
                targetCtx.restore();
            }

            function drawPentagon(targetCtx, x, y, size, rot, color, opacity) {
                drawPolygon(targetCtx, x, y, size * 0.9, rot, color, opacity, 5);
            }

            // Draw a high-fidelity dynamic polygon
            function drawHexagon(targetCtx, x, y, size, rot, color, opacity) {
                drawPolygon(targetCtx, x, y, size * 0.85, rot, color, opacity, 6);
            }

            function drawStar(targetCtx, x, y, size, rot, color, opacity) {
                const points = 5;
                const outerR = size * 0.9;
                const innerR = size * 0.4;
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.beginPath();
                for (let i = 0; i < points * 2; i++) {
                    const radius = i % 2 === 0 ? outerR : innerR;
                    const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
                    const px = Math.cos(angle) * radius;
                    const py = Math.sin(angle) * radius;
                    i === 0 ? targetCtx.moveTo(px, py) : targetCtx.lineTo(px, py);
                }
                targetCtx.closePath();
                targetCtx.fillStyle = color;
                targetCtx.fill();
                targetCtx.restore();
            }

            function drawDiamond(targetCtx, x, y, size, rot, color, opacity) {
                const r = size * 0.8;
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.beginPath();
                targetCtx.moveTo(0, -r);
                targetCtx.lineTo(r, 0);
                targetCtx.lineTo(0, r);
                targetCtx.lineTo(-r, 0);
                targetCtx.closePath();
                targetCtx.fillStyle = color;
                targetCtx.fill();
                targetCtx.restore();
            }

            function drawBlob(targetCtx, x, y, size, rot, color, opacity) {
                const points = 8;
                const r = size * 0.85;
                const offsets = [];
                for (let i = 0; i < points; i++) {
                    offsets.push(rand(0.65, 1.2));
                }
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.beginPath();
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2 - Math.PI / 2;
                    const radius = r * offsets[i];
                    const px = Math.cos(angle) * radius;
                    const py = Math.sin(angle) * radius;
                    if (i === 0) targetCtx.moveTo(px, py);
                    else {
                        const prevAngle = ((i - 1) / points) * Math.PI * 2 - Math.PI / 2;
                        const cpR = r * (offsets[i - 1] + offsets[i]) / 2 * 0.9;
                        const cpx = Math.cos((prevAngle + angle) / 2) * cpR;
                        const cpy = Math.sin((prevAngle + angle) / 2) * cpR;
                        targetCtx.quadraticCurveTo(cpx, cpy, px, py);
                    }
                }
                targetCtx.closePath();
                targetCtx.fillStyle = color;
                targetCtx.fill();
                targetCtx.restore();
            }

            function drawCross(targetCtx, x, y, size, rot, color, opacity) {
                const w = size * 0.35;
                const h = size * 0.9;
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.fillStyle = color;
                targetCtx.fillRect(-w / 2, -h, w, h * 2);
                targetCtx.fillRect(-h, -w / 2, h * 2, w);
                targetCtx.restore();
            }

            function drawRing(targetCtx, x, y, size, rot, color, opacity) {
                const r = size * 0.75;
                const innerR = r * 0.5;
                targetCtx.save();
                targetCtx.globalAlpha = opacity;
                targetCtx.translate(x, y);
                targetCtx.rotate(rot);
                targetCtx.beginPath();
                targetCtx.arc(0, 0, r, 0, Math.PI * 2);
                targetCtx.arc(0, 0, innerR, 0, Math.PI * 2, true);
                targetCtx.closePath();
                targetCtx.fillStyle = color;
                targetCtx.fill();
                targetCtx.restore();
            }

            function drawSemicircle(targetCtx, x, y, r, rotation, fillStyle) {
                targetCtx.save();
                targetCtx.translate(x, y);
                targetCtx.rotate(rotation);
                targetCtx.beginPath();
                targetCtx.arc(0, 0, r * 0.85, 0, Math.PI);
                targetCtx.closePath();
                targetCtx.fillStyle = fillStyle;
                targetCtx.fill();
                targetCtx.restore();
            }

            const SHAPE_DRAWERS = {
                circle: drawCircle,
                square: drawSquare,
                triangle: drawTriangle,
                pentagon: drawPentagon,
                hexagon: drawHexagon,
                star: drawStar,
                diamond: drawDiamond,
                blob: drawBlob,
                cross: drawCross,
                ring: drawRing,
                semicircle: drawSemicircle
            };

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 5. Color Palette Generator
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            function randomColor() {
                const hue = rand(0, 360);
                const sat = rand(55, 100);
                const light = rand(35, 75);
                return `hsl(${hue}, ${sat}%, ${light}%)`;
            }

            function randomPalette(count) {
                const colors = [];
                for (let i = 0; i < count; i++) {
                    colors.push(randomColor());
                }
                return colors;
            }

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 6. Main Generator (Abstracted to support offscreen 1080p generation)
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            let currentMetaState = null;

            function generateBackgroundParams(targetWidth, targetHeight) {
                let bgFill;
                const bgLocked = document.getElementById('bg-color-lock').checked;
                const selectedColor = document.getElementById('bg-color-picker').value;

                if (bgLocked) {
                    bgFill = selectedColor;
                } else {
                    const baseHue = rand(0, 360);
                    const baseLight = rand(2, 8);
                    bgFill = `hsl(${baseHue}, 30%, ${baseLight}%)`;
                }

                // Minimum and Maximum Shape Count configurations
                const minShapesInput = parseInt(document.getElementById('min-shapes').value);
                const maxShapesInput = parseInt(document.getElementById('max-shapes').value);

                const minShapes = !isNaN(minShapesInput) ? Math.max(1, minShapesInput) : 2;
                const maxShapes = !isNaN(maxShapesInput) ? Math.max(minShapes, maxShapesInput) : 5;

                const shapeCount = randInt(minShapes, maxShapes);
                const paletteSize = shapeCount + randInt(1, 3);
                const palette = randomPalette(paletteSize);

                const shapes = [];
                for (let i = 0; i < shapeCount; i++) {
                    const shapeType = pick(SHAPE_TYPES);
                    const margin = 60;
                    const x = rand(margin, targetWidth - margin);
                    const y = rand(margin, targetHeight - margin);
                    const size = rand(40, Math.min(targetWidth, targetHeight) * 0.35);
                    const rotation = rand(0, Math.PI * 2);
                    const color = palette[i % palette.length];
                    const opacity = rand(0.30, 0.85);

                    shapes.push({
                        type: shapeType,
                        x, y, size, rotation, color, opacity
                    });
                }

                const seed = Date.now().toString(36) + Math.random().toString(36).substring(2, 6);

                return {
                    bgFill,
                    shapeCount,
                    palette,
                    shapes,
                    seed
                };
            }

            function drawCompiledBackground(targetCtx, targetWidth, targetHeight, state) {
                targetCtx.clearRect(0, 0, targetWidth, targetHeight);
                targetCtx.fillStyle = state.bgFill;
                targetCtx.fillRect(0, 0, targetWidth, targetHeight);

                state.shapes.forEach(shape => {
                    const drawer = SHAPE_DRAWERS[shape.type];
                    if (drawer) {
                        drawer(targetCtx, shape.x, shape.y, shape.size, shape.rotation, shape.color, shape.opacity);
                    }
                });
            }

            function generateBackground() {
                currentMetaState = generateBackgroundParams(W, H);
                renderScreenBackground(canvas, ctx, W, H);
            }

            function renderScreenBackground(targetCanvas, targetCtx, targetW, targetH) {
                if (!currentMetaState) {
                    currentMetaState = generateBackgroundParams(targetW, targetH);
                }
                drawCompiledBackground(targetCtx, targetW, targetH, currentMetaState);
            }

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 7. High-Speed 1080p Batch Generation Engine (Vercel-Friendly)
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            const btnBatchGo = document.getElementById('btn-batch-go');
            const batchCountInput = document.getElementById('batch-count');
            const btnGenerateSingle = document.getElementById('btn-generate-single');

            async function triggerBatchGeneration() {
                const totalCount = parseInt(batchCountInput.value) || 3;
                btnBatchGo.disabled = true;
                batchCountInput.disabled = true;

                const offscreenCanvas = document.createElement('canvas');
                offscreenCanvas.width = 1920;
                offscreenCanvas.height = 1080;
                const offscreenCtx = offscreenCanvas.getContext('2d');

                for (let i = 0; i < totalCount; i++) {
                    const state = generateBackgroundParams(1920, 1080);
                    drawCompiledBackground(offscreenCtx, 1920, 1080, state);

                    await new Promise((resolveBlob) => {
                        offscreenCanvas.toBlob(function(blob) {
                            const url = URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.download = `wallpaper_1080p_${state.seed}.png`;
                            link.href = url;
                            document.body.appendChild(link);
                            link.click();
                            
                            setTimeout(() => {
                                document.body.removeChild(link);
                                URL.revokeObjectURL(url);
                                resolveBlob();
                            }, 50);
                        }, 'image/png');
                    });

                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                btnBatchGo.disabled = false;
                batchCountInput.disabled = false;
            }

            btnBatchGo.addEventListener('click', function(e) {
                e.stopPropagation();
                triggerBatchGeneration();
            });

            btnGenerateSingle.addEventListener('click', function(e) {
                e.stopPropagation();
                generateBackground();
            });

            // ─── Control UI Toggle ───
            const controlPanel = document.getElementById('control-panel');
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'h' || e.key === 'H') {
                    controlPanel.classList.toggle('hidden');
                }
                if (e.key === 'r' || e.key === 'R' || e.key === ' ') {
                    e.preventDefault();
                    generateBackground();
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target.closest('#control-panel')) return;
                generateBackground();
            });

            document.addEventListener('dblclick', function(e) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                }
            });

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 8. Resize handling
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    resizeCanvas();
                }, 150);
            });

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 9. Init
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            resizeCanvas();

            window.__bgGenerator = {
                regenerate: generateBackground,
                getState: function() {
                    return currentMetaState;
                }
            };

        })();
    </script>

</body>
</html>
