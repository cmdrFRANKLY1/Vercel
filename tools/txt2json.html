<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>black · txt ⇄ json</title>
    <style>
        /* ----- reset – no shadows, no frills ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            min-height: 100vh;
            font-family: 'Verdana', 'Geneva', sans-serif;
            color: #e0e0e0;
            padding: 1.2rem 1.5rem;
            line-height: 1.5;
        }

        /* top bar: back link left, clock right */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .back-link {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.15s;
            font-weight: 400;
        }

        .back-link:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .back-link::before {
            content: "← ";
            opacity: 0.5;
        }

        /* clock - compact single line */
        #clock {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.25);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.03em;
            white-space: nowrap;
            padding-top: 0.1rem;
        }

        /* ----- main content ----- */
        .card {
            background: #0b0b0b;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem 0;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.1px;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid #222222;
            padding-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Split Layout */
        .split-pane {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            margin-top: 0.5rem;
            min-height: 350px;
        }

        .pane {
            flex: 1;
            background: #111111;
            border: 1px solid #222222;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .pane-header {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #666666;
            border-bottom: 1px solid #222222;
            padding-bottom: 0.4rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pane-header span {
            background: #222222;
            padding: 0.1rem 0.5rem;
            font-weight: 400;
            font-size: 0.6rem;
            color: #aaaaaa;
        }

        .pane-content {
            flex: 1;
            overflow-y: auto;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #cccccc;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 180px;
            max-height: 380px;
        }

        .pane-content:empty::before {
            content: 'Drop a file here or use the button below...';
            color: #444444;
            font-style: italic;
            font-family: 'Verdana', sans-serif;
            font-size: 0.75rem;
        }

        .pane-content.has-content:empty::before {
            content: '';
        }

        .upload-area-inline {
            border: 1px dashed #333333;
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            flex-shrink: 0;
            background: #141414;
        }

        .upload-area-inline:hover {
            background: #181818;
            border-color: #ffffff;
        }

        .upload-area-inline input[type="file"] {
            display: none;
        }

        .file-label-inline {
            display: inline-block;
            background: #ffffff;
            color: #0b0b0b;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.4rem 1.2rem;
            cursor: pointer;
            transition: opacity 0.15s;
            font-family: 'Verdana', sans-serif;
            border: none;
        }

        .file-label-inline:hover {
            opacity: 0.9;
        }

        .file-status-inline {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: #666666;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #222222;
        }

        .btn-group {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .btn {
            background: #181818;
            border: 1px solid #333333;
            padding: 0.4rem 1.1rem;
            font-family: 'Verdana', sans-serif;
            font-size: 0.75rem;
            color: #f0f0f0;
            cursor: pointer;
            transition: opacity 0.12s, border-color 0.12s, background 0.12s;
        }

        .btn:hover {
            background: #222222;
            border-color: #555555;
        }

        .btn-primary {
            background: #ffffff;
            color: #0b0b0b;
            border: 1px solid #ffffff;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #eeeeee;
            border-color: #eeeeee;
        }

        .btn:disabled {
            opacity: 0.2 !important;
            pointer-events: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #222222;
            color: #666666;
        }

        .btn-outline:hover {
            background: #141414;
            border-color: #444444;
            color: #f0f0f0;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer-note {
            font-size: 0.7rem;
            color: #444444;
            text-align: right;
            margin-top: 0.8rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #0b0b0b;
        }

        ::-webkit-scrollbar-thumb {
            background: #222222;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #333333;
        }

        @media (max-width: 768px) {
            .split-pane {
                flex-direction: column;
            }
            .pane {
                min-height: 150px;
            }
            .pane-content {
                max-height: 250px;
                min-height: 100px;
            }
            .card {
                padding: 1rem 0;
            }
        }

        @media (max-width: 600px) {
            body { padding: 0.8rem; }
            .top-bar { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            #clock { align-self: flex-end; font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <!-- simple back link to index.html -->
        <a href="../index.html" class="back-link">index</a>
        <div id="clock"></div>
    </div>

    <div class="card">
        <h1>txt ⇄ json converter</h1>

        <!-- Split Pane Layout -->
        <div class="split-pane">
            <!-- Left Pane: Input -->
            <div class="pane">
                <div class="pane-header">
                    <span>input</span>
                    <span id="inputStatus">no file</span>
                </div>
                <div class="upload-area-inline" id="dropZone">
                    <input type="file" id="fileInput" accept=".txt,text/plain">
                    <label for="fileInput" class="file-label-inline">choose file</label>
                    <div style="margin-top: 0.4rem; font-size: 0.65rem; color: #444444;">or drop file here</div>
                    <div id="fileStatus" class="file-status-inline">No file selected</div>
                </div>
                <div class="pane-content" id="inputPreview"></div>
            </div>

            <!-- Right Pane: Output -->
            <div class="pane">
                <div class="pane-header">
                    <span>json output</span>
                    <span id="wordCount">0 words</span>
                </div>
                <div class="pane-content" id="jsonOutput"></div>
            </div>
        </div>

        <!-- Action Row -->
        <div class="action-row">
            <div class="btn-group">
                <button class="btn btn-primary" id="convertBtn" disabled>convert</button>
                <button class="btn btn-outline" id="clearBtn">clear</button>
                <button class="btn btn-outline" id="saveBtn" disabled>save (.json)</button>
            </div>
            <button class="btn btn-outline" id="copyBtn" disabled>copy</button>
        </div>

        <div class="footer-note">pure client‑side · auto‑converts on file load</div>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- clock -----
            const clockEl = document.getElementById('clock');

            function updateClock() {
                const now = new Date();
                const sample = Intl.DateTimeFormat('en-US', {
                    hour: 'numeric',
                    minute: 'numeric'
                }).format(now);
                const uses12Hour = sample.includes('AM') || sample.includes('PM');

                const dateOptions = {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                };

                const timeOptions = {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: uses12Hour
                };

                const dateStr = new Intl.DateTimeFormat('en-US', dateOptions).format(now);
                let timeStr = new Intl.DateTimeFormat('en-US', timeOptions).format(now);

                if (!uses12Hour) {
                    timeStr = timeStr.replace(/\s*[AP]M\s*/i, '');
                }

                clockEl.textContent = `${dateStr} · ${timeStr}`;
            }

            updateClock();
            setInterval(updateClock, 1000);

            // ----- DOM refs -----
            const fileInput = document.getElementById('fileInput');
            const fileStatus = document.getElementById('fileStatus');
            const inputStatus = document.getElementById('inputStatus');
            const convertBtn = document.getElementById('convertBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            const saveBtn = document.getElementById('saveBtn');
            const jsonOutput = document.getElementById('jsonOutput');
            const inputPreview = document.getElementById('inputPreview');
            const wordCountSpan = document.getElementById('wordCount');
            const dropZone = document.getElementById('dropZone');

            let currentFileContent = null;
            let currentFileName = null;
            let currentFileHandle = null;

            function updateWordCount(count) {
                wordCountSpan.textContent = count + ' word' + (count !== 1 ? 's' : '');
            }

            function parseWordsFromText(text) {
                if (!text || typeof text !== 'string') return [];
                return text.split(/[\n,;\s]+/).map(w => w.trim()).filter(w => w.length > 0);
            }

            function renderJSON(wordsArray) {
                if (!wordsArray || wordsArray.length === 0) {
                    jsonOutput.textContent = '';
                    jsonOutput.classList.remove('has-content');
                    updateWordCount(0);
                    copyBtn.disabled = true;
                    saveBtn.disabled = true;
                    return;
                }
                try {
                    const jsonStr = JSON.stringify(wordsArray, null, 2);
                    jsonOutput.textContent = jsonStr;
                    jsonOutput.classList.add('has-content');
                    updateWordCount(wordsArray.length);
                    copyBtn.disabled = false;
                    saveBtn.disabled = false;
                } catch (e) {
                    jsonOutput.textContent = '⚠️ Error: ' + e.message;
                    jsonOutput.classList.add('has-content');
                    updateWordCount(0);
                    copyBtn.disabled = true;
                    saveBtn.disabled = true;
                }
            }

            function updateInputPreview(text) {
                if (!text) {
                    inputPreview.textContent = '';
                    inputPreview.classList.remove('has-content');
                    return;
                }
                const preview = text.length > 500 ? text.substring(0, 500) + '\n… (truncated)' : text;
                inputPreview.textContent = preview;
                inputPreview.classList.add('has-content');
            }

            function resetAll() {
                fileInput.value = '';
                currentFileContent = null;
                currentFileName = null;
                currentFileHandle = null;
                jsonOutput.textContent = '';
                jsonOutput.classList.remove('has-content');
                inputPreview.textContent = '';
                inputPreview.classList.remove('has-content');
                updateWordCount(0);
                fileStatus.textContent = 'No file selected';
                inputStatus.textContent = 'no file';
                convertBtn.disabled = true;
                copyBtn.disabled = true;
                saveBtn.disabled = true;
            }

            function processFileContent(content, fileName) {
                currentFileContent = content;
                currentFileName = fileName;
                updateInputPreview(content);

                const words = parseWordsFromText(content);
                if (words.length > 0) {
                    fileStatus.textContent = `${fileName} · ${words.length} word(s)`;
                    inputStatus.textContent = `${fileName}`;
                    convertBtn.disabled = false;
                    renderJSON(words);
                } else {
                    fileStatus.textContent = `${fileName} (empty)`;
                    inputStatus.textContent = `empty`;
                    convertBtn.disabled = false;
                    jsonOutput.textContent = '⚠️ No words found.';
                    jsonOutput.classList.add('has-content');
                    updateWordCount(0);
                    copyBtn.disabled = true;
                    saveBtn.disabled = true;
                }
            }

            async function handleFile(file) {
                if (!file) {
                    resetAll();
                    return;
                }

                try {
                    if (window.showSaveFilePicker) {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: file.name.replace(/\.[^.]+$/, '') + '.json',
                            types: [{
                                description: 'JSON Files',
                                accept: { 'application/json': ['.json'] }
                            }]
                        });
                        currentFileHandle = handle;
                    }
                } catch (e) {
                    currentFileHandle = null;
                }

                fileStatus.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    if (typeof content === 'string') {
                        processFileContent(content, file.name);
                    } else {
                        resetAll();
                    }
                };
                reader.onerror = () => {
                    resetAll();
                };
                reader.readAsText(file, 'UTF-8');
            }

            async function saveAsJson() {
                const jsonText = jsonOutput.textContent;
                if (!jsonText || jsonText.trim() === '' || jsonText.startsWith('⚠️')) {
                    return;
                }

                let fileName = (currentFileName || 'output').replace(/\.[^.]+$/, '') + '.json';

                try {
                    if (window.showSaveFilePicker && currentFileHandle) {
                        const writable = await currentFileHandle.createWritable();
                        await writable.write(jsonText);
                        await writable.close();
                        fileStatus.textContent = `Saved: ${currentFileHandle.name}`;
                        return;
                    }

                    if (window.showSaveFilePicker) {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: fileName,
                            types: [{
                                description: 'JSON Files',
                                accept: { 'application/json': ['.json'] }
                            }]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(jsonText);
                        await writable.close();
                        fileStatus.textContent = `Saved: ${handle.name}`;
                        currentFileHandle = handle;
                        return;
                    }

                    const blob = new Blob([jsonText], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    fileStatus.textContent = `Downloaded: ${fileName}`;

                } catch (e) {
                    if (e.name !== 'AbortError' && e.name !== 'SecurityError') {
                        const blob = new Blob([jsonText], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }
                }
            }

            // ----- Event Listeners -----
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    handleFile(file);
                } else {
                    resetAll();
                }
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.background = '#181818';
                dropZone.style.borderColor = '#ffffff';
            });
            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.style.background = '';
                dropZone.style.borderColor = '#333333';
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.background = '';
                dropZone.style.borderColor = '#333333';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (!file.name.toLowerCase().endsWith('.txt') && !file.type.includes('text')) {
                        return;
                    }
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    fileInput.files = dt.files;
                    handleFile(file);
                }
            });

            convertBtn.addEventListener('click', () => {
                if (!currentFileContent) {
                    resetAll();
                    return;
                }
                const words = parseWordsFromText(currentFileContent);
                renderJSON(words);
            });

            clearBtn.addEventListener('click', () => {
                resetAll();
                dropZone.style.background = '';
                dropZone.style.borderColor = '#333333';
            });

            copyBtn.addEventListener('click', async () => {
                const jsonText = jsonOutput.textContent;
                if (!jsonText || jsonText.trim() === '' || jsonText.startsWith('⚠️')) return;
                try {
                    await navigator.clipboard.writeText(jsonText);
                    const original = copyBtn.textContent;
                    copyBtn.textContent = 'copied!';
                    setTimeout(() => { copyBtn.textContent = original; }, 2000);
                } catch (err) {
                    const area = document.createElement('textarea');
                    area.value = jsonText;
                    document.body.appendChild(area);
                    area.select();
                    document.execCommand('copy');
                    document.body.removeChild(area);
                    const original = copyBtn.textContent;
                    copyBtn.textContent = 'copied!';
                    setTimeout(() => { copyBtn.textContent = original; }, 2000);
                }
            });

            saveBtn.addEventListener('click', saveAsJson);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    resetAll();
                    dropZone.style.background = '';
                    dropZone.style.borderColor = '#333333';
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    if (!saveBtn.disabled) saveAsJson();
                }
            });

            resetAll();

        })();
    </script>

</body>
</html>
