<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text file ⇄ JSON list</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }
    body {
      background: #09090b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Verdana', 'Geneva', 'Tahoma', sans-serif;
      padding: 1.5rem;
      margin: 0;
    }
    .card {
      background: #18181b;
      max-width: 1100px;
      width: 100%;
      padding: 2rem 2rem 2.2rem;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8);
      transition: box-shadow 0.2s;
      border: 1px solid #27272a;
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 400;
      letter-spacing: -0.2px;
      color: #f4f4f5;
      margin-top: 0;
      margin-bottom: 0.5rem;
      border-bottom: 2px solid #27272a;
      padding-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Back button */
    .back-btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #21262d;
      border: 1px solid #30363d;
      padding: 0.5rem 1.1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #a1a1aa;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      margin-bottom: 1.2rem;
    }
    .back-btn:hover {
      background: #27272a;
      border-color: #3b82f6;
      color: #ffffff;
    }

    /* Split Layout */
    .split-pane {
      display: flex;
      flex-direction: row;
      gap: 1.5rem;
      margin-top: 1rem;
      min-height: 350px;
    }
    .pane {
      flex: 1;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .pane-header {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #71717a;
      border-bottom: 1px solid #27272a;
      padding-bottom: 0.5rem;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pane-header span {
      background: #27272a;
      padding: 0.1rem 0.6rem;
      border-radius: 20px;
      font-weight: 400;
      font-size: 0.6rem;
      color: #a1a1aa;
    }
    .pane-content {
      flex: 1;
      overflow-y: auto;
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      color: #e4e4e7;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 200px;
      max-height: 400px;
    }
    .pane-content:empty::before {
      content: 'Drop a file here or use the button below…';
      color: #3f3f46;
      font-style: italic;
      font-family: 'Verdana', sans-serif;
      font-size: 0.85rem;
    }
    .pane-content.has-content:empty::before {
      content: '';
    }

    .upload-area-inline {
      border: 2px dashed #27272a;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .upload-area-inline:hover {
      background: #18181b;
      border-color: #3b82f6;
    }
    .upload-area-inline input[type="file"] {
      display: none;
    }
    .file-label-inline {
      display: inline-block;
      background: #3b82f6;
      color: #ffffff;
      font-size: 0.85rem;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'Verdana', sans-serif;
      border: none;
    }
    .file-label-inline:hover {
      background: #2563eb;
    }
    .file-status-inline {
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: #71717a;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #27272a;
    }
    .btn {
      background: #27272a;
      border: none;
      padding: 0.5rem 1.4rem;
      border-radius: 60px;
      font-family: 'Verdana', sans-serif;
      font-size: 0.8rem;
      color: #e4e4e7;
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
    }
    .btn:hover {
      background: #3f3f46;
    }
    .btn-primary {
      background: #10b981;
      color: #ffffff;
    }
    .btn-primary:hover {
      background: #059669;
    }
    .btn-primary:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #27272a;
      color: #71717a;
    }
    .btn-outline:hover {
      background: #27272a;
      border-color: #3b82f6;
      color: #e4e4e7;
    }
    .btn:active {
      transform: scale(0.96);
    }

    .footer-note {
      font-size: 0.75rem;
      color: #3f3f46;
      text-align: right;
      margin-top: 1rem;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #09090b;
    }
    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }

    @media (max-width: 768px) {
      .split-pane {
        flex-direction: column;
      }
      .pane {
        min-height: 150px;
      }
      .pane-content {
        max-height: 250px;
        min-height: 100px;
      }
      .card {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="card">
  <!-- Back Button -->
  <a href="../index.html" class="back-btn">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="width: 14px; height: 14px;">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
    </svg>
    <span>Back to Portal</span>
  </a>

  <h1>📂 TXT ⇄ JSON Converter</h1>

  <!-- Split Pane Layout -->
  <div class="split-pane">
    <!-- Left Pane: Input -->
    <div class="pane">
      <div class="pane-header">
        <span>📄 Input</span>
        <span id="inputStatus">No file</span>
      </div>
      <div class="upload-area-inline" id="dropZone">
        <input type="file" id="fileInput" accept=".txt,text/plain">
        <label for="fileInput" class="file-label-inline">📁 Choose text file</label>
        <div style="margin-top: 0.4rem; font-size: 0.7rem; color: #3f3f46;">or drag & drop here</div>
        <div id="fileStatus" class="file-status-inline">No file selected</div>
      </div>
      <div class="pane-content" id="inputPreview"></div>
    </div>

    <!-- Right Pane: Output -->
    <div class="pane">
      <div class="pane-header">
        <span>📜 JSON Output</span>
        <span id="wordCount">0 words</span>
      </div>
      <div class="pane-content" id="jsonOutput"></div>
    </div>
  </div>

  <!-- Action Row -->
  <div class="action-row">
    <div style="display: flex; gap: 0.6rem; flex-wrap: wrap;">
      <button class="btn btn-primary" id="convertBtn" disabled>🔄 Convert</button>
      <button class="btn btn-outline" id="clearBtn">✕ Clear</button>
      <button class="btn btn-outline" id="saveBtn" disabled>💾 Save as JSON</button>
    </div>
    <button class="btn btn-outline" id="copyBtn" disabled>📋 Copy</button>
  </div>

  <div class="footer-note">pure client‑side · auto‑converts on file load</div>
</div>

<script>
  (function() {
    // DOM refs
    const fileInput = document.getElementById('fileInput');
    const fileStatus = document.getElementById('fileStatus');
    const inputStatus = document.getElementById('inputStatus');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const saveBtn = document.getElementById('saveBtn');
    const jsonOutput = document.getElementById('jsonOutput');
    const inputPreview = document.getElementById('inputPreview');
    const wordCountSpan = document.getElementById('wordCount');
    const dropZone = document.getElementById('dropZone');

    // State
    let currentFileContent = null;
    let currentFileName = null;
    let currentFileHandle = null; // For saving in same directory

    // ---------- Helpers ----------
    function updateWordCount(count) {
      wordCountSpan.textContent = count + ' word' + (count !== 1 ? 's' : '');
    }

    function parseWordsFromText(text) {
      if (!text || typeof text !== 'string') return [];
      return text.split(/[\n,;\s]+/).map(w => w.trim()).filter(w => w.length > 0);
    }

    function renderJSON(wordsArray) {
      if (!wordsArray || wordsArray.length === 0) {
        jsonOutput.textContent = '';
        jsonOutput.classList.remove('has-content');
        updateWordCount(0);
        copyBtn.disabled = true;
        saveBtn.disabled = true;
        return;
      }
      try {
        const jsonStr = JSON.stringify(wordsArray, null, 2);
        jsonOutput.textContent = jsonStr;
        jsonOutput.classList.add('has-content');
        updateWordCount(wordsArray.length);
        copyBtn.disabled = false;
        saveBtn.disabled = false;
      } catch (e) {
        jsonOutput.textContent = '⚠️ Error: ' + e.message;
        jsonOutput.classList.add('has-content');
        updateWordCount(0);
        copyBtn.disabled = true;
        saveBtn.disabled = true;
      }
    }

    function updateInputPreview(text) {
      if (!text) {
        inputPreview.textContent = '';
        inputPreview.classList.remove('has-content');
        return;
      }
      // Show first 500 chars as preview
      const preview = text.length > 500 ? text.substring(0, 500) + '\n… (truncated)' : text;
      inputPreview.textContent = preview;
      inputPreview.classList.add('has-content');
    }

    function resetAll() {
      fileInput.value = '';
      currentFileContent = null;
      currentFileName = null;
      currentFileHandle = null;
      jsonOutput.textContent = '';
      jsonOutput.classList.remove('has-content');
      inputPreview.textContent = '';
      inputPreview.classList.remove('has-content');
      updateWordCount(0);
      fileStatus.textContent = 'No file selected';
      inputStatus.textContent = 'No file';
      convertBtn.disabled = true;
      copyBtn.disabled = true;
      saveBtn.disabled = true;
    }

    function processFileContent(content, fileName) {
      currentFileContent = content;
      currentFileName = fileName;
      updateInputPreview(content);

      const words = parseWordsFromText(content);
      if (words.length > 0) {
        fileStatus.textContent = `📄 ${fileName} · ${words.length} word(s) detected`;
        inputStatus.textContent = `✅ ${fileName}`;
        convertBtn.disabled = false;
        // Auto-convert immediately
        renderJSON(words);
      } else {
        fileStatus.textContent = `📄 ${fileName} · (no words found)`;
        inputStatus.textContent = `⚠️ ${fileName}`;
        convertBtn.disabled = false;
        jsonOutput.textContent = '⚠️ No words found in this file.';
        jsonOutput.classList.add('has-content');
        updateWordCount(0);
        copyBtn.disabled = true;
        saveBtn.disabled = true;
      }
    }

    async function handleFile(file) {
      if (!file) {
        resetAll();
        return;
      }

      // Try to get file handle for save dialog
      try {
        // @ts-ignore - showDirectoryPicker is experimental
        if (window.showSaveFilePicker) {
          // We'll store the handle if possible
          const handle = await window.showSaveFilePicker({
            suggestedName: file.name.replace(/\.[^.]+$/, '') + '.json',
            types: [{
              description: 'JSON Files',
              accept: { 'application/json': ['.json'] }
            }]
          });
          currentFileHandle = handle;
        }
      } catch (e) {
        // User cancelled or not supported - ignore
        currentFileHandle = null;
      }

      fileStatus.textContent = `📄 ${file.name}  (${(file.size / 1024).toFixed(1)} KB)`;

      const reader = new FileReader();
      reader.onload = (e) => {
        const content = e.target.result;
        if (typeof content === 'string') {
          processFileContent(content, file.name);
        } else {
          alert('File could not be read as text.');
          resetAll();
        }
      };
      reader.onerror = () => {
        alert('Error reading file.');
        resetAll();
      };
      reader.readAsText(file, 'UTF-8');
    }

    // ---------- Save Function ----------
    async function saveAsJson() {
      const jsonText = jsonOutput.textContent;
      if (!jsonText || jsonText.trim() === '' || jsonText.startsWith('⚠️')) {
        return;
      }

      let fileName = (currentFileName || 'output').replace(/\.[^.]+$/, '') + '.json';

      try {
        // Try using File System Access API
        if (window.showSaveFilePicker && currentFileHandle) {
          // If we have a handle from earlier, use it
          const writable = await currentFileHandle.createWritable();
          await writable.write(jsonText);
          await writable.close();
          fileStatus.textContent = `💾 Saved: ${currentFileHandle.name}`;
          return;
        }

        // Fallback: use showSaveFilePicker directly
        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({
            suggestedName: fileName,
            types: [{
              description: 'JSON Files',
              accept: { 'application/json': ['.json'] }
            }]
          });
          const writable = await handle.createWritable();
          await writable.write(jsonText);
          await writable.close();
          fileStatus.textContent = `💾 Saved: ${handle.name}`;
          currentFileHandle = handle;
          return;
        }

        // Legacy fallback: download via blob
        const blob = new Blob([jsonText], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        fileStatus.textContent = `💾 Downloaded: ${fileName}`;

      } catch (e) {
        if (e.name !== 'AbortError' && e.name !== 'SecurityError') {
          console.error('Save error:', e);
          alert('Could not save file. Falling back to download.');
          // Fallback download
          const blob = new Blob([jsonText], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
      }
    }

    // ---------- Event Listeners ----------

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        handleFile(file);
      } else {
        resetAll();
      }
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.background = '#18181b';
      dropZone.style.borderColor = '#10b981';
    });
    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropZone.style.background = '';
      dropZone.style.borderColor = '#27272a';
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.background = '';
      dropZone.style.borderColor = '#27272a';
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        const file = files[0];
        if (!file.name.toLowerCase().endsWith('.txt') && !file.type.includes('text')) {
          alert('Please drop a .txt or plain text file.');
          return;
        }
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
        handleFile(file);
      }
    });

    convertBtn.addEventListener('click', () => {
      if (!currentFileContent) {
        resetAll();
        return;
      }
      const words = parseWordsFromText(currentFileContent);
      renderJSON(words);
    });

    clearBtn.addEventListener('click', () => {
      resetAll();
      dropZone.style.background = '';
      dropZone.style.borderColor = '#27272a';
    });

    copyBtn.addEventListener('click', async () => {
      const jsonText = jsonOutput.textContent;
      if (!jsonText || jsonText.trim() === '' || jsonText.startsWith('⚠️')) return;
      try {
        await navigator.clipboard.writeText(jsonText);
        const original = copyBtn.textContent;
        copyBtn.textContent = '✅ Copied!';
        setTimeout(() => { copyBtn.textContent = original; }, 2000);
      } catch (err) {
        const area = document.createElement('textarea');
        area.value = jsonText;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        document.body.removeChild(area);
        const original = copyBtn.textContent;
        copyBtn.textContent = '📋 Copied!';
        setTimeout(() => { copyBtn.textContent = original; }, 2000);
      }
    });

    saveBtn.addEventListener('click', saveAsJson);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        resetAll();
        dropZone.style.background = '';
        dropZone.style.borderColor = '#27272a';
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (!saveBtn.disabled) saveAsJson();
      }
    });

    resetAll();
  })();
</script>
</body>
</html>
