<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>black · txt ⇄ json</title>
  <style>
    /* ----- reset – no shadows, no frills ----- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Verdana', 'Geneva', 'Tahoma', sans-serif;
      padding: 4rem 1.5rem 1.5rem 1.5rem; /* added top padding to avoid navigation overlap */
      color: #f0f0f0;
    }

    /* ----- top‑left: ultra-compact tools navigation container ----- */
    .tools-container {
        position: fixed;
        top: 1rem;
        left: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        user-select: none;
        white-space: nowrap;
        z-index: 1000;
    }

    .main-nav {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
    }

    /* Second-row submenu */
    .sub-nav {
        display: none;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
        font-size: 0.85rem;
        opacity: 0;
    }

    .sub-nav.show {
        display: flex;
        animation: fadeIn 0.15s ease forwards;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    .tools-container a, .tools-container button {
        color: #f0f0f0;
        text-decoration: none;
        font-weight: 500;
        opacity: 0.4; /* dimmed inactive links */
        transition: opacity 0.15s ease, color 0.15s ease;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        font-family: inherit;
        font-size: inherit;
    }

    .tools-container a:hover, .tools-container button:hover {
        opacity: 0.8;
    }

    /* Active link highlight - Solid white */
    .tools-container a.active, .tools-container button.active {
        color: #ffffff !important;
        opacity: 1 !important;
        font-weight: 600;
    }

    /* Custom separator style */
    .separator {
        color: #f0f0f0;
        opacity: 0.2;
        font-weight: 300;
    }

    .card {
      background: #0b0b0b;
      max-width: 1000px;
      width: 100%;
      padding: 1.5rem;
      border-radius: 0; /* flat/square layout */
      border: 1px solid #222222;
      box-shadow: none;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.1px;
      color: #ffffff;
      margin-top: 0;
      margin-bottom: 1rem;
      border-bottom: 1px solid #222222;
      padding-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Split Layout */
    .split-pane {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      margin-top: 0.5rem;
      min-height: 350px;
    }

    .pane {
      flex: 1;
      background: #111111;
      border: 1px solid #222222;
      border-radius: 0;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .pane-header {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #666666;
      border-bottom: 1px solid #222222;
      padding-bottom: 0.4rem;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pane-header span {
      background: #222222;
      padding: 0.1rem 0.5rem;
      border-radius: 0;
      font-weight: 400;
      font-size: 0.6rem;
      color: #aaaaaa;
    }

    .pane-content {
      flex: 1;
      overflow-y: auto;
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #cccccc;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 180px;
      max-height: 380px;
    }

    .pane-content:empty::before {
      content: 'Drop a file here or use the button below...';
      color: #444444;
      font-style: italic;
      font-family: 'Verdana', sans-serif;
      font-size: 0.75rem;
    }

    .pane-content.has-content:empty::before {
      content: '';
    }

    .upload-area-inline {
      border: 1px dashed #333333;
      border-radius: 0;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
      background: #141414;
    }

    .upload-area-inline:hover {
      background: #181818;
      border-color: #ffffff;
    }

    .upload-area-inline input[type="file"] {
      display: none;
    }

    .file-label-inline {
      display: inline-block;
      background: #ffffff;
      color: #0b0b0b;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.4rem 1.2rem;
      border-radius: 0;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: 'Verdana', sans-serif;
      border: none;
    }

    .file-label-inline:hover {
      opacity: 0.9;
    }

    .file-status-inline {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #666666;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #222222;
    }

    .btn-group {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .btn {
      background: #181818;
      border: 1px solid #333333;
      padding: 0.4rem 1.1rem;
      border-radius: 0;
      font-family: 'Verdana', sans-serif;
      font-size: 0.75rem;
      color: #f0f0f0;
      cursor: pointer;
      transition: opacity 0.12s, border-color 0.12s, background 0.12s;
    }

    .btn:hover {
      background: #222222;
      border-color: #555555;
    }

    .btn-primary {
      background: #ffffff;
      color: #0b0b0b;
      border: 1px solid #ffffff;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #eeeeee;
      border-color: #eeeeee;
    }

    .btn:disabled {
      opacity: 0.2 !important;
      pointer-events: none;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #222222;
      color: #666666;
    }

    .btn-outline:hover {
      background: #141414;
      border-color: #444444;
      color: #f0f0f0;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .footer-note {
      font-size: 0.7rem;
      color: #444444;
      text-align: right;
      margin-top: 0.8rem;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    
    ::-webkit-scrollbar-track {
      background: #0b0b0b;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #222222;
      border-radius: 0;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #333333;
    }

    @media (max-width: 768px) {
      .split-pane {
        flex-direction: column;
      }
      .pane {
        min-height: 150px;
      }
      .pane-content {
        max-height: 250px;
        min-height: 100px;
      }
      .card {
        padding: 1rem;
      }
      body {
        padding-top: 5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Dynamic global navigation header -->
  <nav class="tools-container" aria-label="Tools directory navigation">
      <div class="main-nav">
          <a href="../index.html" class="nav-item" id="homeLink">home</a>
          <span class="separator">|</span>
          <button id="toolsToggle" class="nav-item-btn">tools</button>
          <span class="separator">|</span>
          <button id="tarkovToggle" class="nav-item-btn">tarkov</button>
      </div>
      <!-- Submenus -->
      <div class="sub-nav" id="toolsSubNav"></div>
      <div class="sub-nav" id="tarkovSubNav"></div>
  </nav>

<div class="card">
  <h1>txt ⇄ json converter</h1>

  <!-- Split Pane Layout -->
  <div class="split-pane">
    <!-- Left Pane: Input -->
    <div class="pane">
      <div class="pane-header">
        <span>input</span>
        <span id="inputStatus">no file</span>
      </div>
      <div class="upload-area-inline" id="dropZone">
        <input type="file" id="fileInput" accept=".txt,text/plain">
        <label for="fileInput" class="file-label-inline">choose file</label>
        <div style="margin-top: 0.4rem; font-size: 0.65rem; color: #444444;">or drop file here</div>
        <div id="fileStatus" class="file-status-inline">No file selected</div>
      </div>
      <div class="pane-content" id="inputPreview"></div>
    </div>

    <!-- Right Pane: Output -->
    <div class="pane">
      <div class="pane-header">
        <span>json output</span>
        <span id="wordCount">0 words</span>
      </div>
      <div class="pane-content" id="jsonOutput"></div>
    </div>
  </div>

  <!-- Action Row -->
  <div class="action-row">
    <div class="btn-group">
      <button class="btn btn-primary" id="convertBtn" disabled>convert</button>
      <button class="btn btn-outline" id="clearBtn">clear</button>
      <button class="btn btn-outline" id="saveBtn" disabled>save (.json)</button>
    </div>
    <button class="btn btn-outline" id="copyBtn" disabled>copy</button>
  </div>

  <div class="footer-note">pure client‑side · auto‑converts on file load</div>
</div>

<script>
  (function() {
    // DOM refs
    const fileInput = document.getElementById('fileInput');
    const fileStatus = document.getElementById('fileStatus');
    const inputStatus = document.getElementById('inputStatus');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const saveBtn = document.getElementById('saveBtn');
    const jsonOutput = document.getElementById('jsonOutput');
    const inputPreview = document.getElementById('inputPreview');
    const wordCountSpan = document.getElementById('wordCount');
    const dropZone = document.getElementById('dropZone');

    // Navigation refs
    const toolsSubNav = document.getElementById('toolsSubNav');
    const tarkovSubNav = document.getElementById('tarkovSubNav');
    const homeLink = document.getElementById('homeLink');
    const toolsToggle = document.getElementById('toolsToggle');
    const tarkovToggle = document.getElementById('tarkovToggle');

    // State
    let currentFileContent = null;
    let currentFileName = null;
    let currentFileHandle = null; 

    // ---------- Navigation Logic ----------
    const currentPath = window.location.pathname;
    
    // Force active state for "tools" categories and lists, since this is the txt2json file
    const isToolsPage = true; 
    const isTarkovPage = false;

    // Auto-expand subnavs & highlights
    if (isToolsPage) {
        toolsToggle.classList.add('active');
        toolsSubNav.classList.add('show');
    }

    // Manual navigation toggle handlers
    toolsToggle.addEventListener('click', () => {
        const isExpanded = toolsSubNav.classList.toggle('show');
        tarkovSubNav.classList.remove('show');
        tarkovToggle.classList.remove('active');
        if (!isToolsPage) {
            toolsToggle.classList.toggle('active', isExpanded);
        }
        if (!isTarkovPage) {
            tarkovToggle.classList.remove('active');
        }
    });

    tarkovToggle.addEventListener('click', () => {
        const isExpanded = tarkovSubNav.classList.toggle('show');
        toolsSubNav.classList.remove('show');
        toolsToggle.classList.remove('active');
        if (!isTarkovPage) {
            tarkovToggle.classList.toggle('active', isExpanded);
        }
        if (!isToolsPage) {
            toolsToggle.classList.remove('active');
        }
    });

    function cleanPath(rawPath) {
        return rawPath.replace(/\\/g, '/');
    }

    function getToolName(path) {
        const parts = path.split('/');
        const filename = parts[parts.length - 1];
        return filename.replace('.html', '');
    }

    // Build dynamic navbar from JSON
    async function buildNavigation() {
        let toolPaths = [];
        const isSubdir = true;
        const pathPrefix = '../';

        // Adjust home page link base
        homeLink.href = pathPrefix + 'index.html';

        try {
            let baseUrl = window.location.href;
            if (baseUrl.startsWith('blob:')) {
                baseUrl = baseUrl.replace(/^blob:/, '');
            }
            let jsonUrl;
            try {
                jsonUrl = new URL(pathPrefix + 'htmlList.json', baseUrl).href;
            } catch (e) {
                jsonUrl = pathPrefix + 'htmlList.json';
            }
            const response = await fetch(jsonUrl);
            if (!response.ok) throw new Error('Failed to load JSON');
            toolPaths = await response.json();
        } catch (error) {
            toolPaths = [
                "tools/txt2json.html",
                "tarkov/tarkov.html"
            ];
        }

        toolPaths.forEach(rawPath => {
            const targetPath = cleanPath(rawPath);
            const toolName = getToolName(targetPath);

            let container = null;
            if (targetPath.startsWith('tarkov/')) {
                container = tarkovSubNav;
            } else if (targetPath.startsWith('tools/')) {
                container = toolsSubNav;
            }

            if (container) {
                if (container.children.length > 0) {
                    const separator = document.createElement('span');
                    separator.className = 'separator';
                    separator.textContent = '|';
                    container.appendChild(separator);
                }

                const link = document.createElement('a');
                link.href = pathPrefix + targetPath;
                link.className = 'nav-item';
                link.textContent = toolName;

                // Highlight active tool page - specifically force "txt2json" in this file
                if (targetPath.endsWith('txt2json.html') || currentPath.endsWith(targetPath)) {
                    link.classList.add('active');
                    homeLink.classList.remove('active');
                }

                container.appendChild(link);
            }
        });
    }

    buildNavigation();

    // ---------- File Parsing Logic ----------
    function updateWordCount(count) {
      wordCountSpan.textContent = count + ' word' + (count !== 1 ? 's' : '');
    }

    // safe, age-appropriate text processing rules
    function parseWordsFromText(text) {
      if (!text || typeof text !== 'string') return [];
      return text.split(/[\n,;\s]+/).map(w => w.trim()).filter(w => w.length > 0);
    }

    function renderJSON(wordsArray) {
      if (!wordsArray || wordsArray.length === 0) {
        jsonOutput.textContent = '';
        jsonOutput.classList.remove('has-content');
        updateWordCount(0);
        copyBtn.disabled = true;
        saveBtn.disabled = true;
        return;
      }
      try {
        const jsonStr = JSON.stringify(wordsArray, null, 2);
        jsonOutput.textContent = jsonStr;
        jsonOutput.classList.add('has-content');
        updateWordCount(wordsArray.length);
        copyBtn.disabled = false;
        saveBtn.disabled = false;
      } catch (e) {
        jsonOutput.textContent = '⚠️ Error: ' + e.message;
        jsonOutput.classList.add('has-content');
        updateWordCount(0);
        copyBtn.disabled = true;
        saveBtn.disabled = true;
      }
    }

    function updateInputPreview(text) {
      if (!text) {
        inputPreview.textContent = '';
        inputPreview.classList.remove('has-content');
        return;
      }
      const preview = text.length > 500 ? text.substring(0, 500) + '\n… (truncated)' : text;
      inputPreview.textContent = preview;
      inputPreview.classList.add('has-content');
    }

    function resetAll() {
      fileInput.value = '';
      currentFileContent = null;
      currentFileName = null;
      currentFileHandle = null;
      jsonOutput.textContent = '';
      jsonOutput.classList.remove('has-content');
      inputPreview.textContent = '';
      inputPreview.classList.remove('has-content');
      updateWordCount(0);
      fileStatus.textContent = 'No file selected';
      inputStatus.textContent = 'no file';
      convertBtn.disabled = true;
      copyBtn.disabled = true;
      saveBtn.disabled = true;
    }

    function processFileContent(content, fileName) {
      currentFileContent = content;
      currentFileName = fileName;
      updateInputPreview(content);

      const words = parseWordsFromText(content);
      if (words.length > 0) {
        fileStatus.textContent = `${fileName} · ${words.length} word(s)`;
        inputStatus.textContent = `${fileName}`;
        convertBtn.disabled = false;
        renderJSON(words);
      } else {
        fileStatus.textContent = `${fileName} (empty)`;
        inputStatus.textContent = `empty`;
        convertBtn.disabled = false;
        jsonOutput.textContent = '⚠️ No words found.';
        jsonOutput.classList.add('has-content');
        updateWordCount(0);
        copyBtn.disabled = true;
        saveBtn.disabled = true;
      }
    }

    async function handleFile(file) {
      if (!file) {
        resetAll();
        return;
      }

      try {
        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({
            suggestedName: file.name.replace(/\.[^.]+$/, '') + '.json',
            types: [{
              description: 'JSON Files',
              accept: { 'application/json': ['.json'] }
            }]
          });
          currentFileHandle = handle;
        }
      } catch (e) {
        currentFileHandle = null;
      }

      fileStatus.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;

      const reader = new FileReader();
      reader.onload = (e) => {
        const content = e.target.result;
        if (typeof content === 'string') {
          processFileContent(content, file.name);
        } else {
          resetAll();
        }
      };
      reader.onerror = () => {
        resetAll();
      };
      reader.readAsText(file, 'UTF-8');
    }

    // ---------- Save Function ----------
    async function saveAsJson() {
      const jsonText = jsonOutput.textContent;
      if (!jsonText || jsonText.trim() === '' || jsonText.startsWith('⚠️')) {
        return;
      }

      let fileName = (currentFileName || 'output').replace(/\.[^.]+$/, '') + '.json';

      try {
        if (window.showSaveFilePicker && currentFileHandle) {
          const writable = await currentFileHandle.createWritable();
          await writable.write(jsonText);
          await writable.close();
          fileStatus.textContent = `Saved: ${currentFileHandle.name}`;
          return;
        }

        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({
            suggestedName: fileName,
            types: [{
              description: 'JSON Files',
              accept: { 'application/json': ['.json'] }
            }]
          });
          const writable = await handle.createWritable();
          await writable.write(jsonText);
          await writable.close();
          fileStatus.textContent = `Saved: ${handle.name}`;
          currentFileHandle = handle;
          return;
        }

        const blob = new Blob([jsonText], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        fileStatus.textContent = `Downloaded: ${fileName}`;

      } catch (e) {
        if (e.name !== 'AbortError' && e.name !== 'SecurityError') {
          const blob = new Blob([jsonText], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
      }
    }

    // ---------- Event Listeners ----------

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        handleFile(file);
      } else {
        resetAll();
      }
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.background = '#181818';
      dropZone.style.borderColor = '#ffffff';
    });
    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropZone.style.background = '';
      dropZone.style.borderColor = '#333333';
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.background = '';
      dropZone.style.borderColor = '#333333';
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        const file = files[0];
        if (!file.name.toLowerCase().endsWith('.txt') && !file.type.includes('text')) {
          return;
        }
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
        handleFile(file);
      }
    });

    convertBtn.addEventListener('click', () => {
      if (!currentFileContent) {
        resetAll();
        return;
      }
      const words = parseWordsFromText(currentFileContent);
      renderJSON(words);
    });

    clearBtn.addEventListener('click', () => {
      resetAll();
      dropZone.style.background = '';
      dropZone.style.borderColor = '#333333';
    });

    copyBtn.addEventListener('click', async () => {
      const jsonText = jsonOutput.textContent;
      if (!jsonText || jsonText.trim() === '' || jsonText.startsWith('⚠️')) return;
      try {
        await navigator.clipboard.writeText(jsonText);
        const original = copyBtn.textContent;
        copyBtn.textContent = 'copied!';
        setTimeout(() => { copyBtn.textContent = original; }, 2000);
      } catch (err) {
        const area = document.createElement('textarea');
        area.value = jsonText;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        document.body.removeChild(area);
        const original = copyBtn.textContent;
        copyBtn.textContent = 'copied!';
        setTimeout(() => { copyBtn.textContent = original; }, 2000);
      }
    });

    saveBtn.addEventListener('click', saveAsJson);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        resetAll();
        dropZone.style.background = '';
        dropZone.style.borderColor = '#333333';
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (!saveBtn.disabled) saveAsJson();
      }
    });

    resetAll();
  })();
</script>
</body>
</html>
