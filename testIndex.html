<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            min-height: 100vh;
            font-family: 'Verdana', 'Geneva', sans-serif;
            color: #e0e0e0;
            padding: 1.2rem 1.5rem;
            line-height: 1.5;
        }

        /* top bar: nav left, clock right */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .nav-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 0.9rem;
            font-size: 0.8rem;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.15s;
            font-weight: 400;
        }

        .nav-item:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .nav-item.active {
            color: #ffffff !important;
            font-weight: 600;
        }

        .separator {
            color: rgba(255, 255, 255, 0.08);
            user-select: none;
        }

        .cat-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
            padding: 0;
            transition: color 0.15s;
        }

        .cat-toggle:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .cat-toggle.active {
            color: #ffffff !important;
            font-weight: 600;
        }

        .sub-nav {
            display: none;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 0.9rem;
            font-size: 0.78rem;
            padding-left: 0.3rem;
        }

        .sub-nav.open {
            display: flex;
        }

        /* clock */
        #clock {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.03em;
            white-space: nowrap;
            padding-top: 0.1rem;
        }

        @media (max-width: 600px) {
            body { padding: 0.8rem; }
            .top-bar { flex-direction: column; gap: 0.5rem; }
            #clock { align-self: flex-end; }
            .nav-row { font-size: 0.7rem; gap: 0.3rem 0.6rem; }
            .sub-nav { font-size: 0.68rem; gap: 0.3rem 0.6rem; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <nav id="navContainer">
            <div class="nav-row" id="mainRow">
                <a href="index.html" class="nav-item active" id="homeLink">home</a>
            </div>
        </nav>
        <div id="clock"></div>
    </div>

    <script>
        (function() {
            'use strict';

            const navContainer = document.getElementById('navContainer');
            const homeLink = document.getElementById('homeLink');
            const clockEl = document.getElementById('clock');

            // ----- clock -----
            function updateClock() {
                const now = new Date();
                const date = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                clockEl.textContent = `${date} · ${time}`;
            }
            updateClock();
            setInterval(updateClock, 60000);

            // ----- helpers -----
            const currentFile = window.location.pathname.split('/').pop() || 'index.html';

            function getCategory(path) {
                const parts = path.split('/');
                return parts.length > 1 ? parts[0] : null;
            }

            function getToolName(path) {
                const parts = path.split('/');
                return parts.pop().replace('.html', '');
            }

            // ----- load and build -----
            async function buildNav() {
                let tools = [];

                try {
                    const res = await fetch('htmlList.json');
                    if (!res.ok) return;
                    tools = await res.json();
                    tools = tools.map(p => p.replace(/\\/g, '/'));
                } catch (_) {
                    return; // silently fail, show nothing
                }

                if (!tools.length) return;

                // group by category
                const cats = {};
                const standalone = [];

                tools.forEach(path => {
                    const cat = getCategory(path);
                    const name = getToolName(path);
                    if (cat) {
                        if (!cats[cat]) cats[cat] = [];
                        cats[cat].push({ name, path });
                    } else {
                        standalone.push({ name, path });
                    }
                });

                const catNames = Object.keys(cats).sort();

                // Build rows
                const mainRow = document.getElementById('mainRow');

                // Add category toggles to main row
                catNames.forEach(cat => {
                    const sep = document.createElement('span');
                    sep.className = 'separator';
                    sep.textContent = '|';
                    mainRow.appendChild(sep);

                    const btn = document.createElement('button');
                    btn.className = 'cat-toggle';
                    btn.textContent = cat;
                    btn.dataset.cat = cat;
                    mainRow.appendChild(btn);
                });

                // Build sub-nav rows
                catNames.forEach(cat => {
                    const items = cats[cat];
                    const sub = document.createElement('div');
                    sub.className = 'sub-nav';
                    sub.dataset.cat = cat;

                    items.forEach((item, i) => {
                        if (i > 0) {
                            const sep = document.createElement('span');
                            sep.className = 'separator';
                            sep.textContent = '|';
                            sub.appendChild(sep);
                        }

                        const a = document.createElement('a');
                        a.href = item.path;
                        a.className = 'nav-item';
                        a.textContent = item.name;
                        if (currentFile === item.path || currentFile === item.name + '.html') {
                            a.classList.add('active');
                        }
                        sub.appendChild(a);
                    });

                    navContainer.appendChild(sub);
                });

                // Standalone tools (no category)
                if (standalone.length) {
                    const row = document.createElement('div');
                    row.className = 'nav-row';
                    standalone.forEach((item, i) => {
                        if (i > 0) {
                            const sep = document.createElement('span');
                            sep.className = 'separator';
                            sep.textContent = '|';
                            row.appendChild(sep);
                        }
                        const a = document.createElement('a');
                        a.href = item.path;
                        a.className = 'nav-item';
                        a.textContent = item.name;
                        if (currentFile === item.path || currentFile === item.name + '.html') {
                            a.classList.add('active');
                        }
                        row.appendChild(a);
                    });
                    navContainer.appendChild(row);
                }

                // Toggle logic
                const toggles = navContainer.querySelectorAll('.cat-toggle');
                toggles.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const cat = this.dataset.cat;
                        const sub = navContainer.querySelector(`.sub-nav[data-cat="${cat}"]`);
                        if (sub) {
                            sub.classList.toggle('open');
                            this.classList.toggle('active');
                        }
                    });
                });

                // Auto-open category if active tool inside
                const activeSub = navContainer.querySelector('.sub-nav .nav-item.active');
                if (activeSub) {
                    const sub = activeSub.closest('.sub-nav');
                    if (sub) {
                        sub.classList.add('open');
                        const cat = sub.dataset.cat;
                        const toggle = navContainer.querySelector(`.cat-toggle[data-cat="${cat}"]`);
                        if (toggle) toggle.classList.add('active');
                    }
                }

                // Update home active state
                const isHome = currentFile === 'index.html' || currentFile === '';
                homeLink.classList.toggle('active', isHome);
            }

            buildNav();

        })();
    </script>

</body>
</html>
